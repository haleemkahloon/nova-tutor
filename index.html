        <div className="writing-home-title">✍️ Writing Workshop</div>
        <div className="writing-home-sub">Learn step by step, then scan your own writing for instant feedback.</div>

        {/* Action buttons row */}
        <div style={{display:"flex",gap:12,maxWidth:600,margin:"0 auto",width:"100%",flexWrap:"wrap"}}>
          <button onClick={()=>{setScanIssues([]);setScanChoices({});setScanText("");scanTextRef.current="";setScanTitle("");setShowRevisedEssay(false);setWritingScreen("scan");}}
            style={{flex:1,minWidth:140,padding:"16px",borderRadius:16,border:"none",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",color:"#fff",fontFamily:"var(--font)",cursor:"pointer",textAlign:"center",boxShadow:"0 4px 14px rgba(124,58,237,.3)"}}>
            <div style={{fontSize:28,marginBottom:6}}>📄</div>
            <div style={{fontSize:13,fontWeight:900}}>Scan My Essay</div>
            <div style={{fontSize:10,fontWeight:600,opacity:.85,marginTop:2}}>Get interactive feedback</div>
          </button>
          <button onClick={()=>{setEssayOutput(null);setEssayTopic("");essayTopicRef.current="";setEssayResearch("");essayResearchRef.current="";setEssayRevisionHistory([]);setEssayRevisionInput("");essayRevisionRef.current="";setEssaySources([]);setEssayUrlInput("");essayUrlRef.current="";setEssayUrlStatus(null);setEssayWebQuery("");essayWebQueryRef.current="";setEssayWebStatus(null);setEssaySavedNoteId(null);setWritingScreen("essaywriter");}}
            style={{flex:1,minWidth:140,padding:"16px",borderRadius:16,border:"none",background:"linear-gradient(135deg,#f97316,#fbbf24)",color:"#fff",fontFamily:"var(--font)",cursor:"pointer",textAlign:"center",boxShadow:"0 4px 14px rgba(249,115,22,.3)"}}>
            <div style={{fontSize:28,marginBottom:6}}>✏️</div>
            <div style={{fontSize:13,fontWeight:900}}>Write My Essay</div>
            <div style={{fontSize:10,fontWeight:600,opacity:.85,marginTop:2}}>Nova writes it for you</div>
          </button>
          <button onClick={()=>setWritingScreen("notes")}
            style={{flex:1,minWidth:140,padding:"16px",borderRadius:16,border:"2px solid var(--purple)",background:"#f5f3ff",fontFamily:"var(--font)",cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:6}}>📓</div>
            <div style={{fontSize:13,fontWeight:900,color:"var(--purple)"}}>Student Notes</div>
            <div style={{fontSize:10,fontWeight:600,color:"var(--muted)",marginTop:2}}>{studentNotes.length} saved {studentNotes.length===1?"note":"notes"}</div>
          </button>
        </div>

        <div style={{maxWidth:600,margin:"4px auto",width:"100%",fontSize:11,fontWeight:800,letterSpacing:"1px",textTransform:"uppercase",color:"var(--muted)"}}>📚 Lessons</div>
        <div className="writing-type-grid">
          {WRITING_TYPES.map(wt=>{
            const done=wt.lessons.filter(l=>writingHistory[l.id]&&writingHistory[l.id].score>=6).length;
            const total=wt.lessons.length;
            const pct=Math.round((done/total)*100);
            return(
              <div key={wt.id} className="writing-type-card"
                style={{borderColor:pct>0?wt.color:"var(--border)",background:pct>0?wt.bg:"#fff"}}
                onClick={()=>{setWritingType(wt);setWritingLesson(null);setWritingStep(0);setWritingDraft("");writingDraftRef.current="";setWritingRevision("");writingRevisionRef.current="";setWritingFeedback(null);}}>
                <div className="writing-type-icon">{wt.icon}</div>
                <div className="writing-type-name" style={{color:wt.color}}>{wt.name}</div>
                <div className="writing-type-desc">{wt.desc}</div>
                <div style={{marginTop:8,fontSize:10,fontWeight:700,color:wt.color}}>{done}/{total} lessons complete {pct>0&&`· ${pct}%`}</div>
                {pct>0&&<div style={{height:4,background:"rgba(0,0,0,.1)",borderRadius:4,marginTop:6,overflow:"hidden"}}><div style={{height:"100%",background:wt.color,borderRadius:4,width:pct+"%"}}/></div>}
                <div className="writing-type-skills">
                  {wt.skills.slice(0,4).map(s=><span key={s} className="writing-skill-tag">{s}</span>)}
                </div>
              </div>
            );
          })}
        </div>
        {Object.keys(writingHistory).length>0&&(
          <div style={{maxWidth:600,margin:"0 auto",width:"100%"}}>
            <div style={{fontSize:11,fontWeight:800,letterSpacing:"1px",textTransform:"uppercase",color:"var(--muted)",marginBottom:10}}>📈 Your Writing Progress</div>
            {WRITING_TYPES.map(wt=>{
              const myLessons=wt.lessons.filter(l=>writingHistory[l.id]);
              if(!myLessons.length)return null;
              const avgScore=Math.round(myLessons.reduce((a,l)=>a+(writingHistory[l.id]?.score||0),0)/myLessons.length);
              return(
                <div key={wt.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,background:"#fff",marginBottom:6,border:"1px solid var(--border)"}}>
                  <span>{wt.icon}</span>
                  <span style={{fontSize:12,fontWeight:800,flex:1}}>{wt.name}</span>
                  <div style={{width:80,height:5,background:"var(--border)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",background:wt.color,width:(avgScore*10)+"%",borderRadius:3}}/></div>
                  <span style={{fontSize:11,fontWeight:800,color:wt.color}}>{avgScore}/10</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  function WritingLessonPicker(){
    if(!writingType)return null;
    return(
      <div className="writing-home fade-in" style={{background:writingType.bg}}>
        <button className="writing-back" onClick={()=>setWritingType(null)} style={{alignSelf:"flex-start"}}>← Back</button>
        <div className="writing-home-title" style={{color:writingType.color}}>{writingType.icon} {writingType.name}</div>
        <div className="writing-home-sub">Complete lessons in order — each one builds on the last.</div>
        <div style={{maxWidth:620,margin:"0 auto",width:"100%",display:"flex",flexDirection:"column",gap:10}}>
          {writingType.lessons.map((lesson,i)=>{
            const hist=writingHistory[lesson.id];
            const done=hist&&hist.score>=6;
            const locked=i>0&&!writingHistory[writingType.lessons[i-1].id];
            return(
              <div key={lesson.id} style={{padding:"14px 18px",borderRadius:14,border:"2px solid "+(done?"var(--green)":locked?"var(--border)":"var(--border)"),background:done?"#f0fdf4":locked?"#f8fafc":"#fff",cursor:locked?"not-allowed":"pointer",opacity:locked?.5:1,display:"flex",alignItems:"center",gap:14,boxShadow:done||locked?"none":"0 2px 8px rgba(0,0,0,.06)",transition:"all .15s"}}
                onClick={()=>{if(!locked){setWritingLesson(lesson);setWritingStep(0);setWritingDraft("");writingDraftRef.current="";setWritingRevision("");writingRevisionRef.current="";setWritingFeedback(null);}}}>
                <div style={{fontSize:28}}>{done?"✅":locked?"🔒":lesson.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:900,color:"var(--navy)"}}>{lesson.name}</div>
                  <div style={{fontSize:11,color:"var(--muted)",fontWeight:600}}>Skill: {lesson.skillFocus} · {lesson.ccss}</div>
                  {hist&&<div style={{fontSize:10,fontWeight:700,color:done?"var(--green)":"var(--orange)",marginTop:2}}>Score: {hist.score}/10 · {hist.feedback?.scoreLabel}</div>}
                </div>
                {!locked&&!done&&<div style={{fontSize:12,fontWeight:800,color:writingType.color}}>Start →</div>}
                {done&&<div style={{fontSize:12,fontWeight:800,color:"var(--green)"}}>Redo ↺</div>}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  function WritingLessonScreen(){
    if(!writingLesson||!writingType)return null;
    const lesson=writingLesson;
    const steps=["Learn","See Example","You Try","Feedback","Revise","Done!"];
    const scoreColor=writingFeedback?(writingFeedback.score>=8?"var(--green)":writingFeedback.score>=6?"var(--yellow)":"var(--red)"):"var(--muted)";
    const badgeCls=writingFeedback?(writingFeedback.score>=8?"high":writingFeedback.score>=6?"mid":"low"):"mid";

    return(
      <div className="writing-wrap">
        <div className="writing-header">
          <button className="writing-back" onClick={()=>{setWritingLesson(null);setWritingStep(0);}}>← Lessons</button>
          <div style={{fontSize:13,fontWeight:900,color:"var(--navy)"}}>{lesson.icon} {lesson.name}</div>
          <div style={{fontSize:10,fontWeight:700,color:writingType.color,marginLeft:4}}>{lesson.skillFocus}</div>
          <div className="writing-step-bar">
            {steps.map((_,i)=><div key={i} className={"writing-step-dot"+(i===writingStep?" active":i<writingStep?" done":"")}/>)}
          </div>
        </div>
        <div className="writing-body">

          {/* STEP 0: LEARN */}
          {writingStep===0&&(
            <>
              <div className="writing-nova-bubble">
                <div className="writing-nova-label">🦉 Nova teaches</div>
                <div className="writing-nova-text">{lesson.concept}</div>
              </div>
              <div style={{textAlign:"center",paddingTop:8}}>
                <button className="writing-submit-btn" onClick={()=>setWritingStep(1)}>See an Example →</button>
              </div>
            </>
          )}

          {/* STEP 1: EXAMPLE */}
          {writingStep===1&&(
            <>
              <div className="writing-nova-bubble">
                <div className="writing-nova-label">🦉 Nova teaches</div>
                <div className="writing-nova-text">{lesson.concept}</div>
              </div>
              <div className="writing-example-box">
                <div className="writing-example-label">📖 Example</div>
                <div className="writing-example-text" style={{whiteSpace:"pre-line"}}>{lesson.example}</div>
              </div>
              <div style={{textAlign:"center"}}>
                <button className="writing-submit-btn" onClick={()=>setWritingStep(2)}>Now I'll Try It! ✏️</button>
              </div>
            </>
          )}

          {/* STEP 2: WRITE */}
          {writingStep===2&&(
            <>
              <div className="writing-example-box">
                <div className="writing-example-label">📖 Example (for reference)</div>
                <div className="writing-example-text" style={{whiteSpace:"pre-line",fontSize:11}}>{lesson.example}</div>
              </div>
              <div className="writing-try-area">
                <div className="writing-try-label">✏️ Your Turn, {profile?.name}!</div>
                <div style={{fontSize:12,fontWeight:700,color:"var(--navy)",marginBottom:10,lineHeight:1.6,whiteSpace:"pre-line"}}>{lesson.prompt}</div>
                <textarea className="writing-textarea"
                  placeholder="Start writing here... take your time, there are no wrong answers!"
                  defaultValue={writingDraft}
                  onInput={e=>{writingDraftRef.current=e.target.value;}}
                  onBlur={e=>{setWritingDraft(e.target.value);writingDraftRef.current=e.target.value;}}
                  rows={7}
                  autoComplete="off"
                  autoCorrect="on"
                  spellCheck="true"
                  inputMode="text"
                  style={{WebkitUserSelect:"text",userSelect:"text"}}/>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8,flexWrap:"wrap",gap:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:11,color:"var(--muted)",fontWeight:600}}>{writingDraft.trim().split(/\s+/).filter(Boolean).length} words</span>
                    {recognitionRef.current&&(
                      <button onClick={()=>toggleWritingMic("draft")}
                        style={{padding:"5px 10px",borderRadius:8,border:"none",background:writingMicListening?"linear-gradient(135deg,var(--red),#dc2626)":"linear-gradient(135deg,#64748b,#475569)",color:"#fff",fontFamily:"var(--font)",fontSize:11,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",gap:4,animation:writingMicListening?"pulseGlow 1s infinite":"none"}}>
                        {writingMicListening?"⏹ Stop":"🎤 Speak"}
                      </button>
                    )}
                  </div>
                  <button className="writing-submit-btn"
                    disabled={writingLoading||writingDraftRef.current.trim().length<20}
                    onClick={()=>{const d=writingDraftRef.current||writingDraft;setWritingDraft(d);getWritingFeedback(lesson,d);}}>
                    {writingLoading?<span className="spin">◌</span>:"Submit for Feedback →"}
                  </button>
                </div>
                {writingMicListening&&<div style={{fontSize:11,color:"var(--red)",fontWeight:700,marginTop:4}}>🎤 Listening... speak your writing and it will appear above.</div>}
                {writingDraftRef.current.trim().length<20&&writingDraft.length>0&&!writingMicListening&&<div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>Keep writing — try to write at least a few sentences!</div>}
              </div>
            </>
          )}

          {/* STEP 3: FEEDBACK */}
          {writingStep===3&&writingFeedback&&(
            <>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                <div className={`writing-score-badge ${badgeCls}`} style={{fontSize:14,padding:"6px 16px"}}>
                  {writingFeedback.score}/10 — {writingFeedback.scoreLabel}
                </div>
              </div>
              <div className="writing-feedback-box positive">
                <div style={{fontSize:11,fontWeight:800,color:"#166534",marginBottom:6}}>⭐ What you did WELL:</div>
                <div style={{fontSize:13,fontWeight:600,color:"#166534",lineHeight:1.7}}>{writingFeedback.praise}</div>
              </div>
              <div className="writing-feedback-box coaching">
                <div style={{fontSize:11,fontWeight:800,color:"#92400e",marginBottom:6}}>💡 How to make it even stronger:</div>
                <div style={{fontSize:13,fontWeight:600,color:"#92400e",lineHeight:1.7}}>{writingFeedback.improve}</div>
                {writingFeedback.exampleFix&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:8,background:"rgba(255,255,255,.6)",fontSize:12,fontWeight:600,color:"#92400e",whiteSpace:"pre-line"}}>{writingFeedback.exampleFix}</div>}
              </div>
              <div style={{padding:"12px 16px",borderRadius:12,background:"#eff6ff",border:"1px solid var(--blue)",fontSize:12,fontWeight:600,color:"var(--blue)"}}>
                🦉 {writingFeedback.nextStep}
              </div>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                {!writingFeedback.readyForNext&&(
                  <button className="writing-submit-btn" onClick={()=>{setWritingRevision(writingDraft);setWritingStep(4);}}>
                    Revise My Writing ✏️
                  </button>
                )}
                <button className="writing-next-btn" onClick={()=>setWritingStep(writingFeedback.readyForNext?5:4)}>
                  {writingFeedback.readyForNext?"Next Lesson! →":"Try Again →"}
                </button>
              </div>
            </>
          )}

          {/* STEP 4: REVISE */}
          {writingStep===4&&(
            <>
              <div style={{padding:"10px 14px",borderRadius:10,background:"#f0fdf4",border:"1px solid var(--green)",fontSize:12,fontWeight:600,color:"#166534",marginBottom:4}}>
                ✅ Original feedback saved! Now revise based on Nova's suggestions.
              </div>
              <div className="writing-try-area">
                <div className="writing-try-label">✏️ Revised Draft — {profile?.name}</div>
                <div style={{fontSize:11,color:"var(--muted)",fontWeight:600,marginBottom:8}}>Use Nova's feedback to make your writing stronger!</div>
                <textarea className="writing-textarea"
                  defaultValue={writingRevision||writingDraft}
                  onInput={e=>{writingRevisionRef.current=e.target.value;}}
                  onBlur={e=>{setWritingRevision(e.target.value);writingRevisionRef.current=e.target.value;}}
                  rows={8}
                  autoComplete="off"
                  autoCorrect="on"
                  spellCheck="true"
                  inputMode="text"
                  style={{WebkitUserSelect:"text",userSelect:"text"}}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,flexWrap:"wrap",gap:8}}>
                  {recognitionRef.current&&(
                    <button onClick={()=>toggleWritingMic("revision")}
                      style={{padding:"5px 10px",borderRadius:8,border:"none",background:writingMicListening?"linear-gradient(135deg,var(--red),#dc2626)":"linear-gradient(135deg,#64748b,#475569)",color:"#fff",fontFamily:"var(--font)",fontSize:11,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",gap:4,animation:writingMicListening?"pulseGlow 1s infinite":"none"}}>
                      {writingMicListening?"⏹ Stop":"🎤 Speak"}
                    </button>
                  )}
                  <button className="writing-submit-btn"
                    disabled={writingLoading}
                    onClick={()=>{const d=writingRevisionRef.current||writingRevision||writingDraft;setWritingRevision(d);getWritingFeedback(lesson,d,true);}}>
                    {writingLoading?<span className="spin">◌</span>:"Get Feedback on Revision →"}
                  </button>
                </div>
                {writingMicListening&&<div style={{fontSize:11,color:"var(--red)",fontWeight:700,marginTop:4}}>🎤 Listening... speak your revision and it will appear above.</div>}
              </div>
            </>
          )}

          {/* STEP 5: DONE */}
          {writingStep===5&&(
            <div style={{textAlign:"center",padding:"32px 20px"}}>
              <div style={{fontSize:60,marginBottom:12,animation:"float 1s ease-in-out infinite"}}>🎉</div>
              <div style={{fontSize:20,fontWeight:900,color:"var(--navy)",marginBottom:8}}>Lesson Complete, {profile?.name}!</div>
              <div style={{fontSize:13,fontWeight:600,color:"var(--muted)",marginBottom:20,lineHeight:1.7}}>
                You practiced <strong>{lesson.skillFocus}</strong>.<br/>
                {writingFeedback&&<>Your score: <strong style={{color:scoreColor}}>{writingFeedback.score}/10</strong></>}
              </div>
              <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
                <button className="writing-submit-btn" onClick={()=>{setWritingLesson(null);setWritingStep(0);}}>
                  More Lessons →
                </button>
                <button className="writing-next-btn" onClick={()=>{setWritingStep(0);setWritingDraft("");writingDraftRef.current="";setWritingRevision("");writingRevisionRef.current="";setWritingFeedback(null);}}>
                  Redo This Lesson ↺
                </button>
              </div>
            </div>
          )}

          {writingLoading&&writingStep!==2&&writingStep!==4&&(
            <div style={{textAlign:"center",padding:24}}>
              <span style={{fontSize:36,animation:"float 1s ease-in-out infinite",display:"block"}}>🦉</span>
              <div style={{marginTop:10,fontWeight:700,color:"var(--muted)"}}>Nova is reading your writing...</div>
            </div>
          )}
        </div>
      </div>
    );
  }

  function SubjectPicker(){
    return(
      <div className="subj-pick-wrap fade-in">
        <div className="subj-pick-title">What do you want to learn today, <em style={{color:"var(--blue)"}}>{profile?.name}</em>? 🦉</div>
        <div className="subj-pick-grid">
          {SUBJ.map(s=>{
            const pct=profile?.mastery?.[s.key]||0;
            return(
              <button key={s.key} className={"subj-pick-btn "+s.key} onClick={()=>{setLearnSubject(s.key);setLearnPhase("topics");}}>
                <div className="subj-pick-icon">{s.icon}</div>
                <div className="subj-pick-label">{s.label}</div>
                {pct>0&&<div className="subj-pick-pct" style={{color:mc(pct)}}>{pct}% mastered</div>}
              </button>
            );
          })}
          {/* Writing Tab */}
          <button className="subj-pick-btn" style={{borderColor:"#7c3aed",background:Object.keys(writingHistory).length>0?"#f5f3ff":"#fff"}}
            onClick={()=>setWritingMode(true)}>
            <div className="subj-pick-icon">✍️</div>
            <div className="subj-pick-label" style={{color:"#7c3aed"}}>Writing</div>
            {Object.keys(writingHistory).length>0&&<div className="subj-pick-pct" style={{color:"#7c3aed"}}>{Object.keys(writingHistory).length} lessons done</div>}
          </button>
        </div>
      </div>
    );
  }

  function TopicPicker(){
    const tm=profile?.topicMastery||{};
    const units=CURRICULUM[learnSubject]||[];
    const subj=SUBJ.find(s=>s.key===learnSubject);
    return(
      <div className="topic-pick-wrap fade-in">
        <button className="teaching-back" onClick={()=>setLearnPhase("subjects")}>← Back</button>
        <div style={{height:12}}/>
        <div className="topic-pick-title">{subj?.icon} {subj?.label} — Choose a Topic</div>
        <div className="topic-pick-sub">Pick a topic and Nova will explain it, then quiz you! 🎯</div>
        {units.map((unit,ui)=>(
          <div key={ui}>
            <div className="topic-unit-label">{unit.unit}</div>
            <div className="topic-pick-grid">
              {unit.nodes.map(node=>{
                const locked=!isUL(node,tm);
                const pct=tm[node.id]||0;
                const mastered=pct>=80;
                return(
                  <button key={node.id} className={"topic-pick-btn"+(locked?" locked":"")+(mastered?" mastered":"")}
                    onClick={()=>{if(!locked)startLesson(node);}}>
                    <div className="topic-pick-icon">{node.icon}</div>
                    <div style={{flex:1}}>
                      <div className="topic-pick-name">{node.name}{mastered?" ✅":""}</div>
                      <div className="topic-pick-sub2">{node.sub}{locked?" 🔒":""}</div>
                      {pct>0&&<div className="topic-pct-bar"><div className="topic-pct-fill" style={{width:pct+"%",background:pct>=80?"#22c55e":pct>=40?"#fbbf24":subj?.color||"#3b82f6"}}/></div>}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    );
  }

  function TeachingScreen(){
    const subj=SUBJ.find(s=>s.key===learnSubject);
    const nodeRes=learnTopic?RESOURCES[learnTopic.id]||[]:[];
    return(
      <div className="teaching-wrap">
        <div className="teaching-header">
          <button className="teaching-back" onClick={()=>{setLearnPhase("topics");setMessages([]);stopSpeaking();}}>← Topics</button>
          <div className="teaching-topic">{learnTopic?.icon} {learnTopic?.name}</div>
          <div className="teaching-phase phase-learn">📖 Lesson</div>
        </div>
        <div className="teaching-chat" ref={chatRef}>
          {messages.map((msg,i)=>(
            <div key={i} className="msg">
              <div className="avatar av-nova">🦉</div>
              {msg.loading
                ?<div className="typing"><div className="tdot"/><div className="tdot"/><div className="tdot"/></div>
                :<div className="bubble bubble-nova"><Blocks blocks={msg.blocks} topicIds={msg.topics||[]}/></div>
              }
            </div>
          ))}
          {!isLoading&&messages.length>0&&messages[messages.length-1]?.loading===false&&(
            <div style={{textAlign:"center",padding:"8px 0 16px"}}>
              {nodeRes.length>0&&(
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:800,color:"var(--muted)",marginBottom:6}}>📚 Practice Resources</div>
                  <div style={{display:"flex",gap:7,justifyContent:"center",flexWrap:"wrap"}}>
                    {nodeRes.map((r,ri)=><a key={ri} className="resource-link" href={r.url} target="_blank" rel="noreferrer" style={{background:r.bg,borderColor:r.color,color:r.color}}>{r.label} →</a>)}
                  </div>
                </div>
              )}
              <button className="ready-btn" onClick={startQuiz}>
                {isLoading?<span className="spin">◌</span>:"✅ I'm Ready — Start the Quiz!"}
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  function QuizScreen(){
    const q=quizQs[quizIdx];
    const subj=SUBJ.find(s=>s.key===learnSubject);
    if(isLoading||quizQs.length===0)return(
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
        <span style={{fontSize:44,animation:"float 1s ease-in-out infinite"}}>🦉</span>
        <div style={{fontSize:14,fontWeight:700,color:"var(--muted)"}}>Generating your quiz...</div>
      </div>
    );
    if(learnPhase==="results"){
      const total=quizQs.length;
      const pct=Math.round((quizScore/total)*100);
      const emoji=pct>=80?"🏆":pct>=60?"⭐":"💪";
      return(
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div className="quiz-score-card fade-in">
            <div style={{fontSize:52,marginBottom:8}}>{emoji}</div>
            <div style={{fontSize:22,fontWeight:900,color:"var(--navy)",marginBottom:4}}>Quiz Complete!</div>
            <div style={{fontSize:14,color:"var(--muted)",fontWeight:600,marginBottom:20}}>
              {profile?.name} scored <strong style={{color:mc(pct)}}>{quizScore} / {total}</strong> ({pct}%)
            </div>
            <div style={{height:10,background:"var(--border)",borderRadius:8,overflow:"hidden",marginBottom:20}}>
              <div style={{height:"100%",borderRadius:8,background:pct>=80?"#22c55e":pct>=50?"#fbbf24":"#ef4444",width:pct+"%",transition:"width .8s"}}/>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:pct>=80?"#166534":pct>=50?"#92400e":"#991b1b",marginBottom:24,lineHeight:1.6}}>
              {pct>=80?"Excellent work! 🎉 You've mastered this topic!":
               pct>=60?"Good job! A little more practice and you'll nail it! 📚":
               "Keep going! Every wrong answer helps you learn. Try again! 🔄"}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
              <button className="quiz-next-btn" style={{flex:1,maxWidth:180}} onClick={()=>{setLearnPhase("topics");setQuizQs([]);stopSpeaking();}}>← More Topics</button>
              <button className="ready-btn" style={{flex:1,maxWidth:180,margin:0}} onClick={()=>{startLesson(learnTopic);}}>🔄 Try Again</button>
            </div>
          </div>
        </div>
      );
    }
    if(!q)return null;
    return(
      <div style={{flex:1,overflow:"y-auto"}}>
        <div className="teaching-header">
          <button className="teaching-back" onClick={()=>{setLearnPhase("teaching");stopSpeaking();}}>← Lesson</button>
          <div className="teaching-topic">{learnTopic?.icon} {learnTopic?.name}</div>
          <div className="teaching-phase phase-quiz">🎯 Quiz</div>
        </div>
        <div style={{flex:1,overflow:"auto",padding:"16px 20px"}}>
          <div className="quiz-progress">
            <div className="quiz-prog-bar"><div className="quiz-prog-fill" style={{width:((quizIdx/quizQs.length)*100)+"%"}}/></div>
            <span style={{fontSize:11,fontWeight:800,color:"var(--muted)",whiteSpace:"nowrap"}}>{quizIdx+1} / {quizQs.length}</span>
          </div>
          <div className="quiz-q-card pop">
            <div className="quiz-q-num">Question {quizIdx+1} of {quizQs.length}</div>
            <div className="quiz-q-text">{q.q}</div>
            <div className="quiz-opts">
              {q.opts.map((opt,i)=>{
                let cls="quiz-opt";
                if(quizAnswered){if(i===q.correct)cls+=" correct";else if(i===quizSel)cls+=" wrong";}
                return(
                  <button key={i} className={cls} onClick={()=>handleQuizAnswer(i)} disabled={quizAnswered}>
                    <span style={{fontWeight:900,marginRight:6,color:"var(--muted)"}}>{["A","B","C","D"][i]}.</span>{opt}
                  </button>
                );
              })}
            </div>
            {quizAnswered&&(
              <div className={"quiz-explain "+(quizSel===q.correct?"ok":"no")}>
                {quizSel===q.correct?"✅ Correct! ":"❌ Not quite — "}{quizExplain}
              </div>
            )}
            {quizAnswered&&(
              <button className="quiz-next-btn" onClick={handleQuizNext}>
                {quizIdx<quizQs.length-1?"Next Question →":"See Results 🎉"}
              </button>
            )}
          </div>
        </div>
      </div>
    );
  }

  /* ── Main Sidebar (progress + game break) ── */
  function LearnSidebar(){
    const lvl=profile?getLevel(profile.xp||0):null;
    const writingDone=Object.keys(writingHistory).length;
    return(
      <div className="learn-sidebar">
        <div style={{fontSize:13,fontWeight:900,color:"var(--navy)",marginBottom:4}}>👤 {profile?.name}</div>
        <div style={{fontSize:10,fontWeight:600,color:"var(--muted)",marginBottom:8}}>{profile?.grade} grade · {lvl?.name}</div>
        {writingMode&&(
          <button onClick={()=>{setWritingMode(false);setWritingType(null);setWritingLesson(null);setWritingScreen("home");}}
            style={{width:"100%",padding:"7px",borderRadius:9,border:"2px solid #7c3aed",background:"#f5f3ff",fontFamily:"var(--font)",fontSize:11,fontWeight:800,cursor:"pointer",color:"#7c3aed",marginBottom:8}}>
            ← Back to STEM
          </button>
        )}
        <div className="sidebar-xp" style={{cursor:"pointer"}} onClick={()=>setShowRewards(true)}>
          <div className="sidebar-xp-val">⭐ {profile?.xp||0}</div>
          <div className="sidebar-xp-lbl">XP — Tap for Rewards!</div>
        </div>
        <div style={{marginTop:12}}>
          <div className="sidebar-label">Mastery</div>
          {[{key:"math",label:"Math",icon:"🔢",color:"#3b82f6"},{key:"science",label:"Science",icon:"⚛️",color:"#8b5cf6"},{key:"chemistry",label:"Chem",icon:"🧪",color:"#f97316"},{key:"biology",label:"Bio",icon:"🧬",color:"#22c55e"},{key:"coding",label:"Code",icon:"💻",color:"#14b8a6"},{key:"critical",label:"Think",icon:"🧠",color:"#ec4899"}].map(s=>(
            <div key={s.key} className="mastery-row">
              <div className="mastery-row-top"><span>{s.icon} {s.label}</span><span style={{color:mc(profile?.mastery?.[s.key]||0)}}>{profile?.mastery?.[s.key]||0}%</span></div>
              <div className="mastery-bar"><div className="mastery-fill" style={{width:(profile?.mastery?.[s.key]||0)+"%",background:s.color}}/></div>
            </div>
          ))}
        </div>
        {(profile?.gaps||[]).length>0&&(
          <div>
            <div className="sidebar-label">🎯 Focus Areas</div>
            {profile.gaps.slice(0,4).map((g,i)=>{
              // Map gap name → node IDs (same map as updateGaps)
              const GAP_MAP={"Fractions & Division":["m3","m4","m5","m13","m16"],"Decimals":["m14","m15"],"Place Value":["m11","m12"],"Ratios & Percents":["m17","m18","m19"],"Pre-Algebra":["m20","m21","m22","m27"],"Geometry":["m6","m7","m8","m23","m24"],"Data & Probability":["m25","m26"],"Forces & Motion":["s1","s2","s3","s4"],"Energy & Waves":["s18","s19","s20"],"States of Matter":["s5","s6","s7"],"Life Science":["s11","s12","s13","s14"],"Earth Science":["s15","s16","s17"],"Space Science":["s8"],"Ecosystems":["s10","s9"],"Chemistry Basics":["ch1","ch2","ch3"],"Chemical Reactions":["ch4","ch5","ch6","ch7"],"Cell Biology":["b1","b2"],"Human Body":["b3","b5","b6"],"Ecology & Evolution":["b4"],"Logic & Loops":["c3","c4"],"Variables & Functions":["c5","c6","c9","c10"],"Web & Advanced CS":["c11","c12","c13","c14"],"Fallacy Detectors":["ct1","ct2","ct3","ct4","ct5","ct6","ct7","ct8","ct9","ct10"],"Fact vs Fiction":["ct11","ct12","ct13","ct14","ct15"],"Brain Tricks":["ct16","ct17","ct18","ct19","ct20"],"Logic & Reasoning":["ct21","ct22","ct23","ct24"],"Debate Club":["ct25","ct26","ct27"]};
              // Find the weakest (lowest mastery) unlocked node in this gap
              const nodeIds=GAP_MAP[g]||[];
              const tm=profile?.topicMastery||{};
              const candidates=nodeIds.map(id=>gN(id)).filter(Boolean);
              // Pick the one with the lowest mastery score (prioritise started-but-low over not-started)
              const started=candidates.filter(n=>tm[n.id]!==undefined).sort((a,b)=>(tm[a.id]||0)-(tm[b.id]||0));
              const target=started[0]||candidates[0];
              const fixGap=()=>{
                if(!target)return;
                // Determine subject key from node id prefix
                const subKey=target.id.startsWith("m")?"math":target.id.startsWith("s")?"science":target.id.startsWith("ch")?"chemistry":target.id.startsWith("b")?"biology":target.id.startsWith("c")&&!target.id.startsWith("ch")?"coding":"critical";
                setWritingMode(false);
                setLearnSubject(subKey);
                setLearnTopic(null);
                setLearnPhase("topics");
                // Auto-launch lesson for this specific node after a tick
                setTimeout(()=>startLesson(target),50);
              };
              return(
                <div key={i} style={{marginBottom:6,padding:"8px 10px",borderRadius:10,background:"#fff7ed",border:"1px solid #fed7aa"}}>
                  <div style={{fontSize:10,fontWeight:800,color:"#92400e",marginBottom:5}}>→ {g}</div>
                  {target?(
                    <button onClick={fixGap} style={{width:"100%",padding:"5px 8px",borderRadius:7,border:"none",background:"linear-gradient(135deg,#f97316,#fbbf24)",color:"#fff",fontFamily:"var(--font)",fontSize:9,fontWeight:900,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                      🎯 Fix This Gap — {target.icon} {target.name}
                    </button>
                  ):(
                    <div style={{fontSize:9,color:"#92400e",fontWeight:600}}>Complete earlier topics first</div>
                  )}
                </div>
              );
            })}
          </div>
        )}
        <div style={{marginTop:"auto",paddingTop:8}}>
          {gameBreakReady?(
            <button onClick={()=>{setShowGamePopup(true);}}
              style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#f97316,#fbbf24)",color:"#fff",fontFamily:"Nunito,sans-serif",fontSize:12,fontWeight:900,cursor:"pointer",animation:"pulseGlow 2s infinite",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              🎮 Game Break Ready!
            </button>
          ):(
            <div style={{padding:"8px 10px",borderRadius:10,background:"rgba(59,130,246,.06)",border:"1px solid rgba(59,130,246,.15)",fontSize:10,fontWeight:700,color:"#475569",textAlign:"center"}}>
              🎮 Game break in {Math.max(0,15-Math.round((Date.now()-lastBreakTime)/1000/60))} min
            </div>
          )}
          <div style={{marginTop:8}}>
            <button className="voice-toggle" style={{width:"100%",justifyContent:"center"}}
              onClick={()=>{if(voiceOn)stopSpeaking();setVoiceOn(v=>!v);}}>
              <div className={"voice-toggle-dot"+(voiceOn?" active":"")} style={{background:voiceOn?"var(--teal)":"var(--border)"}}/>
              {voiceOn?"🔊 Voice ON":"🔇 Voice OFF"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* Tutor */
  if(showGameBreak)return(
    <div className="app">
      <Header/>
      <GameBreakScreen onReturn={handleGameReturn}/>
    </div>
  );

  return(
    <div className="app">
      <Header/>
      {xpToast&&<div className="xp-toast">{xpToast}</div>}
      {levelToast&&<div className="level-toast">{levelToast}</div>}
      {masteredToast&&<div className="mastered-toast">{masteredToast}</div>}
      {gapToast&&<div className="gap-toast">{gapToast}</div>}
      {showRewards&&<RewardsStore/>}
      {/* Game Break Popup */}
      {showGamePopup&&(
        <div className="game-popup-overlay" onClick={()=>setShowGamePopup(false)}>
          <div className="game-popup-card" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:60,marginBottom:12,animation:"bounce 1s ease infinite"}}>🎮</div>
            <div className="game-popup-title">Game Break Time!</div>
            <div className="game-popup-sub">
              You've been studying hard, {profile?.name}! 🌟<br/>
              You earned a 2-minute game break. Have fun!
            </div>
            <button className="game-popup-btn" onClick={()=>{setShowGamePopup(false);setShowGameBreak(true);}}>
              Let's Play! 🚀
            </button>
            <button className="game-popup-skip" onClick={()=>{setShowGamePopup(false);setGameBreakReady(false);handleGameReturn();}}>
              Skip for now — keep studying
            </button>
          </div>
        </div>
      )}
      <div className="learn-wrap">
        <LearnSidebar/>
        <div className="learn-main">
          {writingMode?(
            writingLesson?<WritingLessonScreen/>:
            writingType?<WritingLessonPicker/>:
            writingScreen==="scan"?<ScanScreen/>:
            writingScreen==="notes"?<StudentNotes/>:
            writingScreen==="essaywriter"?<EssayWriter/>:
            <WritingHome/>
          ):(
            <>
              {learnPhase==="subjects"&&<SubjectPicker/>}
              {learnPhase==="topics"&&<TopicPicker/>}
              {learnPhase==="teaching"&&<TeachingScreen/>}
              {(learnPhase==="quiz"||learnPhase==="results")&&<QuizScreen/>}
            </>
          )}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
