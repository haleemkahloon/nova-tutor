function buildPrompt(profile,subject,mode,isRem,remTopic){
  const{name,grade,mastery,gaps,strengths,topicMastery={},interests=[],struggleCount=0}=profile;
  const modeMap={mixed:"Mix of Socratic questions, clear explanation, and hands-on project ideas.",socratic:"ONLY guiding questions — never give direct answers. Make them discover.",lecture:"Explain clearly with a vivid real-world example, then do a comprehension check.",project:"Frame everything as a hands-on experiment or build challenge."};
  const tc=Object.entries(topicMastery).map(([id,pct])=>{const n=gN(id);return n?n.name+":"+pct+"%":null;}).filter(Boolean).join(", ");
  const ic=interests.length?"INTERESTS: "+interests.join(", ")+" — always weave these into examples naturally.":"";
  const rn=isRem&&remTopic?"\n⚠️ REMEDIATION MODE: "+name+" is struggling with \""+remTopic+"\". Stop advancing. Use a completely different analogy. Ask ONE simple guiding question to rebuild confidence. Praise any small progress.":"";
  const sn=struggleCount>2?"\nNOTE: "+name+" has struggled "+struggleCount+" times recently. Be extra patient, use simpler language, shorter sentences.":"";
  const fw="\nCURRICULUM FRAMEWORKS: You teach aligned to Khan Academy K-8, Mathnasium Method (Counting · Wholes & Parts · Proportional Thinking), NGSS Science Standards, Common Core Math, Code.org CS Standards, PhET Interactive Simulations (phet.colorado.edu), CK-12, Crash Course, HHMI BioInteractive, and Smithsonian Learning Lab. Reference these resources naturally when suggesting practice.\nMISSION: Prepare "+name+" for Ivy League admission and STEM excellence. Build deep conceptual understanding, NOT just rote memorization. Develop critical thinking, intellectual curiosity, and the ability to ask great questions.";
  return "You are Nova, an enthusiastic and encouraging STEM tutor for "+name+", a "+grade+" grade student.\nMASTERY: Math "+mastery.math+"% · Science "+mastery.science+"% · Coding "+mastery.coding+"%\nGAPS: "+(gaps.join(", ")||"None identified yet")+" | STRENGTHS: "+(strengths.join(", ")||"Still discovering")+"\nTOPIC PROGRESS: "+(tc||"None yet — fresh start!")+"\n"+ic+fw+"\nTEACHING MODE: "+(modeMap[mode]||modeMap.mixed)+"\n"+(subject?"CURRENT FOCUS SUBJECT: "+SUBJ.find(s=>s.key===subject)?.label:"")+rn+sn+"\nRULES: Always use "+name+"'s name. Connect every concept to their interests. Keep explanations to 4-8 sentences. Guide discovery — never just hand over answers. Use 🤔 Think About This!: blocks for challenges and ⭐ Fun Fact: for fascinating context.\nRESOURCES: After teaching a topic, end with a 📚 Practice Resources: block. Mention Khan Academy (with the specific grade/topic), Mathnasium for math, Code.org or Scratch for coding, NASA or Nat Geo Kids for science. Be specific — name the exact unit or activity they should try.";
}

  function TreePanel(){
    const tm=profile?.topicMastery||{};const units=CURRICULUM[treeSubject];const sc={math:"#3b82f6",science:"#8b5cf6",chemistry:"#f97316",biology:"#22c55e",coding:"#14b8a6",critical:"#ec4899"};
    const getStatus=node=>{if(!isUL(node,tm))return"locked";const pct=tm[node.id];if(pct===undefined)return"current";if(pct>=80)return"mastered";if(struggleTopics.includes(node.id))return"struggling-node";if((profile?.gaps||[]).some(g=>({"Fractions & Division":["m3","m4","m5","m13","m16"],"Decimals":["m14","m15"],"Place Value":["m11","m12"],"Ratios & Percents":["m17","m18","m19"],"Pre-Algebra":["m20","m21","m22","m27"],"Geometry":["m6","m7","m8","m23","m24"],"Data & Probability":["m25","m26"],"Forces & Motion":["s1","s2","s3","s4"],"Energy & Waves":["s18","s19","s20"],"States of Matter":["s5","s6","s7"],"Life Science":["s11","s12","s13","s14"],"Earth Science":["s15","s16","s17"],"Chemistry Basics":["ch1","ch2","ch3"],"Chemical Reactions":["ch4","ch5","ch6","ch7"],"Cell Biology":["b1","b2"],"Human Body":["b3","b5","b6"],"Ecology & Evolution":["b4"],"Logic & Loops":["c3","c4"],"Variables & Functions":["c5","c6","c9","c10"],"Fallacy Detectors":["ct1","ct2","ct3","ct4","ct5","ct6","ct7","ct8","ct9","ct10"],"Fact vs Fiction":["ct11","ct12","ct13","ct14","ct15"],"Brain Tricks":["ct16","ct17","ct18","ct19","ct20"],"Logic & Reasoning":["ct21","ct22","ct23","ct24"],"Debate Club":["ct25","ct26","ct27"]}[g]||[]).includes(node.id)))return"gap";return"current";};
    return(

          <div className="tree-tabs">{SUBJ.map(s=><button key={s.key} className={"tree-tab "+s.key+(treeSubject===s.key?" active":"")} onClick={()=>setTreeSubject(s.key)}>{s.icon}</button>)}</div>
        </div>
        <div className="tree-body">
          {units.map((unit,ui)=>(
            <div key={ui} className="tree-unit">
              <div className="tree-unit-label">{unit.unit}</div>
              {unit.nodes.map(node=>{const status=getStatus(node);const pct=tm[node.id]||0;const color=sc[treeSubject];const nodeRes=RESOURCES[node.id]||[];return(
                <div key={node.id} className={"tree-node "+status} onClick={()=>isUL(node,tm)&&sendMessage("Let's learn about: "+node.name+". "+node.sub)}>
                  <div className="tree-node-icon">{node.icon}</div>

                    <div className="tree-node-name">{node.name}</div>

                    {nodeRes.length>0&&<div className="tree-node-resources">{nodeRes.map((r,ri)=><a key={ri} className="tree-resource-badge" href={r.url} target="_blank" rel="noreferrer" style={{background:r.bg,color:r.color,border:"1px solid "+r.color}} onClick={e=>e.stopPropagation()}>{r.label}</a>)}</div>}
                  </div>
                  {status==="locked"?<span style={{fontSize:11}}>🔒</span>:status==="struggling-node"?<span style={{fontSize:11}}>⚠️</span>:pct>0?<div className="tree-node-pct" style={{color:mc(pct)}}>{pct}%</div>:null}
                </div>
              );})}
            </div>
          ))}
        </div>
        <div className="tree-legend">
          <div className="legend-item"><div className="legend-dot" style={{background:"#22c55e"}}/>Mastered</div>
          <div className="legend-item"><div className="legend-dot" style={{background:"#fbbf24"}}/>Progress</div>
          <div className="legend-item"><div className="legend-dot" style={{background:"#f97316"}}/>Gap</div>
          <div className="legend-item"><div className="legend-dot" style={{background:"#ef4444"}}/>Struggling</div>
          <div className="legend-item"><div className="legend-dot" style={{background:"#e2e8f0"}}/>Locked</div>
        </div>
      </div>
    );
  }

  /* Parent Hub Dashboard Pages */
  function ParentChildDashboard({childUser}){
    const cp=childProfiles[childUser];

    // Not loaded yet
    if(!cp)return(
      <div className="empty-state">
        <div className="empty-icon">⏳</div>
        <div className="empty-text">Loading {childUser}'s profile...</div>
      </div>
    );

    // Account exists but onboarding not completed
    if(!cp.setupComplete||!cp.mastery)return(
      <div className="empty-state">
        <div className="empty-icon">🎓</div>
        <div className="empty-text">
          <strong>{childUser}</strong> hasn't completed their setup yet.<br/>
          <span style={{fontSize:12,color:"var(--muted)",fontWeight:600}}>
            Ask them to open the app, log in as a Student, and complete the quick diagnostic quiz.
            Their progress will appear here once they're done.
          </span>
        </div>
      </div>
    );

    const mastery=cp.mastery||{math:0,science:0,coding:0};
    const gaps=cp.gaps||[];
    const strengths=cp.strengths||[];
    const xp=cp.xp||0;
    const sessions=cp.sessions||0;
    const topicMastery=cp.topicMastery||{};
    const struggleCount=cp.struggleCount||0;
    const name=cp.name||childUser;
    const grade=cp.grade||"";
    const sessionLog=cp.sessionLog||[];
    const interests=cp.interests||[];
    const masteredCount=Object.values(topicMastery).filter(v=>v>=80).length;const tot=allN().length;
    const lvl=getLevel(xp||0);const nxt=getNextLevel(xp||0);
    if(parentDashPage==="overview")return(<>
      {showWeeklyReport&&<WeeklyReport childUser={childUser} cp={cp} onClose={()=>setShowWeeklyReport(false)}/>}

        <div className="dash-page-title">{name}'s Overview</div>
        <button onClick={()=>setShowWeeklyReport(true)} style={{padding:"8px 16px",borderRadius:10,border:"none",background:"linear-gradient(135deg,var(--blue),var(--teal))",color:"#fff",fontFamily:"var(--font)",fontSize:11,fontWeight:800,cursor:"pointer"}}>📊 Weekly Report</button>
      </div>
      <div className="dash-page-sub">{grade} grade · Last session: {cp.lastSession?new Date(cp.lastSession).toLocaleDateString():"Not yet"}</div>
      <div className="stat-grid">
        <div className="stat-card"><div className="stat-icon">📅</div><div className="stat-val">{sessions||0}</div><div className="stat-lbl">Messages</div></div>
        <div className="stat-card"><div className="stat-icon">🏆</div><div className="stat-val">{masteredCount}/{tot}</div><div className="stat-lbl">Mastered</div></div>
        <div className="stat-card"><div className="stat-icon">⭐</div><div className="stat-val">{xp||50}</div><div className="stat-lbl">XP · Lvl {lvl.lvl}</div></div>
        <div className="stat-card"><div className="stat-icon">⚠️</div><div className="stat-val">{struggleCount||0}</div><div className="stat-lbl">Struggles</div></div>
      </div>
      {nxt&&<div className="dash-card" style={{marginBottom:16,background:"linear-gradient(135deg,#f5f3ff,#ede9fe)"}}>
        <div style={{fontSize:11,fontWeight:800,color:"var(--purple)",marginBottom:6}}>🎮 LEVEL — {lvl.name}</div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{flex:1,height:10,background:"rgba(139,92,246,.15)",borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",borderRadius:6,background:"linear-gradient(90deg,var(--purple),var(--pink))",width:Math.min(100,((xp-lvl.min)/(nxt.min-lvl.min))*100)+"%"}}/></div>
          <div style={{fontSize:11,fontWeight:800,color:"var(--purple)"}}>{xp}/{nxt.min} → {nxt.name}</div>
        </div>
      </div>}
      <div className="sec-title">Subject Mastery</div>
      <div className="dash-card">{[{label:"Math",key:"math",color:"#3b82f6"},{label:"Science",key:"science",color:"#8b5cf6"},{label:"Coding",key:"coding",color:"#14b8a6"}].map(s=>(
        <div key={s.key} className="dash-mastery-row"><div className="dash-mastery-lbl">{s.label}</div><div className="dash-mastery-bar"><div className="dash-mastery-fill" style={{width:(mastery[s.key]||0)+"%",background:s.color}}/></div><div className="dash-mastery-pct" style={{color:mc(mastery[s.key]||0)}}>{mastery[s.key]||0}%</div></div>
      ))}</div>
      {interests.length>0&&<><div className="sec-title">Interests</div><div className="dash-card"><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{interests.map((int,i)=><span key={i} style={{padding:"4px 12px",borderRadius:"20px",background:"#eff6ff",color:"var(--blue)",fontSize:12,fontWeight:700,border:"1px solid #bfdbfe"}}>{int}</span>)}</div></div></>}
      <div className="sec-title">Focus Areas & Strengths</div>
      <div className="dash-card">
        {gaps.map((g,i)=><div key={i} className="gap-row"><span className="badge-needs">Gap</span>{g}</div>)}
        {strengths.map((s,i)=><div key={i} className="gap-row"><span className="badge-ok">Strong</span>{s}</div>)}
      </div>
    </>);
    if(parentDashPage==="heatmap"){const h=v=>{if(v>=80)return 4;if(v>=60)return 3;if(v>=40)return 2;if(v>0)return 1;return 0;};return(<>
      <div className="dash-page-title">🗺️ {name}'s Mastery Heatmap</div>
      <div className="dash-page-sub">Topic-level mastery across the full curriculum</div>
      {Object.entries({math:CURRICULUM.math,science:CURRICULUM.science,coding:CURRICULUM.coding}).map(([subj,units])=>(
        <div key={subj} style={{marginBottom:20}}>
          <div className="sec-title">{SUBJ.find(s=>s.key===subj)?.icon} {SUBJ.find(s=>s.key===subj)?.label}</div>
          <div className="heatmap-grid">{units.flatMap(u=>u.nodes).map(node=>{const pct=topicMastery[node.id]||0;return(<div key={node.id} className={"heat-cell heat-"+h(pct)} title={node.name+": "+pct+"%"}><div className="heat-icon">{node.icon}</div><div className="heat-name">{node.name}</div><div className="heat-pct" style={{color:pct>0?mc(pct):"var(--muted)"}}>{pct>0?pct+"%":"—"}</div></div>);})}</div>
        </div>
      ))}
    </>);}

      <div className="dash-page-title">📋 {name}'s Session Log</div>

        :sessionLog.map((s,i)=>{const{month,day,time}=fD(s.date);return(<div key={i} className="session-card"><div className="session-date-col"><div className="session-month">{month}</div><div className="session-day">{day}</div></div><div className="session-body"><div className="session-title">Session at {time}</div><div className="session-meta">Math {s.mastery?.math}% · Science {s.mastery?.science}% · Coding {s.mastery?.coding}%{s.hadStruggle?" · ⚠️ Struggled":""}</div><div className="session-topics">{(s.topics||[]).map((t,j)=><span key={j} className="session-topic-tag">{t}</span>)}{s.hadStruggle&&<span className="session-topic-tag gap-tag">Remediation</span>}</div></div><div className="session-xp">+{s.xpGained} XP</div></div>);})}
    </>);}
    if(parentDashPage==="settings")return(<>
      <div className="dash-page-title">⚙️ Settings</div>

        <div className="settings-title">👶 Linked Children</div>
        <div className="settings-sub">Edit your child's display name or remove them from your dashboard.</div>
        {(parentData?.children||[]).map((cu,i)=>{

          const[saving,setSaving]=React.useState(false);
          const saveChildName=async()=>{

            setSaving(true);

            const updated={...base,name:editName.trim(),grade:editGrade,username:cu};
            const ok=await sb.updateProfile(cu,updated);

                    <select value={editGrade} onChange={e=>setEditGrade(e.target.value)}

                    <button onClick={()=>setEditing(false)} style={{padding:"7px 12px",borderRadius:8,border:"2px solid var(--border)",background:"#fff",fontFamily:"var(--font)",fontSize:11,fontWeight:800,cursor:"pointer",color:"var(--muted)"}}>Cancel</button>
                  </div>
                  <div style={{fontSize:10,color:"var(--muted)",fontWeight:600,marginTop:6}}>💡 This updates the name shown everywhere in Nova</div>
                </div>
              )}
            </div>
          );
        })}
        <button onClick={()=>setShowAddChild(true)} style={{marginTop:4,padding:"9px 18px",borderRadius:9,border:"2px solid var(--blue)",background:"#fff",fontFamily:"var(--font)",fontSize:12,fontWeight:800,cursor:"pointer",color:"var(--blue)"}}>+ Add Another Child</button>

        <div className="settings-title">🔑 API Key</div>
        <div className="settings-sub">Change the Anthropic API key.</div>
        <button onClick={changeApiKey} style={{padding:"9px 18px",borderRadius:9,border:"2px solid var(--border)",background:"#fff",fontFamily:"var(--font)",fontSize:12,fontWeight:800,cursor:"pointer",color:"var(--muted)"}}>Change API Key</button>
      </div>
    </>);
    return null;
  }

  /* ── Build revised essay with strikethrough + highlights ── */
  const buildRevisedEssay=()=>{
    const text=scanTextRef.current||scanText;
    if(!text||!scanIssues.length)return null;
    // Build a map of original→replacement for chosen fixes
    const replacements=[];
    scanIssues.forEach((issue,idx)=>{
      if(scanChoices[idx]!==undefined&&issue.type!=="strength"){
        replacements.push({
          original:issue.original,
          chosen:issue.options[scanChoices[idx]]?.text||"",
          type:issue.type,
        });
      }
    });
    // Split text into segments, marking replacements
    let segments=[{text,type:"unchanged"}];
    replacements.forEach(rep=>{
      const newSegs=[];
      segments.forEach(seg=>{
        if(seg.type!=="unchanged"){newSegs.push(seg);return;}
        const idx=seg.text.indexOf(rep.original);
        if(idx===-1){newSegs.push(seg);return;}
        if(idx>0)newSegs.push({text:seg.text.slice(0,idx),type:"unchanged"});
        newSegs.push({text:rep.original,type:"strike",chosen:rep.chosen,issueType:rep.type});
        const after=seg.text.slice(idx+rep.original.length);
        if(after)newSegs.push({text:after,type:"unchanged"});
      });
      segments=newSegs;
    });
    return segments;
  };

  /* ── Generate essay using Claude ── */
  /* ── Revise essay based on student instruction ── */
  const reviseEssay=async()=>{
    const instruction=essayRevisionRef.current||essayRevisionInput;
    if(!instruction.trim()||!essayOutput)return;
    setEssayRevisionLoading(true);
    // Add user message to history
    const userMsg={role:"user",text:instruction.trim()};
    setEssayRevisionHistory(prev=>[...prev,userMsg]);
    setEssayRevisionInput("");
    essayRevisionRef.current="";

    const highlightInstructions=essayHighlights?`
After the revised essay, add a JSON block wrapped in <HIGHLIGHTS> tags:
<HIGHLIGHTS>{"thesis":["exact thesis sentence"],"topic":["topic sentence 1","topic sentence 2","topic sentence 3"],"evidence":["key evidence phrase 1","key evidence phrase 2"],"transition":["transition phrase 1","transition phrase 2"]}</HIGHLIGHTS>`:"";

    const prompt=`You are Nova, an expert writing tutor. A ${profile?.grade} grade student named ${profile?.name} has written an essay and wants to revise it.

CURRENT ESSAY:
"""
${essayOutput.body}
"""

STUDENT'S REVISION REQUEST: "${instruction.trim()}"

Please revise the essay according to the student's request. Keep the same style, voice, and grade level. Only change what the student asked for — don't rewrite the whole thing unless asked.

Return ONLY the revised essay text (no commentary, no "Here is the revised essay:", just the essay itself).${highlightInstructions}`;

    try{
      const key=localStorage.getItem("nova_api_key");
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:2000,messages:[{role:"user",content:prompt}]})});
      const data=await r.json();
      if(data.error)throw new Error(data.error.message);
      const raw=data.content?.[0]?.text||"";

      let bodyText=raw;
      let highlights={thesis:[],topic:[],evidence:[],transition:[]};
      const hMatch=raw.match(/<HIGHLIGHTS>([\s\S]*?)<\/HIGHLIGHTS>/);
      if(hMatch){
        bodyText=raw.replace(/<HIGHLIGHTS>[\s\S]*?<\/HIGHLIGHTS>/,"").trim();
        try{highlights=JSON.parse(hMatch[1]);}catch{}
      }
      const wc=bodyText.trim().split(/\s+/).length;
      setEssayOutput(prev=>({...prev,body:bodyText,highlights,wordCount:wc}));
      const novaMsg={role:"nova",text:"✅ Done! I've updated the essay. "+getRevisionConfirmation(instruction)};
      setEssayRevisionHistory(prev=>[...prev,novaMsg]);
    }catch(err){
      setEssayRevisionHistory(prev=>[...prev,{role:"nova",text:"Sorry, I had trouble making that change. Please try again!"}]);
    }
    setEssayRevisionLoading(false);
  };

  const getRevisionConfirmation=(instruction)=>{
    const i=instruction.toLowerCase();
    if(i.includes("add")||i.includes("include"))return "The new content has been added.";
    if(i.includes("remov")||i.includes("delet"))return "That part has been removed.";
    if(i.includes("shorter")||i.includes("shorten"))return "The essay is now shorter.";
    if(i.includes("longer")||i.includes("expand"))return "The essay has been expanded.";
    if(i.includes("formal"))return "The tone has been made more formal.";
    if(i.includes("simpl")||i.includes("easier"))return "The language has been simplified.";
    return "Your changes have been applied.";
  };

    const buildHighlightedHTML=(body,highlights)=>{
      if(!highlights||(!highlights.thesis?.length&&!highlights.topic?.length))return body.replace(/\n/g,"<br/>");
      let html=body;
      const marks=[
        ...(highlights.thesis||[]).map(t=>({text:t,style:"background:#fef9c3;font-weight:bold;",label:"Thesis"})),
        ...(highlights.topic||[]).map(t=>({text:t,style:"background:#dbeafe;",label:"Topic Sentence"})),

        ...(highlights.transition||[]).map(t=>({text:t,style:"background:#f3e8ff;",label:"Transition"})),
      ].filter(m=>m.text&&html.includes(m.text));
      marks.forEach(m=>{
        html=html.replace(m.text,`<mark style="${m.style}padding:1px 3px;border-radius:2px;" title="${m.label}">${m.text}</mark>`);

    const legendHTML=essayHighlights?`

      </div>`:"";

    printWindow.document.write(`<!DOCTYPE html><html><head>
      <meta charset="UTF-8"/>
      <title>${essayOutput.topic}</title>
      <style>
        body{font-family:Georgia,serif;max-width:680px;margin:40px auto;color:#111;line-height:1.8}
        h1{font-size:22px;margin-bottom:4px}
        .meta{font-size:11px;color:#6b7280;font-family:Arial,sans-serif;margin-bottom:24px}
        .body{font-size:13px;line-height:1.9;white-space:pre-wrap}
        @media print{body{margin:20px} @page{margin:2cm}}
      </style>
    </head><body>
      <h1>${essayOutput.topic}</h1>
      <div class="meta">
        ${typeLabel[essayOutput.type]||essayOutput.type} &nbsp;·&nbsp;
        ${essayOutput.wordCount} words &nbsp;·&nbsp;
        ${profile?.name||"Student"}, ${profile?.grade||""} grade &nbsp;·&nbsp;
        ${new Date(essayOutput.date).toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}
      </div>
      ${legendHTML}
      <div class="body">${buildHighlightedHTML(essayOutput.body,essayHighlights?essayOutput.highlights:{})}</div>
      ${revisionsHTML}
    </body></html>`);
    printWindow.document.close();
    printWindow.focus();
    setTimeout(()=>printWindow.print(),400);
  };

  /* ── Fetch content from a URL via Claude web_search tool ── */
  const fetchFromUrl=async()=>{
    const url=(essayUrlRef.current||essayUrlInput).trim();
    if(!url)return;
    setEssayUrlLoading(true);
    setEssayUrlStatus(null);
    try{
      const key=localStorage.getItem("nova_api_key");
      // Use Claude with web_search tool to fetch and summarize the URL
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-haiku-4-5-20251001",
          max_tokens:1500,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:`Please visit this URL and extract all the main content/text from it so I can use it as research material for an essay: ${url}\n\nReturn only the extracted content, organized clearly. No commentary.`}]
        })
      });
      const data=await r.json();
      if(data.error)throw new Error(data.error.message);
      // Get text content from response (may include tool results)
      const textBlocks=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
      if(textBlocks&&textBlocks.length>50){
        const snippet=textBlocks.slice(0,150)+"...";
        const newResearch=(essayResearchRef.current||essayResearch)+"\n\n--- From "+url+" ---\n"+textBlocks;
        setEssayResearch(newResearch.trim());
        essayResearchRef.current=newResearch.trim();
        setEssaySources(prev=>[...prev,{type:"url",label:url,snippet}]);
        setEssayUrlStatus("ok");
        setEssayUrlInput("");
      }else{
        // Fallback: use Claude's knowledge about the URL's topic
        const r2=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:800,messages:[{role:"user",content:`Summarize the key information and facts from this resource URL that would be useful for writing an essay: ${url}\n\nProvide factual content, key points, and important details. Return only the content summary, no commentary.`}]})
        });
        const d2=await r2.json();
        const txt=(d2.content?.[0]?.text||"").trim();
        if(txt){
          const newResearch=(essayResearchRef.current||essayResearch)+"\n\n--- From "+url+" ---\n"+txt;
          setEssayResearch(newResearch.trim());
          essayResearchRef.current=newResearch.trim();
          setEssaySources(prev=>[...prev,{type:"url",label:url,snippet:txt.slice(0,150)+"..."}]);
          setEssayUrlStatus("ok");
          setEssayUrlInput("");
        }else throw new Error("No content");
      }
    }catch(err){
      setEssayUrlStatus("error");
    }
    setEssayUrlLoading(false);
  };

  const generateEssay=async()=>{
    const topicVal=(essayTopicRef.current||essayTopic).trim();if(!topicVal)return;
    setEssayLoading(true);
    setEssayOutput(null);
    const lengthMap={short:"3 paragraphs (~200 words)",medium:"5 paragraphs (~400 words)",long:"7 paragraphs (~600 words)"};
    const typeMap={opinion:"opinion/persuasive essay",informational:"informational/explanatory essay",narrative:"personal narrative",compare:"compare and contrast essay",research:"research-based essay"};
    const research=essayResearchRef.current||essayResearch;
    const highlightInstructions=essayHighlights?`
After writing the essay, add a JSON block at the very end (after the essay text) wrapped in <HIGHLIGHTS> tags like this:
<HIGHLIGHTS>{"thesis":["exact thesis sentence"],"topic":["topic sentence 1","topic sentence 2","topic sentence 3"],"evidence":["key evidence phrase 1","key evidence phrase 2"],"transition":["transition phrase 1","transition phrase 2"]}</HIGHLIGHTS>
These will be used to color-code the essay for the student.`:"";

    const prompt=`You are Nova, an expert writing tutor. Write a ${typeMap[essayType]} for ${profile?.name}, a ${profile?.grade} grade student, on this topic: "${topicVal}"

Length: ${lengthMap[essayLength]}
Grade level: ${profile?.grade} grade — use age-appropriate vocabulary and sentence structure
${research?`Research material provided by the student:\n"""\n${research}\n"""\nUse this material to support the essay. Cite facts from it naturally.`:"Use your knowledge to write an accurate, well-supported essay."}

Write a complete, polished essay. Use proper paragraph breaks. Start with a strong hook. End with a memorable conclusion.
${highlightInstructions}

Write the essay now:`;

    try{
      const key=localStorage.getItem("nova_api_key");
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:2000,messages:[{role:"user",content:prompt}]})});
      const data=await r.json();
      if(data.error)throw new Error(data.error.message);
      const raw=data.content?.[0]?.text||"";

      // Parse highlights if present
      let bodyText=raw;
      let highlights={thesis:[],topic:[],evidence:[],transition:[]};
      const hMatch=raw.match(/<HIGHLIGHTS>([\s\S]*?)<\/HIGHLIGHTS>/);
      if(hMatch){
        bodyText=raw.replace(/<HIGHLIGHTS>[\s\S]*?<\/HIGHLIGHTS>/,"").trim();
        try{highlights=JSON.parse(hMatch[1]);}catch{}
      }
      const wc=bodyText.trim().split(/\s+/).length;
      setEssayOutput({body:bodyText,highlights,wordCount:wc,topic:topicVal,type:essayType,length:essayLength,date:new Date().toISOString()});
    }catch(err){
      setEssayOutput({body:"Sorry, Nova had trouble writing the essay. Please try again.",highlights:{},wordCount:0,topic:topicVal,type:essayType,length:essayLength,date:new Date().toISOString()});
    }
    setEssayLoading(false);
  };

  /* ── Highlight essay text ── */
  const renderHighlightedEssay=(body,highlights)=>{
    if(!highlights||(!highlights.thesis?.length&&!highlights.topic?.length))return body;
    const allMarks=[
      ...(highlights.thesis||[]).map(t=>({text:t,cls:"essay-highlight-thesis",label:"Thesis"})),
      ...(highlights.topic||[]).map(t=>({text:t,cls:"essay-highlight-topic",label:"Topic Sentence"})),
      ...(highlights.evidence||[]).map(t=>({text:t,cls:"essay-highlight-evidence",label:"Evidence"})),
      ...(highlights.transition||[]).map(t=>({text:t,cls:"essay-highlight-transition",label:"Transition"})),
    ].filter(m=>m.text&&body.includes(m.text));

    if(!allMarks.length)return <span className="essay-output-body">{body}</span>;

    // Build segments
    let segments=[{text:body,cls:null}];
    allMarks.forEach(mark=>{
      const newSegs=[];
      segments.forEach(seg=>{
        if(seg.cls){newSegs.push(seg);return;}
        const idx=seg.text.indexOf(mark.text);
        if(idx===-1){newSegs.push(seg);return;}
        if(idx>0)newSegs.push({text:seg.text.slice(0,idx),cls:null});
        newSegs.push({text:mark.text,cls:mark.cls,label:mark.label});
        const after=seg.text.slice(idx+mark.text.length);
        if(after)newSegs.push({text:after,cls:null});
      });
      segments=newSegs;
    });
    return(
      <span className="essay-output-body">
        {segments.map((seg,i)=>seg.cls
          ?<mark key={i} className={seg.cls} title={seg.label}>{seg.text}</mark>
          :<span key={i}>{seg.text}</span>
        )}
      </span>
    );
  };

        const prompt=`This is a photo of a student's handwritten or printed essay/writing assignment.

Please extract ALL the text you can see in the image, exactly as written. 
- Preserve paragraph breaks with blank lines
- Keep the student's original spelling and grammar (do NOT fix errors — the writing coach will handle that)
- If handwriting is unclear, do your best to interpret it
- Only return the extracted text, nothing else — no commentary, no "Here is the text:", just the raw text`;

        const r=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({

              content:[

      }catch(err){

  };

    const prompt=`You are Nova, a warm and encouraging writing coach reviewing ${profile?.name}'s writing. ${profile?.name} is a ${profile?.grade} grade student.

Here is their writing to review:
"""
${text}
"""

Your job: Find 4-7 specific, actionable issues in this writing. For each issue, provide 2-3 rewrite options the student can choose from.

Respond ONLY with valid JSON array, no markdown, no explanation:
[
  {
    "type": "grammar|clarity|structure|word-choice|strength",
    "original": "exact phrase or sentence from the text (keep it short, max 15 words)",
    "why": "Friendly explanation of what's happening and why it matters. 1-2 sentences. Be encouraging, not critical. Start with the student's name sometimes.",
    "options": [
      {"label": "Option A", "text": "rewritten version", "reason": "why this version is stronger (1 sentence)"},
      {"label": "Option B", "text": "different rewrite approach", "reason": "why this works (1 sentence)"},

    ]

]

Types:

- clarity: confusing sentences, vague words, unclear meaning
- structure: paragraph organization, missing transitions, weak intro/conclusion

- strength: a GOOD thing they did — celebrate it! Include at least 1-2 of these.

Rules:

- Maximum 7 issues total. Quality over quantity.
- NEVER be harsh. Always frame as "here's how to make it even better"`;

    try{
      const key=localStorage.getItem("nova_api_key");
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:2000,messages:[{role:"user",content:prompt}]})});

              </button>

            {wordCount>0&&wordCount<10&&<div style={{fontSize:11,color:"var(--muted)",marginTop:6}}>Write at least a few sentences so Nova can give useful feedback!</div>}
          </div>
        )}

        {/* Loading */}
        {scanLoading&&(
          <div style={{textAlign:"center",padding:48,background:"#fff",borderRadius:18,border:"2px solid var(--border)"}}>
            <div style={{fontSize:48,animation:"float 1s ease-in-out infinite",marginBottom:12}}>🦉</div>
            <div style={{fontSize:15,fontWeight:900,color:"var(--navy)",marginBottom:6}}>Nova is reading your essay...</div>
            <div style={{fontSize:12,color:"var(--muted)",fontWeight:600}}>Checking every sentence carefully. This takes a few seconds!</div>
          </div>
        )}

        {/* Results */}
        {scanIssues.length>0&&!scanLoading&&(
          <>
            <div style={{background:"linear-gradient(135deg,#f5f3ff,#eff6ff)",borderRadius:14,padding:"14px 18px",border:"2px solid rgba(139,92,246,.2)"}}>
              <div style={{fontSize:14,fontWeight:900,color:"var(--navy)",marginBottom:4}}>🦉 Nova's Review — {scanTitle||"Your Essay"}</div>
              <div style={{fontSize:12,color:"var(--muted)",fontWeight:600,marginBottom:8}}>
                Nova found <strong>{scanIssues.filter(i=>i.type!=="strength").length} things to improve</strong> and <strong>{scanIssues.filter(i=>i.type==="strength").length} things you did great!</strong><br/>
                For each one, pick the version you like best or skip it. Then save to your Notes!
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {Object.entries({grammar:"🔴 Grammar",clarity:"🟠 Clarity",structure:"🔵 Structure","word-choice":"🟣 Word Choice",strength:"🟢 Strengths"}).map(([k,v])=>{
                  const count=scanIssues.filter(i=>i.type===k).length;
                  if(!count)return null;
                  return <span key={k} style={{fontSize:10,fontWeight:800,padding:"2px 9px",borderRadius:20,background:"#fff",color:typeColors[k],border:"1px solid "+typeColors[k]}}>{v}: {count}</span>;
                })}
              </div>
            </div>

            {scanIssues.map((issue,idx)=>(
              <div key={idx} className={"scan-issue-card "+issue.type}>
                <div className={"scan-issue-type "+issue.type}>{typeEmoji[issue.type]} {issue.type==="word-choice"?"Word Choice":issue.type.charAt(0).toUpperCase()+issue.type.slice(1)}</div>
                <div className="scan-original">"{issue.original}"</div>
                <div className="scan-why">💡 {issue.why}</div>
                {issue.type!=="strength"?(
                  <>
                    <div className="scan-option-label">✏️ Choose a better version:</div>
                    <div className="scan-options">
                      {issue.options.map((opt,oi)=>(
                        <div key={oi}>
                          <button
                            className={"scan-option-btn"+(scanChoices[idx]===oi?" chosen":"")}
                            onClick={()=>handleChoice(idx,oi)}>
                            <span style={{fontWeight:900,color:"var(--purple)",marginRight:6}}>{opt.label}.</span>{opt.text}
                          </button>
                          {scanChoices[idx]===oi&&(
                            <div className="scan-why-box">✅ {opt.reason}</div>
                          )}
                        </div>
                      ))}
                    </div>
                    {scanChoices[idx]!==undefined&&<div style={{fontSize:10,color:"var(--green)",fontWeight:800,marginTop:6}}>✓ Choice saved to your notes!</div>}
                  </>
                ):(
                  <>
                    <div className="scan-option-label">⭐ Build on this strength:</div>
                    <div className="scan-options">
                      {issue.options.map((opt,oi)=>(
                        <button key={oi} className={"scan-option-btn"+(scanChoices[idx]===oi?" chosen":"")}
                          style={{borderColor:"var(--green)"}}
                          onClick={()=>handleChoice(idx,oi)}>
                          <span style={{fontWeight:900,color:"var(--green)",marginRight:6}}>{opt.label}.</span>{opt.text}
                        </button>
                      ))}
                    </div>
                  </>
                )}
              </div>
            ))}

            <div style={{display:"flex",gap:10,padding:"4px 0 16px",flexWrap:"wrap"}}>
              {/* Progress indicator */}
              {totalFixable>0&&(
                <div style={{width:"100%",padding:"10px 14px",borderRadius:10,background:choicesMade===totalFixable?"#f0fdf4":"#f8fafc",border:"1px solid "+(choicesMade===totalFixable?"var(--green)":"var(--border)"),display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1,height:6,background:"var(--border)",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",background:"var(--green)",borderRadius:4,width:((choicesMade/totalFixable)*100)+"%",transition:"width .4s"}}/>
                  </div>
                  <span style={{fontSize:11,fontWeight:800,color:choicesMade===totalFixable?"var(--green)":"var(--muted)",whiteSpace:"nowrap"}}>{choicesMade}/{totalFixable} choices made</span>
                </div>
              )}

              {/* Revised Essay toggle */}
              {choicesMade>0&&(
                <button onClick={()=>setShowRevisedEssay(v=>!v)}
                  style={{width:"100%",padding:"12px",borderRadius:12,border:"2px solid "+(showRevisedEssay?"var(--green)":"var(--purple)"),background:showRevisedEssay?"#f0fdf4":"#f5f3ff",fontFamily:"var(--font)",fontSize:12,fontWeight:900,cursor:"pointer",color:showRevisedEssay?"var(--green)":"var(--purple)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  {showRevisedEssay?"📄 Hide Revised Essay":"📝 Show Revised Essay with Changes"}
                </button>
              )}

              {/* Revised essay view */}
              {showRevisedEssay&&choicesMade>0&&(()=>{
                const segments=buildRevisedEssay();
                if(!segments)return null;
                return(
                  <div className="revised-essay-wrap" style={{width:"100%"}}>
                    <div className="revised-essay-title">
                      ✅ Your Revised Essay
                      <span style={{fontSize:10,fontWeight:600,color:"var(--muted)",marginLeft:"auto"}}><span style={{textDecoration:"line-through",color:"#94a3b8"}}>original</span> → <mark style={{background:"#dcfce7",padding:"1px 4px",borderRadius:3}}>chosen fix</mark></span>
                    </div>
                    <div className="revised-para">
                      {segments.map((seg,i)=>{
                        if(seg.type==="unchanged")return<span key={i} className="unchanged-text">{seg.text}</span>;
                        return(
                          <span key={i}>
                            <span className="original-strike">{seg.text}</span>
                            {" "}
                            <span className="chosen-text">{seg.chosen}</span>
                          </span>
                        );
                      })}
                    </div>
                    <div style={{fontSize:10,color:"var(--muted)",fontWeight:600,marginTop:8,borderTop:"1px solid var(--border)",paddingTop:8}}>
                      🟡 <span style={{textDecoration:"line-through"}}>struck text</span> = original &nbsp;·&nbsp; <span style={{background:"#dcfce7",padding:"1px 4px",borderRadius:3,fontWeight:700,color:"#166534"}}>green text</span> = your chosen revision
                    </div>
                  </div>
                );
              })()}

              <button onClick={saveNoteFromScan}
                style={{flex:1,padding:"13px",borderRadius:12,border:"none",background:"linear-gradient(135deg,var(--purple),var(--blue))",color:"#fff",fontFamily:"var(--font)",fontSize:13,fontWeight:900,cursor:"pointer",boxShadow:"0 4px 14px rgba(139,92,246,.3)"}}>
                📓 Save to My Notes
              </button>
              <button onClick={()=>{setScanIssues([]);setScanChoices({});setScanText("");scanTextRef.current="";setScanTitle("");setScanImagePreview(null);setShowRevisedEssay(false);}}
                style={{padding:"13px 20px",borderRadius:12,border:"2px solid var(--border)",background:"#fff",fontFamily:"var(--font)",fontSize:13,fontWeight:800,cursor:"pointer",color:"var(--muted)"}}>
                Scan Another ↺
              </button>
            </div>
          </>
        )}
      </div>
    );
  }

  /* ── Student Notes Screen ── */
  function StudentNotes(){
    const note=viewingNote?studentNotes.find(n=>n.id===viewingNote):null;
    const typeColors={grammar:"var(--red)",clarity:"var(--orange)",structure:"var(--blue)","word-choice":"var(--purple)",strength:"var(--green)"};
    const typeEmoji={grammar:"🔴",clarity:"🟠",structure:"🔵","word-choice":"🟣",strength:"🟢"};

    const downloadNote=(n)=>{
      const chosen=n.choices||{};
      let content=`STUDENT WRITING NOTES\n${n.title}\n${new Date(n.date).toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}\nStudent: ${n.studentName||""} · Grade: ${n.grade||""}\n\n`;
      content+=`${"═".repeat(60)}\nORIGINAL ESSAY\n${"═".repeat(60)}\n${n.original}\n\n`;
      content+=`${"═".repeat(60)}\nNOVA'S FEEDBACK\n${"═".repeat(60)}\n`;
      (n.issues||[]).forEach((issue,i)=>{
        content+=`\n[${issue.type.toUpperCase()}] "${issue.original}"\n`;
        content+=`Why: ${issue.why}\n`;
        if(chosen[i]!==undefined){
          const opt=issue.options[chosen[i]];
          content+=`✓ Chosen revision (${opt.label}): ${opt.text}\n`;
          content+=`   Reason: ${opt.reason}\n`;
        } else {
          content+=`(No revision chosen for this item)\n`;
        }
      });
      const blob=new Blob([content],{type:"text/plain"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.download=`nova-notes-${(n.title||"essay").replace(/[^a-z0-9]/gi,"-").toLowerCase()}-${new Date(n.date).toISOString().slice(0,10)}.txt`;
      a.click();URL.revokeObjectURL(url);
    };

    if(note){
      const chosen=note.choices||{};
      const isEssay=note.type==="essay";

      // Essay note view
      if(isEssay){
        const downloadEssayNote=()=>{
          const blob=new Blob([note.body||""],{type:"text/plain"});
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");
          a.href=url;a.download=`nova-essay-${(note.title||"essay").replace(/[^a-z0-9]/gi,"-").toLowerCase()}-${new Date(note.date).toISOString().slice(0,10)}.txt`;
          a.click();URL.revokeObjectURL(url);
        };
        return(
          <div className="notes-wrap fade-in">
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
              <button className="writing-back" onClick={()=>setViewingNote(null)}>← All Notes</button>
              <div style={{fontSize:14,fontWeight:900,color:"var(--navy)",flex:1}}>{note.title}</div>
              <button onClick={downloadEssayNote} style={{padding:"6px 12px",borderRadius:20,border:"none",background:"linear-gradient(135deg,var(--blue),var(--teal))",color:"#fff",fontFamily:"var(--font)",fontSize:10,fontWeight:800,cursor:"pointer"}}>⬇️ Download</button>
            </div>
            <div style={{fontSize:10,color:"var(--muted)",fontWeight:600,marginBottom:12,display:"flex",gap:10,flexWrap:"wrap"}}>
              <span>{new Date(note.date).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</span>
              <span>· {note.studentName} · {note.grade} grade</span>
              <span>· {note.wordCount} words</span>
              {note.updatedAt&&<span style={{color:"var(--green)"}}>· Updated {new Date(note.updatedAt).toLocaleDateString()}</span>}
            </div>

            {/* Continue Editing button */}
            <button onClick={()=>{
              // Load essay back into EssayWriter
              setEssayOutput({body:note.body,highlights:note.highlights||{},wordCount:note.wordCount,topic:note.title,type:note.essayType||"opinion",length:note.essayLength||"medium",date:note.date});
              setEssayRevisionHistory(note.revisionHistory||[]);
              setEssayRevisionInput("");
              essayRevisionRef.current="";
              setEssaySavedNoteId(note.id);
              setEssaySources(note.sources||[]);
              setViewingNote(null);
              setWritingScreen("essaywriter");
            }} style={{width:"100%",padding:"13px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",color:"#fff",fontFamily:"var(--font)",fontSize:13,fontWeight:900,cursor:"pointer",boxShadow:"0 4px 14px rgba(124,58,237,.3)",marginBottom:4}}>
              ✏️ Continue Editing This Essay
            </button>
            <div style={{textAlign:"center",fontSize:10,color:"var(--muted)",fontWeight:600,marginBottom:14}}>Opens in Essay Writer — all your revisions are preserved</div>

            {/* Essay body */}
            <div className="note-card">
              <div className="note-card-header">
                <div className="note-title">📄 Essay</div>
                <span style={{fontSize:10,fontWeight:700,color:"var(--muted)"}}>{note.essayType} · {note.wordCount} words</span>
              </div>
              <div style={{fontSize:13,lineHeight:1.9,fontWeight:600,color:"var(--text)",whiteSpace:"pre-wrap"}}>{note.body}</div>
            </div>

            {/* Revision history */}
            {(note.revisionHistory||[]).length>0&&(
              <div className="note-card">
                <div className="note-card-header">
                  <div className="note-title">💬 Revision History</div>
                  <span style={{fontSize:10,fontWeight:700,color:"var(--muted)"}}>{note.revisionHistory.length} messages</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {note.revisionHistory.map((msg,i)=>(
                    <div key={i} style={{padding:"7px 10px",borderRadius:8,fontSize:11,fontWeight:600,lineHeight:1.5,background:msg.role==="user"?"#fff7ed":"#f0fdf4",color:msg.role==="user"?"#92400e":"#166534",borderLeft:"3px solid "+(msg.role==="user"?"var(--orange)":"var(--green)")}}>
                      <span style={{fontWeight:900}}>{msg.role==="user"?note.studentName||"Student":"🦉 Nova"}:</span>{" "}{msg.text}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Sources used */}
            {(note.sources||[]).length>0&&(
              <div className="note-card">
                <div className="note-card-header"><div className="note-title">🔬 Sources Used</div></div>
                {note.sources.map((src,i)=>(
                  <div key={i} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:"1px solid var(--border)",fontSize:11,fontWeight:600,color:"var(--muted)"}}>
                    <span>{src.type==="web"?"🔍":src.type==="url"?"🌐":src.type==="pdf"?"📄":src.type==="image"?"📷":"📎"}</span>
                    <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{src.label}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }
      return(
        <div className="notes-wrap fade-in">
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
            <button className="writing-back" onClick={()=>setViewingNote(null)}>← All Notes</button>
            <div style={{fontSize:14,fontWeight:900,color:"var(--navy)",flex:1}}>{note.title}</div>
            <button onClick={()=>downloadNote(note)} style={{padding:"6px 14px",borderRadius:20,border:"none",background:"linear-gradient(135deg,var(--blue),var(--teal))",color:"#fff",fontFamily:"var(--font)",fontSize:10,fontWeight:800,cursor:"pointer"}}>⬇️ Download</button>
          </div>
          <div style={{fontSize:10,color:"var(--muted)",fontWeight:600,marginBottom:8}}>{new Date(note.date).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})} · {note.studentName} · {note.grade} grade</div>

          {/* Original essay */}
          <div className="note-card">
            <div className="note-card-header">
              <div className="note-title">📄 Original Essay</div>
            </div>
            <div className="note-original">{note.original}</div>
          </div>

          {/* Annotations */}
          <div className="note-card">
            <div className="note-card-header">
              <div className="note-title">🦉 Nova's Annotations</div>
              <div style={{fontSize:10,color:"var(--muted)",fontWeight:600}}>{Object.keys(chosen).length} of {(note.issues||[]).length} revisions chosen</div>
            </div>
            <div className="note-annotations">
              {(note.issues||[]).map((issue,i)=>{
                const ch=chosen[i];
                return(
                  <div key={i} className={"note-annotation "+issue.type}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                      <span>{typeEmoji[issue.type]}</span>
                      <span style={{fontWeight:900,textTransform:"uppercase",fontSize:9,letterSpacing:"1px"}}>{issue.type}</span>
                    </div>
                    <div style={{fontStyle:"italic",marginBottom:4,opacity:.8}}>Original: "{issue.original}"</div>
                    <div style={{marginBottom:4}}>{issue.why}</div>
                    {ch!==undefined?(
                      <div style={{background:"rgba(255,255,255,.6)",borderRadius:6,padding:"5px 8px",marginTop:4}}>
                        <span style={{fontWeight:900}}>✓ Chosen ({issue.options[ch]?.label}): </span>{issue.options[ch]?.text}
                        <div style={{fontSize:10,opacity:.8,marginTop:2}}>{issue.options[ch]?.reason}</div>
                      </div>
                    ):(
                      <div style={{opacity:.6,fontSize:10,fontStyle:"italic"}}>No revision chosen</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    return(
      <div className="notes-wrap fade-in">
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <button className="writing-back" onClick={()=>setWritingScreen("home")}>← Writing</button>
          <div style={{fontSize:16,fontWeight:900,color:"var(--navy)"}}> 📓 My Student Notes</div>
          <button onClick={()=>setWritingScreen("scan")} style={{marginLeft:"auto",padding:"6px 14px",borderRadius:20,border:"none",background:"linear-gradient(135deg,var(--purple),var(--blue))",color:"#fff",fontFamily:"var(--font)",fontSize:10,fontWeight:800,cursor:"pointer"}}>+ Scan Essay</button>
        </div>
        {studentNotes.length===0?(
          <div style={{textAlign:"center",padding:40,background:"#fff",borderRadius:18,border:"2px dashed var(--border)"}}>
            <div style={{fontSize:40,marginBottom:12}}>📓</div>
            <div style={{fontSize:14,fontWeight:900,color:"var(--navy)",marginBottom:8}}>No notes yet!</div>
            <div style={{fontSize:12,color:"var(--muted)",fontWeight:600,marginBottom:16}}>Scan an essay and Nova will save your feedback and chosen revisions here.</div>
            <button onClick={()=>setWritingScreen("scan")} style={{padding:"11px 24px",borderRadius:12,border:"none",background:"linear-gradient(135deg,var(--purple),var(--blue))",color:"#fff",fontFamily:"var(--font)",fontSize:12,fontWeight:800,cursor:"pointer"}}>📄 Scan My First Essay</button>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {studentNotes.map(n=>{
              const isEssay=n.type==="essay";
              const chosen=isEssay?0:Object.keys(n.choices||{}).length;
              const total=isEssay?0:(n.issues||[]).length;
              const improvements=isEssay?0:(n.issues||[]).filter(i=>i.type!=="strength").length;
              return(
                <div key={n.id} className="note-card" style={{cursor:"pointer",transition:"all .15s",borderLeft:"4px solid "+(isEssay?"var(--purple)":"var(--blue)")}}
                  onClick={()=>setViewingNote(n.id)}>
                  <div className="note-card-header">
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <span style={{fontSize:16}}>{isEssay?"✏️":"📄"}</span>
                      <div>
                        <div className="note-title">{n.title}</div>
                        <span style={{fontSize:9,fontWeight:800,padding:"1px 7px",borderRadius:10,background:isEssay?"#f5f3ff":"#eff6ff",color:isEssay?"var(--purple)":"var(--blue)"}}>{isEssay?"ESSAY":"SCAN"}</span>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <button onClick={e=>{e.stopPropagation();downloadNote(n);}} style={{padding:"4px 10px",borderRadius:20,border:"none",background:"var(--blue)",color:"#fff",fontFamily:"var(--font)",fontSize:9,fontWeight:800,cursor:"pointer"}}>⬇️</button>
                      <button onClick={e=>{e.stopPropagation();const updated=studentNotes.filter(x=>x.id!==n.id);setStudentNotes(updated);const u=localStorage.getItem("nova_user")||"";localStorage.setItem("nova_notes_"+u,JSON.stringify(updated));}} style={{padding:"4px 10px",borderRadius:20,border:"none",background:"#fef2f2",color:"var(--red)",fontFamily:"var(--font)",fontSize:9,fontWeight:800,cursor:"pointer"}}>🗑️</button>
                    </div>
                  </div>
                  <div className="note-date">{new Date(n.date).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}{n.updatedAt&&<span style={{color:"var(--green)",marginLeft:6}}>· updated {new Date(n.updatedAt).toLocaleDateString()}</span>}</div>
                  <div style={{marginTop:8,display:"flex",gap:8,flexWrap:"wrap"}}>
                    {isEssay?(
                      <>
                        <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:20,background:"#f5f3ff",color:"var(--purple)"}}>{n.wordCount||0} words</span>
                        <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:20,background:"#f0fdf4",color:"var(--green)"}}>{(n.revisionHistory||[]).filter(m=>m.role==="user").length} revisions</span>
                        {(n.sources||[]).length>0&&<span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:20,background:"#eff6ff",color:"var(--blue)"}}>{n.sources.length} sources</span>}
                      </>
                    ):(
                      <>
                        <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:20,background:"#f5f3ff",color:"var(--purple)"}}>{total} annotations</span>
                        <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:20,background:"#f0fdf4",color:"var(--green)"}}>{chosen} revisions chosen</span>
                        <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:20,background:"#eff6ff",color:"var(--blue)"}}>{improvements} improvements</span>
                      </>
                    )}
                  </div>
                  <div style={{marginTop:8,fontSize:11,color:"var(--muted)",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isEssay?(n.body||"").slice(0,120):(n.original||"").slice(0,120)}...</div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  /* ── Essay Writer Screen ── */
  function EssayWriter(){
    const lengthOpts=[{k:"short",l:"Short",d:"~200 words · 3 paragraphs"},{k:"medium",l:"Medium",d:"~400 words · 5 paragraphs"},{k:"long",l:"Long",d:"~600 words · 7 paragraphs"}];
    const typeOpts=[{k:"opinion",l:"Opinion",icon:"💬"},{k:"informational",l:"Informational",icon:"📚"},{k:"narrative",l:"Narrative",icon:"📖"},{k:"compare",l:"Compare & Contrast",icon:"⚖️"},{k:"research",l:"Research",icon:"🔬"}];
    const wc=essayOutput?.wordCount||0;
    const downloadEssay=()=>{
      if(!essayOutput)return;
      const blob=new Blob([essayOutput.body],{type:"text/plain"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.download=`nova-essay-${essayTopic.replace(/[^a-z0-9]/gi,"-").toLowerCase().slice(0,30)}-${new Date().toISOString().slice(0,10)}.txt`;
      a.click();URL.revokeObjectURL(url);
    };
    return(
      <div className="essay-writer-wrap fade-in">
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
          <button className="writing-back" onClick={()=>{setWritingScreen("home");setEssayOutput(null);}}>← Back</button>
          <div style={{fontSize:16,fontWeight:900,color:"var(--navy)"}}> ✏️ Write My Essay</div>
        </div>
        <div style={{fontSize:11,color:"var(--muted)",fontWeight:600,marginBottom:4}}>Tell Nova what to write about and how. Nova will write a full essay tailored to your grade level, with key parts highlighted.</div>

        {!essayOutput&&!essayLoading&&(<>
          {/* Topic */}
          <div className="essay-config-card">
            <div className="essay-config-title">📌 What's your essay topic?</div>
            <input
              defaultValue={essayTopic}
              onInput={e=>{essayTopicRef.current=e.target.value;}}
              onBlur={e=>{setEssayTopic(e.target.value);essayTopicRef.current=e.target.value;}}
              placeholder={`e.g. "Why every school should have a garden" or "The water cycle" or "My best day ever"`}
              autoComplete="off"
              inputMode="text"
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"2px solid var(--border)",fontFamily:"var(--font)",fontSize:13,fontWeight:600,outline:"none",color:"var(--navy)",transition:"border-color .15s",WebkitUserSelect:"text",userSelect:"text"}}
              onFocus={e=>e.target.style.borderColor="#7c3aed"}/>
          </div>

          {/* Type */}
          <div className="essay-config-card">
            <div className="essay-config-title">📝 What type of essay?</div>
            <div className="essay-option-row">
              {typeOpts.map(t=>(
                <button key={t.k} className={"essay-option-pill"+(essayType===t.k?" active":"")} onClick={()=>setEssayType(t.k)}>
                  {t.icon} {t.l}
                </button>
              ))}
            </div>
          </div>

          {/* Length */}
          <div className="essay-config-card">
            <div className="essay-config-title">📏 How long?</div>
            <div className="essay-option-row">
              {lengthOpts.map(l=>(
                <button key={l.k} className={"essay-option-pill"+(essayLength===l.k?" active":"")} onClick={()=>setEssayLength(l.k)}>
                  <div style={{fontWeight:900}}>{l.l}</div>
                  <div style={{fontSize:9,fontWeight:600,opacity:.8}}>{l.d}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Research material */}
          <div className="essay-config-card">
            <div className="essay-config-title">🔬 Research & Source Material <span style={{fontSize:10,fontWeight:600,color:"var(--muted)"}}>(optional)</span></div>
            <div style={{fontSize:11,color:"var(--muted)",fontWeight:600,marginBottom:12}}>Add sources in any format — Nova will read them all and weave the information into the essay.</div>

            {/* Source buttons row */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>

              {/* 🔍 Web Search — full width row */}
              <div style={{width:"100%",display:"flex",gap:6,alignItems:"center",padding:"12px 14px",borderRadius:12,background:"linear-gradient(135deg,#f0f9ff,#e0f2fe)",border:"2px solid var(--blue)"}}>
                <span style={{fontSize:20,flexShrink:0}}>🔍</span>
                <div style={{flex:1,position:"relative"}}>
                  <input
                    defaultValue={essayWebQuery}
                    onInput={e=>{essayWebQueryRef.current=e.target.value;}}
                    onBlur={e=>{setEssayWebQuery(e.target.value);essayWebQueryRef.current=e.target.value;}}
                    onKeyDown={e=>e.key==="Enter"&&searchWeb()}
                    placeholder={`Search the web... e.g. "effects of climate change on oceans"`}
                    autoComplete="off"
                    inputMode="search"
                    style={{width:"100%",padding:"9px 12px",borderRadius:9,border:"2px solid rgba(59,130,246,.3)",fontFamily:"var(--font)",fontSize:12,fontWeight:600,outline:"none",color:"var(--navy)",background:"#fff",WebkitUserSelect:"text",userSelect:"text"}}/>
                </div>
                <button onClick={searchWeb}
                  disabled={essayWebLoading}
                  style={{padding:"9px 16px",borderRadius:9,border:"none",background:"linear-gradient(135deg,var(--blue),var(--teal))",color:"#fff",fontFamily:"var(--font)",fontSize:11,fontWeight:900,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap",boxShadow:"0 2px 8px rgba(59,130,246,.3)"}}>
                  {essayWebLoading
                    ?<span className="spin" style={{display:"inline-block"}}>◌</span>
                    :"Search →"}
                </button>
              </div>
              {essayWebStatus==="ok"&&<div style={{width:"100%",fontSize:11,color:"var(--green)",fontWeight:700}}>✅ Web results added to research!</div>}
              {essayWebStatus==="error"&&<div style={{width:"100%",fontSize:11,color:"var(--red)",fontWeight:700}}>❌ Search failed. Try a different query or paste content manually.</div>}
              {essayWebLoading&&<div style={{width:"100%",fontSize:11,color:"var(--blue)",fontWeight:700}}><span className="spin" style={{display:"inline-block",marginRight:5}}>◌</span>Searching the web for "{essayWebQueryRef.current||essayWebQuery}"...</div>}

              {/* Divider */}
              <div style={{width:"100%",display:"flex",alignItems:"center",gap:8,color:"var(--muted)",fontSize:10,fontWeight:700}}>
                <div style={{flex:1,height:1,background:"var(--border)"}}/>
                OR ADD FROM
                <div style={{flex:1,height:1,background:"var(--border)"}}/>
              </div>

              {/* URL input */}
              <div style={{flex:1,minWidth:200,display:"flex",gap:6,alignItems:"center"}}>
                <div style={{position:"relative",flex:1}}>
                  <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14}}>🌐</span>
                  <input
                    defaultValue={essayUrlInput}
                    onInput={e=>{essayUrlRef.current=e.target.value;}}
                    onBlur={e=>{setEssayUrlInput(e.target.value);essayUrlRef.current=e.target.value;}}
                    onKeyDown={e=>e.key==="Enter"&&fetchFromUrl()}
                    placeholder="Paste a specific URL..."
                    autoComplete="off"
                    inputMode="url"
                    style={{width:"100%",padding:"8px 10px 8px 32px",borderRadius:9,border:"2px solid "+(essayUrlStatus==="ok"?"var(--green)":essayUrlStatus==="error"?"var(--red)":"var(--border)"),fontFamily:"var(--font)",fontSize:11,fontWeight:600,outline:"none",color:"var(--navy)",background:essayUrlStatus==="ok"?"#f0fdf4":essayUrlStatus==="error"?"#fef2f2":"#fff"}}/>
                </div>
                <button onClick={fetchFromUrl} disabled={essayUrlLoading||!(essayUrlRef.current||essayUrlInput).trim()}
                  style={{padding:"8px 12px",borderRadius:9,border:"none",background:(essayUrlRef.current||essayUrlInput).trim()?"var(--navy)":"var(--border)",color:"#fff",fontFamily:"var(--font)",fontSize:11,fontWeight:800,cursor:(essayUrlRef.current||essayUrlInput).trim()?"pointer":"not-allowed",flexShrink:0,whiteSpace:"nowrap"}}>
                  {essayUrlLoading?<span className="spin" style={{display:"inline-block"}}>◌</span>:"Fetch →"}
                </button>
              </div>

              {/* Upload any file */}
              <label style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:9,border:"2px solid var(--teal)",background:"#f0fdfa",cursor:"pointer",fontSize:11,fontWeight:800,color:"#0f766e",flexShrink:0}}>
                <input type="file"
                  accept=".pdf,.txt,.doc,.docx,.rtf,image/*"
                  style={{display:"none"}}
                  onChange={e=>e.target.files[0]&&loadFile(e.target.files[0])}/>
                {essayFileLoading?<span className="spin" style={{display:"inline-block"}}>◌</span>:"📎"} Upload File
              </label>

              {/* Scan photo */}
              <label style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:9,border:"2px solid var(--blue)",background:"#eff6ff",cursor:"pointer",fontSize:11,fontWeight:800,color:"var(--blue)",flexShrink:0}}>
                <input type="file" accept="image/*" capture="environment" style={{display:"none"}}
                  onChange={e=>e.target.files[0]&&loadFile(e.target.files[0])}/>
                {essaySearching?<span className="spin" style={{display:"inline-block"}}>◌</span>:"📷"} Take Photo
              </label>
            </div>

            {/* Status messages */}
            {essayUrlStatus==="ok"&&<div style={{fontSize:11,color:"var(--green)",fontWeight:700,marginBottom:8}}>✅ Content fetched from URL and added to research!</div>}
            {essayUrlStatus==="error"&&<div style={{fontSize:11,color:"var(--red)",fontWeight:700,marginBottom:8}}>❌ Couldn't fetch that URL. Try pasting the content directly below.</div>}
            {essayFileLoading&&<div style={{fontSize:11,color:"var(--teal)",fontWeight:700,marginBottom:8}}><span className="spin" style={{display:"inline-block"}}>◌</span> Reading file...</div>}

            {/* Sources added so far */}
            {essaySources.length>0&&(
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,fontWeight:800,letterSpacing:"1px",textTransform:"uppercase",color:"var(--muted)",marginBottom:6}}>Sources added:</div>
                {essaySources.map((src,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"7px 10px",borderRadius:8,background:"#f8fafc",border:"1px solid var(--border)",marginBottom:5}}>
                    <span style={{fontSize:14,flexShrink:0}}>{src.type==="url"?"🌐":src.type==="web"?"🔍":src.type==="pdf"?"📄":src.type==="image"?"📷":"📎"}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:10,fontWeight:800,color:"var(--navy)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{src.label}</div>
                      <div style={{fontSize:10,color:"var(--muted)",fontWeight:600,lineHeight:1.4,marginTop:2}}>{src.snippet}</div>
                    </div>
                    <button onClick={()=>{
                      setEssaySources(prev=>prev.filter((_,j)=>j!==i));
                      // Remove corresponding section from research text
                      const newR=(essayResearchRef.current||essayResearch).split("\n\n--- From "+src.label+" ---\n").join("\n\n").trim();
                      setEssayResearch(newR);essayResearchRef.current=newR;
                    }} style={{padding:"2px 7px",borderRadius:6,border:"none",background:"#fee2e2",color:"var(--red)",fontFamily:"var(--font)",fontSize:9,fontWeight:800,cursor:"pointer",flexShrink:0}}>✕</button>
                  </div>
                ))}
              </div>
            )}

            {/* Manual paste */}
            <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:6}}>Or paste notes / quotes directly:</div>
            <textarea
              key={essayResearch}
              defaultValue={essayResearch}
              onInput={e=>essayResearchRef.current=e.target.value}
              onBlur={e=>{setEssayResearch(e.target.value);essayResearchRef.current=e.target.value;}}
              placeholder="Paste research notes, quotes, or facts here..."
              rows={4}
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"2px solid var(--border)",fontFamily:"var(--font)",fontSize:12,fontWeight:600,color:"var(--text)",resize:"vertical",outline:"none",lineHeight:1.7,background:"#fafafa"}}/>
          </div>

          {/* Highlights toggle */}
          <div className="essay-config-card" style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{flex:1}}>
              <div className="essay-config-title" style={{marginBottom:2}}>🎨 Highlight key parts?</div>
              <div style={{fontSize:11,color:"var(--muted)",fontWeight:600}}>Nova will colour-code the thesis, topic sentences, evidence, and transitions so you can see how the essay is structured.</div>
            </div>
            <button onClick={()=>setEssayHighlights(v=>!v)} style={{padding:"8px 16px",borderRadius:20,border:"none",background:essayHighlights?"var(--green)":"var(--border)",color:essayHighlights?"#fff":"var(--muted)",fontFamily:"var(--font)",fontSize:11,fontWeight:900,cursor:"pointer",flexShrink:0}}>
              {essayHighlights?"ON ✓":"OFF"}
            </button>
          </div>

          <button onClick={generateEssay} disabled={!(essayTopicRef.current||essayTopic).trim()}
            style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:(essayTopicRef.current||essayTopic).trim()?"linear-gradient(135deg,#7c3aed,#4f46e5)":"var(--border)",color:"#fff",fontFamily:"var(--font)",fontSize:14,fontWeight:900,cursor:(essayTopicRef.current||essayTopic).trim()?"pointer":"not-allowed",boxShadow:(essayTopicRef.current||essayTopic).trim()?"0 4px 18px rgba(124,58,237,.35)":"none"}}>
            ✏️ Write My Essay
          </button>
        </>)}

        {/* Loading */}
        {essayLoading&&(
          <div style={{textAlign:"center",padding:56,background:"#fff",borderRadius:18,border:"2px solid var(--border)"}}>
            <div style={{fontSize:52,animation:"float 1s ease-in-out infinite",marginBottom:14}}>🦉</div>
            <div style={{fontSize:15,fontWeight:900,color:"var(--navy)",marginBottom:6}}>Nova is writing your essay...</div>
            <div style={{fontSize:12,color:"var(--muted)",fontWeight:600}}>Crafting a {essayLength} {essayType} essay about "{essayTopic}"</div>
          </div>
        )}

        {/* Output */}
        {essayOutput&&!essayLoading&&(
          <>
            <div className="essay-output-wrap">
              <div className="essay-output-title">{essayOutput.topic}</div>
              <div className="essay-output-meta">
                <span>📝 {essayOutput.type}</span>
                <span>📏 {essayOutput.wordCount} words</span>
                <span>🎓 {profile?.grade} grade</span>
                <span>{new Date(essayOutput.date).toLocaleDateString()}</span>
              </div>
              {essayHighlights&&essayOutput.highlights&&Object.keys(essayOutput.highlights).length>0&&(
                <div className="essay-legend">
                  {[{cls:"essay-highlight-thesis",col:"#fef9c3",label:"Thesis"},{cls:"essay-highlight-topic",col:"#dbeafe",label:"Topic Sentences"},{cls:"essay-highlight-evidence",col:"#dcfce7",label:"Evidence"},{cls:"essay-highlight-transition",col:"#f3e8ff",label:"Transitions"}].map(l=>(
                    <div key={l.cls} className="essay-legend-item">
                      <div className="essay-legend-dot" style={{background:l.col,border:"1px solid rgba(0,0,0,.1)"}}/>
                      {l.label}
                    </div>
                  ))}
                </div>
              )}
              <div style={{lineHeight:1.9,fontSize:13,fontWeight:600,whiteSpace:"pre-wrap"}}>
                {essayHighlights?renderHighlightedEssay(essayOutput.body,essayOutput.highlights):<span>{essayOutput.body}</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button onClick={printEssay}
                style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#1e293b,#334155)",color:"#fff",fontFamily:"var(--font)",fontSize:12,fontWeight:900,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                🖨️ Print / Save PDF
              </button>
              <button onClick={downloadEssay}
                style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:"linear-gradient(135deg,var(--blue),var(--teal))",color:"#fff",fontFamily:"var(--font)",fontSize:12,fontWeight:900,cursor:"pointer"}}>
                ⬇️ Download .txt
              </button>
            </div>

            {/* Save to Notes — prominent green button */}
            <button onClick={()=>{saveEssayToNotes();}}
              style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:essaySavedNoteId?"linear-gradient(135deg,var(--green),var(--teal))":"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",fontFamily:"var(--font)",fontSize:13,fontWeight:900,cursor:"pointer",boxShadow:"0 4px 14px rgba(22,163,74,.3)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {essaySavedNoteId?"✅ Saved to Notes — Click to Update":"📓 Save to My Notes"}
            </button>
            {essaySavedNoteId&&(
              <div style={{textAlign:"center",fontSize:11,color:"var(--green)",fontWeight:700,marginTop:-6}}>
                This essay is saved. Every revision you make is auto-saved when you click the button above.
              </div>
            )}

            {/* Revision box */}
            <div className="essay-revision-box">
              <div className="essay-revision-title">
                ✏️ Request a Change
                <span style={{fontSize:10,fontWeight:600,color:"#92400e",marginLeft:"auto"}}>Tell Nova what to add, remove, or change</span>
              </div>
              {essayRevisionHistory.length>0&&(
                <div className="essay-revision-history">
                  {essayRevisionHistory.map((msg,i)=>(
                    <div key={i} className={"essay-revision-msg "+msg.role}>
                      {msg.role==="user"&&<span style={{fontWeight:800,marginRight:4}}>{profile?.name}:</span>}
                      {msg.role==="nova"&&<span style={{fontWeight:800,marginRight:4}}>🦉 Nova:</span>}
                      {msg.text}
                    </div>
                  ))}
                  {essayRevisionLoading&&(
                    <div className="essay-revision-msg nova">
                      <span className="spin" style={{display:"inline-block"}}>◌</span> Updating your essay...
                    </div>
                  )}
                </div>
              )}
              <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                <textarea
                  placeholder={`e.g. "Add a paragraph about recycling" · "Make it shorter" · "Remove the last sentence" · "Make the introduction more exciting"`}
                  defaultValue={essayRevisionInput}
                  onInput={e=>essayRevisionRef.current=e.target.value}
                  onBlur={e=>{setEssayRevisionInput(e.target.value);essayRevisionRef.current=e.target.value;}}
                  rows={3}
                  disabled={essayRevisionLoading}
                  style={{flex:1,padding:"10px 12px",borderRadius:10,border:"2px solid #fed7aa",fontFamily:"var(--font)",fontSize:12,fontWeight:600,color:"var(--text)",resize:"none",outline:"none",lineHeight:1.6,background:essayRevisionLoading?"#f8fafc":"#fffbeb"}}/>
                <button
                  onClick={reviseEssay}
                  disabled={essayRevisionLoading||(essayRevisionRef.current||essayRevisionInput).trim().length===0}
                  style={{padding:"10px 16px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#f97316,#fbbf24)",color:"#fff",fontFamily:"var(--font)",fontSize:12,fontWeight:900,cursor:"pointer",flexShrink:0,alignSelf:"flex-end"}}>
                  {essayRevisionLoading?<span className="spin" style={{display:"inline-block"}}>◌</span>:"Update →"}
                </button>
              </div>
            </div>

            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button onClick={()=>{setEssayOutput(null);setEssayRevisionHistory([]);setEssayRevisionInput("");essayRevisionRef.current="";setEssaySavedNoteId(null);}}
                style={{flex:1,padding:"12px",borderRadius:12,border:"2px solid var(--purple)",background:"#f5f3ff",fontFamily:"var(--font)",fontSize:12,fontWeight:900,cursor:"pointer",color:"var(--purple)"}}>
                ✏️ Write New Essay
              </button>
              <button onClick={()=>{setScanText(essayOutput.body);scanTextRef.current=essayOutput.body;setScanTitle(essayOutput.topic);setScanIssues([]);setScanChoices([]);setShowRevisedEssay(false);setWritingScreen("scan");}}
                style={{flex:1,padding:"12px",borderRadius:12,border:"2px solid var(--orange)",background:"#fff7ed",fontFamily:"var(--font)",fontSize:12,fontWeight:900,cursor:"pointer",color:"var(--orange)"}}>
                🔍 Scan for Feedback
              </button>
              <button onClick={()=>{setWritingScreen("notes");}}
                style={{flex:1,padding:"12px",borderRadius:12,border:"2px solid var(--green)",background:"#f0fdf4",fontFamily:"var(--font)",fontSize:12,fontWeight:900,cursor:"pointer",color:"var(--green)"}}>
                📓 View Notes
              </button>
            </div>
          </>
        )}
      </div>
    );
  }

  function WritingHome(){
    const done=WRITING_TYPES.reduce((a,wt)=>a+wt.lessons.filter(l=>writingHistory[l.id]&&writingHistory[l.id].score>=6).length,0);
    const total=WRITING_TYPES.reduce((a,wt)=>a+wt.lessons.length,0);
    return(
      <div className="writing-home fade-in">
