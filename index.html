<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nova STEM Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a2744;--navy2:#243258;--blue:#3b82f6;--teal:#14b8a6;--yellow:#fbbf24;--orange:#f97316;--green:#22c55e;--purple:#8b5cf6;--red:#ef4444;--pink:#ec4899;--white:#fff;--border:#e2e8f0;--muted:#64748b;--text:#1e293b;--font:'Nunito',sans-serif;--mono:'Fira Code',monospace}
html,body,#root{height:100%;margin:0}
body{font-family:var(--font);background:linear-gradient(160deg,#e0f2fe 0%,#f0fdf4 50%,#fef9c3 100%);color:var(--text)}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDownToast{from{opacity:0;transform:translateX(-50%) translateY(-14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.2)}50%{box-shadow:0 0 0 6px rgba(249,115,22,0)}}
.fade-in{animation:fadeIn .35s ease forwards}
.slide-up{animation:slideUp .4s cubic-bezier(.34,1.56,.64,1) forwards}
.pop{animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.spin{animation:spin 1s linear infinite;display:inline-block}

/* API Key */
.apikey-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#0f172a,#1a2744,#1e3a5f)}
.apikey-card{background:#fff;border-radius:24px;padding:40px;max-width:480px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,.3);text-align:center}
.apikey-owl{font-size:64px;display:block;margin-bottom:14px;animation:float 3s ease-in-out infinite}
.apikey-title{font-size:26px;font-weight:900;color:var(--navy);margin-bottom:8px}
.apikey-title span{background:linear-gradient(90deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.apikey-sub{font-size:13px;color:var(--muted);font-weight:600;line-height:1.7;margin-bottom:24px}
.apikey-steps{background:#f8fafc;border-radius:12px;padding:16px;margin-bottom:20px;text-align:left}
.apikey-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--text);line-height:1.5}
.apikey-step:last-child{margin-bottom:0}
.apikey-step-num{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.apikey-inp{width:100%;padding:13px 15px;border:2px solid var(--border);border-radius:11px;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:14px;letter-spacing:.5px}
.apikey-inp:focus{border-color:var(--blue)}
.apikey-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(59,130,246,.4)}
.apikey-btn:hover{transform:translateY(-2px)} .apikey-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.apikey-note{font-size:11px;color:var(--muted);font-weight:600;margin-top:12px;line-height:1.6}
.apikey-link{color:var(--blue);text-decoration:none;font-weight:800}
.err-box{color:var(--red);font-size:12px;font-weight:700;margin-bottom:10px;padding:8px 12px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca}
.ok-box{color:#166534;font-size:12px;font-weight:700;margin-bottom:10px;padding:8px 12px;background:#f0fdf4;border-radius:8px;border:1px solid var(--green)}

/* Auth */
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#0f172a,#1a2744,#1e3a5f)}
.auth-card{background:#fff;border-radius:24px;padding:40px;max-width:440px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,.3);text-align:center}
.auth-owl{font-size:56px;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite}
.auth-title{font-size:24px;font-weight:900;color:var(--navy);margin-bottom:6px}
.auth-title span{background:linear-gradient(90deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-sub{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:20px;line-height:1.6}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:#f1f5f9;border-radius:10px;padding:3px}
.auth-tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s}
.auth-tab.active{background:#fff;color:var(--navy);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.auth-type-row{display:flex;gap:10px;margin-bottom:16px}
.auth-type-btn{flex:1;padding:12px;border-radius:12px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:5px}
.auth-type-btn.active{border-color:var(--blue);background:#eff6ff;color:var(--blue)}
.auth-type-icon{font-size:24px}
.auth-inp{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:10px}
.auth-inp:focus{border-color:var(--blue)}
.auth-btn{width:100%;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(59,130,246,.4);margin-top:4px}
.auth-btn:hover{transform:translateY(-2px)} .auth-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.sync-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:#f0fdf4;border:1px solid var(--green);color:#166534;font-size:10px;font-weight:800}
.sync-warn{background:#fff7ed;border-color:var(--orange);color:#92400e}

/* Header */
.header{background:var(--navy);padding:0 20px;height:64px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(26,39,68,.3);flex-shrink:0}
.mascot{font-size:32px;animation:float 3s ease-in-out infinite}
.header-title{font-size:20px;font-weight:900;color:#fff}
.header-title span{background:linear-gradient(90deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-sub{font-size:10px;color:#94a3b8;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tab-btn{padding:6px 14px;border-radius:20px;border:2px solid rgba(255,255,255,.2);background:transparent;color:#94a3b8;font-family:var(--font);font-size:12px;font-weight:800;cursor:pointer;transition:all .15s}
.tab-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.tab-btn:hover:not(.active){border-color:rgba(255,255,255,.4);color:#fff}
.xp-chip{display:flex;align-items:center;gap:5px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);border-radius:20px;padding:5px 11px;color:var(--yellow);font-size:12px;font-weight:800}
.level-chip{display:flex;align-items:center;gap:5px;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);border-radius:20px;padding:5px 11px;color:#a78bfa;font-size:12px;font-weight:800}
.signout-btn{padding:5px 11px;border-radius:20px;border:2px solid rgba(255,255,255,.15);background:transparent;color:#94a3b8;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;transition:all .15s}
.signout-btn:hover{border-color:var(--red);color:var(--red)}

/* Main */
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:196px;flex-shrink:0;background:rgba(255,255,255,.75);backdrop-filter:blur(8px);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:12px 10px;gap:11px}
.sidebar-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.mastery-row{margin-bottom:7px}
.mastery-row-top{display:flex;justify-content:space-between;font-size:11px;font-weight:800;margin-bottom:3px}
.mastery-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden}
.mastery-fill{height:100%;border-radius:6px;transition:width .5s}
.subject-btn{width:100%;padding:8px 10px;border-radius:9px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;color:var(--text);margin-bottom:4px}
.subject-btn:hover,.subject-btn.active{transform:translateX(3px)}
.subject-btn.math{color:var(--blue)} .subject-btn.math.active,.subject-btn.math:hover{background:#eff6ff;border-color:var(--blue)}
.subject-btn.science{color:var(--purple)} .subject-btn.science.active,.subject-btn.science:hover{background:#f5f3ff;border-color:var(--purple)}
.subject-btn.coding{color:var(--teal)} .subject-btn.coding.active,.subject-btn.coding:hover{background:#f0fdfa;border-color:var(--teal)}
.mode-btn{width:100%;padding:7px 10px;border-radius:9px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;color:var(--muted);margin-bottom:4px}
.mode-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.gap-pill{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;background:#fff7ed;border:1px solid var(--orange);color:#92400e;font-size:10px;font-weight:700;margin-bottom:4px;cursor:pointer;transition:all .15s}
.gap-pill:hover{background:#fed7aa}
.strength-pill{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;background:#f0fdf4;border:1px solid var(--green);color:#166534;font-size:10px;font-weight:700;margin-bottom:4px}
.struggle-indicator{padding:8px 10px;border-radius:10px;background:linear-gradient(135deg,#fff7ed,#fef3c7);border:2px solid var(--orange);font-size:10px;font-weight:800;color:#92400e;display:flex;align-items:center;gap:6px;animation:pulseGlow 2s ease-in-out infinite}
.struggle-bar{height:4px;background:rgba(249,115,22,.2);border-radius:4px;margin-top:5px;overflow:hidden}
.struggle-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--yellow),var(--orange));transition:width .4s}

/* Chat */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:5px} .chat-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.welcome{margin:auto;text-align:center;padding:16px;max-width:500px;animation:fadeIn .4s ease}
.welcome-emoji{font-size:56px;display:block;animation:float 3s ease-in-out infinite;margin-bottom:10px}
.welcome-title{font-size:26px;font-weight:900;color:var(--navy);margin-bottom:7px}
.welcome-title em{font-style:normal;background:linear-gradient(90deg,var(--blue),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome-sub{font-size:13px;color:var(--muted);font-weight:600;line-height:1.7;margin-bottom:6px}
.welcome-interests{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.welcome-interest-tag{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;background:#eff6ff;color:var(--blue);border:1px solid #bfdbfe}
.qs-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qs-btn{padding:10px 12px;border-radius:11px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;text-align:left;line-height:1.4;transition:all .15s;color:var(--text);display:flex;gap:7px;align-items:flex-start;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.qs-btn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.1);border-color:var(--blue)}
.qs-emoji{font-size:16px;flex-shrink:0}
.msg{display:flex;gap:9px;animation:popIn .25s cubic-bezier(.34,1.56,.64,1);max-width:660px;width:100%}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 2px 7px rgba(0,0,0,.12)}
.av-nova{background:linear-gradient(135deg,var(--navy),var(--blue))} .av-user{background:linear-gradient(135deg,var(--orange),var(--pink))}
.bubble{padding:11px 15px;border-radius:15px;font-size:13px;line-height:1.75;max-width:calc(100% - 42px);font-weight:600}
.bubble-nova{background:#fff;border:2px solid var(--border);border-top-left-radius:4px;box-shadow:0 2px 9px rgba(0,0,0,.07)}
.bubble-user{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-top-right-radius:4px}
.bubble-remediation{background:linear-gradient(135deg,#fff7ed,#fef3c7);border:2px solid var(--orange);border-top-left-radius:4px}
.remediation-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:6px;background:var(--orange);color:#fff;font-size:9px;font-weight:800;margin-bottom:7px}
.block-challenge{margin:9px 0;padding:11px 13px;background:linear-gradient(135deg,#fef9c3,#fef3c7);border:2px solid var(--yellow);border-radius:11px;font-size:12px;color:#78350f}
.block-challenge-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);margin-bottom:4px}
.block-fact{margin:9px 0;padding:11px 13px;background:linear-gradient(135deg,#eff6ff,#e0f2fe);border:2px solid var(--blue);border-radius:11px;font-size:12px;color:#1e40af}
.block-fact-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);margin-bottom:4px}
.block-resource{margin:9px 0;padding:11px 13px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid var(--green);border-radius:11px;font-size:12px;color:#166534}
.block-resource-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.resource-link{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;background:#fff;border:1px solid var(--green);color:#166534;font-size:11px;font-weight:800;text-decoration:none;margin:3px 3px 0 0;cursor:pointer;transition:all .15s}
.resource-link:hover{background:var(--green);color:#fff}
.block-code{margin:9px 0;background:var(--navy);border-radius:9px;overflow:hidden}
.block-code-hdr{padding:5px 11px;background:var(--navy2);font-size:9px;font-weight:700;letter-spacing:1px;color:#94a3b8;text-transform:uppercase;font-family:var(--mono)}
.block-code-body{padding:9px 11px;font-family:var(--mono);font-size:11px;color:#e2e8f0;line-height:1.7;white-space:pre-wrap;overflow-x:auto}
.typing{background:#fff;border:2px solid var(--border);border-radius:15px;border-top-left-radius:4px;padding:11px 15px;display:flex;gap:5px;align-items:center}
.tdot{width:7px;height:7px;border-radius:50%;animation:bounce 1.2s ease infinite}
.tdot:nth-child(1){background:var(--blue);animation-delay:0s} .tdot:nth-child(2){background:var(--teal);animation-delay:.2s} .tdot:nth-child(3){background:var(--purple);animation-delay:.4s}
.topic-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:800;margin:2px}
.topic-tag.math{background:#eff6ff;color:var(--blue);border:1px solid #bfdbfe}
.topic-tag.science{background:#f5f3ff;color:var(--purple);border:1px solid #ddd6fe}
.topic-tag.coding{background:#f0fdfa;color:var(--teal);border:1px solid #99f6e4}
.xp-toast{position:fixed;bottom:80px;right:20px;background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;padding:8px 15px;border-radius:18px;font-size:12px;font-weight:800;box-shadow:0 4px 18px rgba(0,0,0,.2);animation:toastIn .3s ease;z-index:100}
.level-toast{position:fixed;bottom:80px;right:20px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;padding:12px 20px;border-radius:18px;font-size:13px;font-weight:800;box-shadow:0 4px 24px rgba(139,92,246,.5);animation:toastIn .3s ease;z-index:100}
.mastered-toast{position:fixed;top:74px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--yellow),var(--orange));color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;font-weight:800;box-shadow:0 4px 18px rgba(0,0,0,.2);animation:slideDownToast .3s ease;z-index:200}
.gap-toast{position:fixed;top:74px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#fff7ed,#fed7aa);border:2px solid var(--orange);color:#92400e;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:800;animation:slideDownToast .3s ease;z-index:200}
.input-area{padding:10px 20px 14px;background:rgba(255,255,255,.6);backdrop-filter:blur(8px);border-top:1px solid var(--border)}
.input-box{display:flex;gap:9px;align-items:flex-end;background:#fff;border:2px solid var(--border);border-radius:13px;padding:9px 13px;box-shadow:0 2px 9px rgba(0,0,0,.07);transition:border-color .15s}
.input-box:focus-within{border-color:var(--blue)} .input-box.struggling{border-color:var(--orange)}
.chat-input{flex:1;border:none;outline:none;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text);background:none;resize:none;min-height:20px;max-height:90px;line-height:1.5}
.chat-input::placeholder{color:#cbd5e1}
.send-btn{width:36px;height:36px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:hover:not(:disabled){transform:scale(1.08)} .send-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Structured Learning Flow ── */
.learn-wrap{flex:1;display:flex;overflow:hidden}
.learn-sidebar{width:220px;flex-shrink:0;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:14px 12px;gap:10px}
.learn-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(160deg,#f8faff,#f0fdf4)}
/* Subject picker */
.subj-pick-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:20px}
.subj-pick-title{font-size:22px;font-weight:900;color:var(--navy);text-align:center}
.subj-pick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:600px;width:100%}
.subj-pick-btn{padding:22px 14px;border-radius:18px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.subj-pick-btn:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.subj-pick-btn.math:hover,.subj-pick-btn.math.sel{border-color:var(--blue);background:#eff6ff;}
.subj-pick-btn.science:hover,.subj-pick-btn.science.sel{border-color:var(--purple);background:#f5f3ff;}
.subj-pick-btn.chemistry:hover,.subj-pick-btn.chemistry.sel{border-color:var(--orange);background:#fff7ed;}
.subj-pick-btn.biology:hover,.subj-pick-btn.biology.sel{border-color:var(--green);background:#f0fdf4;}
.subj-pick-btn.coding:hover,.subj-pick-btn.coding.sel{border-color:var(--teal);background:#f0fdfa;}
.subj-pick-btn.critical:hover,.subj-pick-btn.critical.sel{border-color:var(--pink);background:#fdf2f8;}
.subj-pick-icon{font-size:36px;margin-bottom:8px}
.subj-pick-label{font-size:13px;font-weight:900;color:var(--navy)}
.subj-pick-pct{font-size:11px;font-weight:700;margin-top:3px}
/* Topic picker */
.topic-pick-wrap{flex:1;overflow-y:auto;padding:24px}
.topic-pick-title{font-size:18px;font-weight:900;color:var(--navy);margin-bottom:4px}
.topic-pick-sub{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:18px}
.topic-unit-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:16px}
.topic-pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.topic-pick-btn{padding:12px 14px;border-radius:13px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;text-align:left;box-shadow:0 2px 6px rgba(0,0,0,.05);display:flex;align-items:flex-start;gap:10px}
.topic-pick-btn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.1)}
.topic-pick-btn.locked{opacity:.4;cursor:not-allowed;transform:none}
.topic-pick-btn.mastered{border-color:var(--green);background:#f0fdf4}
.topic-pick-icon{font-size:20px;flex-shrink:0}
.topic-pick-name{font-size:11px;font-weight:800;color:var(--text);line-height:1.3}
.topic-pick-sub2{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}
.topic-pct-bar{height:3px;background:var(--border);border-radius:3px;margin-top:5px;overflow:hidden}
.topic-pct-fill{height:100%;border-radius:3px;transition:width .5s}
/* Teaching screen */
.teaching-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.teaching-header{padding:14px 20px 10px;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;gap:12px;flex-shrink:0}
.teaching-back{padding:6px 12px;border-radius:20px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s}
.teaching-back:hover{border-color:var(--navy);color:var(--navy)}
.teaching-topic{font-size:14px;font-weight:900;color:var(--navy)}
.teaching-phase{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:800;margin-left:auto}
.phase-learn{background:#eff6ff;color:var(--blue)}
.phase-quiz{background:#f0fdf4;color:var(--green)}
.teaching-chat{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.teaching-chat::-webkit-scrollbar{width:5px}.teaching-chat::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.ready-btn{margin:16px auto 0;padding:13px 32px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(34,197,94,.3);display:block}
.ready-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(34,197,94,.4)}
/* Quiz */
.quiz-wrap{padding:20px;display:flex;flex-direction:column;gap:14px}
.quiz-q-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.quiz-q-num{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.quiz-q-text{font-size:15px;font-weight:800;color:var(--navy);line-height:1.5;margin-bottom:16px}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quiz-opt{padding:12px 14px;border-radius:11px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;color:var(--text);line-height:1.4}
.quiz-opt:hover:not(:disabled){border-color:var(--blue);background:#eff6ff;transform:translateY(-1px)}
.quiz-opt.correct{border-color:var(--green)!important;background:#f0fdf4!important;color:#166534!important}
.quiz-opt.wrong{border-color:var(--red)!important;background:#fef2f2!important;color:#991b1b!important}
.quiz-opt:disabled{cursor:not-allowed}
.quiz-explain{padding:12px 14px;border-radius:11px;font-size:12px;font-weight:700;line-height:1.6;margin-top:4px}
.quiz-explain.ok{background:#f0fdf4;border:2px solid var(--green);color:#166534}
.quiz-explain.no{background:#fef2f2;border:2px solid var(--red);color:#991b1b}
.quiz-next-btn{width:100%;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-family:var(--font);font-size:13px;font-weight:900;cursor:pointer;transition:all .15s;margin-top:8px}
.quiz-next-btn:hover{transform:translateY(-1px)}
.quiz-progress{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.quiz-prog-bar{flex:1;height:7px;background:var(--border);border-radius:6px;overflow:hidden}
.quiz-prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width .4s}
.quiz-score-card{background:#fff;border-radius:20px;padding:32px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08);max-width:480px;margin:0 auto}
/* Sidebar mastery mini */
.sidebar-mastery-mini{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:3px}
.sidebar-xp{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:10px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2)}
.sidebar-xp-val{font-size:14px;font-weight:900;color:var(--yellow)}
.sidebar-xp-lbl{font-size:10px;font-weight:700;color:#92400e}
.mic-btn{width:36px;height:36px;border-radius:9px;border:none;background:linear-gradient(135deg,#64748b,#475569);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.mic-btn:hover{transform:scale(1.08)} .mic-btn.listening{background:linear-gradient(135deg,var(--red),#dc2626);animation:pulseGlow 1s infinite}
.voice-bar{display:flex;align-items:center;gap:8px;padding:7px 20px 0;flex-wrap:wrap}
.voice-toggle{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:var(--font);font-size:10px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s;user-select:none}
.voice-toggle.on{border-color:var(--teal);background:#f0fdfa;color:var(--teal)}
.voice-toggle-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .15s}
.voice-toggle.on .voice-toggle-dot{background:var(--teal)}
.speaking-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:linear-gradient(135deg,#f0fdfa,#e0f7f4);border:1px solid var(--teal);color:var(--teal);font-size:10px;font-weight:800}
@keyframes speakPulse{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.6)}}
.speak-wave{display:flex;gap:2px;align-items:center;height:12px}
.speak-bar{width:3px;border-radius:2px;background:var(--teal)}
.speak-bar:nth-child(1){animation:speakPulse .6s ease infinite .0s;height:6px}
.speak-bar:nth-child(2){animation:speakPulse .6s ease infinite .1s;height:10px}
.speak-bar:nth-child(3){animation:speakPulse .6s ease infinite .2s;height:7px}
.speak-bar:nth-child(4){animation:speakPulse .6s ease infinite .15s;height:10px}
.speak-bar:nth-child(5){animation:speakPulse .6s ease infinite .05s;height:5px}
.voice-speed-btn{padding:3px 8px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:var(--font);font-size:9px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s}
.voice-speed-btn.active{border-color:var(--purple);background:#f5f3ff;color:var(--purple)}
/* Game Break Popup */
.game-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.game-popup-card{background:#fff;border-radius:24px;padding:36px;max-width:380px;width:90%;text-align:center;box-shadow:0 16px 60px rgba(0,0,0,.3);animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.game-popup-title{font-size:22px;font-weight:900;color:var(--navy);margin-bottom:8px}
.game-popup-sub{font-size:13px;color:var(--muted);font-weight:600;line-height:1.6;margin-bottom:24px}
.game-popup-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#f97316,#fbbf24);color:#fff;font-family:var(--font);font-size:15px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(249,115,22,.4);margin-bottom:10px}
.game-popup-btn:hover{transform:translateY(-2px)}
.game-popup-skip{background:none;border:none;font-family:var(--font);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;padding:4px}
.game-popup-skip:hover{color:var(--navy)}
/* ── Writing Module ── */
.writing-home{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px;background:linear-gradient(160deg,#faf5ff,#f0f9ff)}
.writing-home-title{font-size:22px;font-weight:900;color:var(--navy);text-align:center;margin-bottom:4px}
.writing-home-sub{font-size:13px;color:var(--muted);font-weight:600;text-align:center;margin-bottom:8px}
.writing-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:600px;margin:0 auto;width:100%}
.writing-type-card{padding:22px 18px;border-radius:18px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.writing-type-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.writing-type-icon{font-size:36px;margin-bottom:10px}
.writing-type-name{font-size:14px;font-weight:900;color:var(--navy);margin-bottom:4px}
.writing-type-desc{font-size:11px;color:var(--muted);font-weight:600;line-height:1.5}
.writing-type-skills{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.writing-skill-tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;background:#f1f5f9;color:var(--muted)}
/* Writing lesson area */
.writing-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.writing-header{padding:12px 18px;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.writing-back{padding:5px 12px;border-radius:20px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s}
.writing-back:hover{border-color:var(--navy);color:var(--navy)}
.writing-step-bar{display:flex;align-items:center;gap:6px;margin-left:auto}
.writing-step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .2s}
.writing-step-dot.done{background:var(--green)}
.writing-step-dot.active{background:var(--purple);transform:scale(1.3)}
.writing-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.writing-nova-bubble{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.07);border-left:4px solid var(--purple)}
.writing-nova-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--purple);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.writing-nova-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.8}
.writing-example-box{background:linear-gradient(135deg,#faf5ff,#f0f9ff);border-radius:14px;padding:16px;border:2px dashed rgba(139,92,246,.3)}
.writing-example-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--purple);margin-bottom:8px}
.writing-example-text{font-size:13px;font-weight:600;color:var(--navy);line-height:1.8;font-style:italic}
.writing-try-area{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.07);border:2px solid var(--border)}
.writing-try-label{font-size:11px;font-weight:800;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.writing-textarea{width:100%;min-height:120px;padding:12px 14px;border-radius:12px;border:2px solid var(--border);font-family:var(--font);font-size:13px;font-weight:600;color:var(--text);resize:vertical;outline:none;transition:border-color .15s;line-height:1.7;background:#fafafa}
.writing-textarea:focus{border-color:var(--purple);background:#fff}
.writing-textarea::placeholder{color:#94a3b8}
.writing-submit-btn{padding:12px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;font-family:var(--font);font-size:13px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(139,92,246,.3);margin-top:10px}
.writing-submit-btn:hover{transform:translateY(-2px)}
.writing-submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.writing-feedback-box{border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.writing-feedback-box.positive{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:2px solid var(--green)}
.writing-feedback-box.coaching{background:linear-gradient(135deg,#fffbeb,#fef9c3);border:2px solid var(--yellow)}
.writing-score-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800}
.writing-score-badge.high{background:#dcfce7;color:#166534}
.writing-score-badge.mid{background:#fef9c3;color:#92400e}
.writing-score-badge.low{background:#fee2e2;color:#991b1b}
.writing-next-btn{padding:11px 24px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;font-family:var(--font);font-size:12px;font-weight:900;cursor:pointer;transition:all .15s;margin-top:10px}
.writing-next-btn:hover{transform:translateY(-2px)}
.writing-skills-progress{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.writing-skill-row{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:700}
.writing-skill-bar{flex:1;height:6px;background:var(--border);border-radius:4px;overflow:hidden}
.writing-skill-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--purple),var(--blue));transition:width .6s}
/* ── Scan & Review ── */
.scan-wrap{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;max-width:760px;margin:0 auto;width:100%}
.scan-upload-card{background:#fff;border-radius:18px;padding:22px;border:2px dashed var(--purple);cursor:pointer;transition:all .2s;text-align:center}
.scan-upload-card:hover{background:#f5f3ff;border-color:#6d28d9}
.scan-upload-icon{font-size:40px;margin-bottom:8px}
.scan-upload-title{font-size:15px;font-weight:900;color:#6d28d9;margin-bottom:4px}
.scan-upload-sub{font-size:12px;color:var(--muted);font-weight:600}
.scan-issue-card{background:#fff;border-radius:14px;padding:16px;border:2px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06);animation:popIn .25s cubic-bezier(.34,1.56,.64,1)}
.scan-issue-card.grammar{border-left:4px solid var(--red)}
.scan-issue-card.clarity{border-left:4px solid var(--orange)}
.scan-issue-card.structure{border-left:4px solid var(--blue)}
.scan-issue-card.word-choice{border-left:4px solid var(--purple)}
.scan-issue-card.strength{border-left:4px solid var(--green)}
.scan-issue-type{font-size:9px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px}
.scan-issue-type.grammar{background:#fef2f2;color:var(--red)}
.scan-issue-type.clarity{background:#fff7ed;color:var(--orange)}
.scan-issue-type.structure{background:#eff6ff;color:var(--blue)}
.scan-issue-type.word-choice{background:#f5f3ff;color:var(--purple)}
.scan-issue-type.strength{background:#f0fdf4;color:var(--green)}
.scan-original{font-size:12px;font-weight:600;color:var(--muted);padding:8px 12px;border-radius:8px;background:#f8fafc;border-left:3px solid var(--muted);margin-bottom:8px;font-style:italic;line-height:1.6}
.scan-why{font-size:12px;font-weight:700;color:var(--text);line-height:1.6;margin-bottom:10px}
.scan-options{display:flex;flex-direction:column;gap:7px}
.scan-option-btn{padding:10px 14px;border-radius:10px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:all .15s;color:var(--text);line-height:1.5}
.scan-option-btn:hover{border-color:var(--purple);background:#f5f3ff;transform:translateX(3px)}
.scan-option-btn.chosen{border-color:var(--green)!important;background:#f0fdf4!important;color:#166534!important}
.scan-option-label{font-size:9px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.scan-why-box{font-size:11px;font-weight:600;color:#166534;background:#f0fdf4;border-radius:8px;padding:8px 10px;margin-top:6px;line-height:1.5}
/* Student Notes */
.notes-wrap{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;max-width:760px;margin:0 auto;width:100%}
.note-card{background:#fff;border-radius:14px;padding:18px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.note-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.note-title{font-size:14px;font-weight:900;color:var(--navy)}
.note-date{font-size:10px;color:var(--muted);font-weight:600}
.note-original{font-size:12px;color:var(--muted);font-weight:600;line-height:1.7;white-space:pre-wrap;padding:10px 12px;background:#f8fafc;border-radius:8px;margin-bottom:10px;font-style:italic}
.note-annotations{display:flex;flex-direction:column;gap:7px}
.note-annotation{padding:8px 12px;border-radius:8px;font-size:11px;font-weight:600;line-height:1.5}
.note-annotation.grammar{background:#fef2f2;color:#991b1b;border-left:3px solid var(--red)}
.note-annotation.clarity{background:#fff7ed;color:#92400e;border-left:3px solid var(--orange)}
.note-annotation.structure{background:#eff6ff;color:"#1e40af";border-left:3px solid var(--blue)}
.note-annotation.word-choice{background:#f5f3ff;color:#5b21b6;border-left:3px solid var(--purple)}
.note-annotation.strength{background:#f0fdf4;color:#166534;border-left:3px solid var(--green)}
/* Revised Essay View */
.revised-essay-wrap{background:#fff;border-radius:16px;padding:20px;border:2px solid var(--green)}
.revised-essay-title{font-size:13px;font-weight:900;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.revised-para{margin-bottom:16px;line-height:1.9;font-size:13px;font-weight:600}
.original-strike{text-decoration:line-through;color:#94a3b8;background:#f8fafc;padding:1px 3px;border-radius:3px}
.chosen-text{background:#dcfce7;color:#166534;padding:1px 5px;border-radius:4px;font-weight:700;border:1px solid #86efac}
.unchanged-text{color:var(--text)}
/* Essay Writer */
.essay-writer-wrap{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;max-width:760px;margin:0 auto;width:100%}
.essay-config-card{background:#fff;border-radius:16px;padding:20px;border:2px solid var(--border)}
.essay-config-title{font-size:13px;font-weight:900;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.essay-option-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.essay-option-pill{padding:7px 14px;border-radius:20px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s}
.essay-option-pill.active{border-color:var(--purple);background:#f5f3ff;color:var(--purple)}
.essay-output-wrap{background:#fff;border-radius:16px;padding:24px;border:2px solid var(--green);position:relative}
.essay-output-title{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:6px}
.essay-output-meta{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap}
.essay-output-body{font-size:13px;line-height:1.9;color:var(--text);font-weight:600;white-space:pre-wrap}
.essay-highlight-thesis{background:#fef9c3;border-radius:3px;padding:1px 3px}
.essay-highlight-topic{background:#dbeafe;border-radius:3px;padding:1px 3px}
.essay-highlight-evidence{background:#dcfce7;border-radius:3px;padding:1px 3px}
.essay-highlight-transition{background:#f3e8ff;border-radius:3px;padding:1px 3px}

  .essay-print-title{font-size:22pt;font-weight:bold;margin-bottom:6pt;font-family:Georgia,serif}

}

.heat-cell:hover{transform:scale(1.03)}
.heat-0{background:#f8fafc;border-color:var(--border)} .heat-1{background:#dbeafe;border-color:#93c5fd}
.heat-2{background:#bfdbfe;border-color:#60a5fa} .heat-3{background:#93c5fd;border-color:var(--blue)}

.heat-icon{font-size:16px;margin-bottom:3px} .heat-name{font-size:9px;font-weight:800;color:var(--navy);line-height:1.2;margin-bottom:2px}

.pin-field:focus{border-color:var(--blue)}

.danger-sub{font-size:11px;color:#991b1b;font-weight:600;margin-bottom:12px;line-height:1.5}
.danger-btn{padding:9px 18px;border-radius:9px;border:2px solid var(--red);background:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;color:var(--red);transition:all .15s}
.danger-btn:hover{background:var(--red);color:#fff}
.alert-card{background:linear-gradient(135deg,#fff7ed,#fef3c7);border:2px solid var(--orange);border-radius:13px;padding:16px;margin-bottom:16px}

async function hashPassword(pw){const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pw));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");}

function useAnimFrame(cb,running){
  useEffect(()=>{
    if(!running)return;
    let id;
    let started=false;
    const loop=t=>{cb(t);id=requestAnimationFrame(loop);};
    // Small delay to ensure canvas is mounted in DOM
    const timer=setTimeout(()=>{started=true;id=requestAnimationFrame(loop);},50);
    return()=>{clearTimeout(timer);if(id)cancelAnimationFrame(id);};
  },[running,cb]);
}

function FootballGame({onBack}){
  const W=480,H=360,BALL_START={x:240,y:310},POST_X=240,POST_TOP=20,POST_W=160;
  const cvs=useRef(null);
  const state=useRef({phase:"aim",angle:90,angleDir:1,power:0,powerDir:1,ball:{...BALL_START},vel:{x:0,y:0},score:0,attempts:5,result:null,resultTimer:0,celebrating:false,confetti:null});
  const[,fu]=useState(0);const running=useRef(true);
  const drawConfetti=(ctx,particles)=>{particles.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;ctx.globalAlpha=p.life;ctx.fillRect(-4,-4,8,8);ctx.restore();});ctx.globalAlpha=1;};
  const draw=useCallback(()=>{
    const c=cvs.current;if(!c)return;const ctx=c.getContext("2d");const s=state.current;
    ctx.fillStyle="#1e3a5f";ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#0f2540";ctx.fillRect(0,0,W,55);
    const cc=["#ef4444","#3b82f6","#fbbf24","#22c55e","#8b5cf6","#f97316"];
    for(let i=0;i<28;i++){const cx2=10+i*17,cy=30+(i%3)*8,col=cc[i%cc.length];
      const aa=s.celebrating?Math.sin(Date.now()/120+i)*0.8:0.3;
      ctx.fillStyle=col;ctx.beginPath();ctx.arc(cx2,cy-10,4,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(cx2,cy-6);ctx.lineTo(cx2,cy+6);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx2,cy-2);ctx.lineTo(cx2-6*Math.cos(aa),cy-6-6*Math.sin(aa));ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx2,cy-2);ctx.lineTo(cx2+6*Math.cos(aa),cy-6-6*Math.sin(aa));ctx.stroke();}
    ctx.fillStyle="#166534";ctx.fillRect(0,56,W,H-56);
    ctx.strokeStyle="rgba(255,255,255,.15)";ctx.lineWidth=2;
    for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,56);ctx.lineTo(x,H);ctx.stroke();}
    ctx.strokeStyle="#fbbf24";ctx.lineWidth=7;ctx.lineCap="round";
    ctx.beginPath();ctx.moveTo(POST_X,56+130);ctx.lineTo(POST_X,POST_TOP+40);ctx.stroke();
    ctx.beginPath();ctx.moveTo(POST_X-POST_W/2,POST_TOP+40);ctx.lineTo(POST_X+POST_W/2,POST_TOP+40);ctx.stroke();
    ctx.beginPath();ctx.moveTo(POST_X-POST_W/2,POST_TOP+40);ctx.lineTo(POST_X-POST_W/2,POST_TOP);ctx.stroke();
    ctx.beginPath();ctx.moveTo(POST_X+POST_W/2,POST_TOP+40);ctx.lineTo(POST_X+POST_W/2,POST_TOP);ctx.stroke();
    if(s.phase==="aim"){
      ctx.strokeStyle="rgba(59,130,246,.2)";ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(s.ball.x,s.ball.y,65,Math.PI,0,false);ctx.stroke();
      const rad=(s.angle*Math.PI)/180,len=72;
      ctx.strokeStyle="#3b82f6";ctx.lineWidth=3;ctx.setLineDash([6,4]);
      ctx.beginPath();ctx.moveTo(s.ball.x,s.ball.y);ctx.lineTo(s.ball.x+Math.cos(rad)*len,s.ball.y-Math.sin(rad)*len);ctx.stroke();ctx.setLineDash([]);
      const ax=s.ball.x+Math.cos(rad)*len,ay=s.ball.y-Math.sin(rad)*len;
      ctx.fillStyle="#3b82f6";ctx.beginPath();ctx.arc(ax,ay,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#fff";ctx.font="bold 13px Nunito";ctx.textAlign="center";ctx.fillText(Math.round(s.angle)+"°",s.ball.x,s.ball.y-82);}
    if(s.phase==="power"){
      ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(s.ball.x-44,s.ball.y-82,88,18);
      ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.strokeRect(s.ball.x-44,s.ball.y-82,88,18);
      const col=s.power>70?"#ef4444":s.power>40?"#fbbf24":"#22c55e";
      ctx.fillStyle=col;ctx.fillRect(s.ball.x-43,s.ball.y-81,(88*s.power/100)-2,16);
      ctx.fillStyle="#fff";ctx.font="bold 11px Nunito";ctx.textAlign="center";ctx.fillText("POWER — click to kick!",s.ball.x,s.ball.y-88);}
    const bx=s.ball.x,by=s.ball.y,ang2=s.phase==="flying"?Math.atan2(-s.vel.y,s.vel.x):-Math.PI/4;
    ctx.save();ctx.translate(bx,by);ctx.rotate(ang2);
    const fg=ctx.createRadialGradient(-3,-3,1,0,0,14);fg.addColorStop(0,"#a16207");fg.addColorStop(1,"#78350f");
    ctx.fillStyle=fg;ctx.beginPath();ctx.ellipse(0,0,16,10,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#fff";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-2,-10);ctx.lineTo(-2,10);ctx.stroke();
    for(let i=-6;i<=6;i+=3){ctx.beginPath();ctx.moveTo(i,-10);ctx.lineTo(i,10);ctx.stroke();}
    ctx.restore();
    if(s.confetti)drawConfetti(ctx,s.confetti);
    if(s.result){
      if(s.result.includes("GOAL")){ctx.font="bold 44px Nunito";ctx.textAlign="center";ctx.fillStyle="#fbbf24";ctx.shadowColor="#f97316";ctx.shadowBlur=20;ctx.fillText("FIELD GOAL! 🏈",W/2,H/2-10);ctx.font="bold 18px Nunito";ctx.fillStyle="#fff";ctx.shadowBlur=0;ctx.fillText("The crowd goes wild! 🎉",W/2,H/2+20);}
      else{ctx.font="bold 36px Nunito";ctx.textAlign="center";ctx.fillStyle="#ef4444";ctx.fillText(s.result,W/2,H/2);}}
    ctx.shadowBlur=0;ctx.fillStyle="#fff";ctx.font="bold 13px Nunito";ctx.textAlign="left";
    ctx.fillText("Goals: "+s.score,12,72);ctx.fillText("Kicks left: "+s.attempts,12,90);
    ctx.fillStyle="#94a3b8";ctx.font="12px Nunito";ctx.textAlign="center";
    if(s.phase==="aim")ctx.fillText("Click to lock angle",W/2,H-8);
    if(s.phase==="power")ctx.fillText("Click to kick!",W/2,H-8);
  },[]);
  useAnimFrame(useCallback(()=>{
    const s=state.current;
    if(s.phase==="aim"){s.angle+=s.angleDir*1.2;if(s.angle>=175)s.angleDir=-1;if(s.angle<=5)s.angleDir=1;}
    if(s.phase==="power"){s.power+=s.powerDir*2;if(s.power>=100||s.power<=0)s.powerDir*=-1;}
    if(s.phase==="flying"){
      s.ball.x+=s.vel.x;s.ball.y+=s.vel.y;s.vel.y+=0.16;
      if(s.ball.y<POST_TOP+40&&s.ball.y>POST_TOP-10&&s.ball.x>POST_X-POST_W/2&&s.ball.x<POST_X+POST_W/2){
        s.result="GOAL!";s.score++;s.phase="result";s.resultTimer=110;s.celebrating=true;
        s.confetti=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H*0.6,vx:(Math.random()-.5)*4,vy:-Math.random()*4-1,rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*0.2,color:["#fbbf24","#ef4444","#22c55e","#3b82f6","#8b5cf6","#f97316"][Math.floor(Math.random()*6)],life:1}));}
      if(s.ball.y>H-46||s.ball.x<0||s.ball.x>W||s.ball.y<0){s.result="No Good! 😬";s.phase="result";s.resultTimer=60;}}
    if(s.phase==="result"){
      if(s.confetti){s.confetti.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.rot+=p.rotV;p.life-=0.008;});s.confetti=s.confetti.filter(p=>p.life>0);}
      s.resultTimer--;
      if(s.resultTimer<=0){s.ball={...BALL_START};s.vel={x:0,y:0};s.result=null;s.attempts--;s.celebrating=false;s.confetti=null;s.phase=s.attempts>0?"aim":"done";s.angle=90;s.angleDir=1;s.power=0;s.powerDir=1;}}
    draw();fu(n=>n+1);
  },[draw]),running.current&&state.current.phase!=="done");
  useEffect(()=>{draw();return()=>{running.current=false;};},[draw]);
  const handleClick=()=>{const s=state.current;if(s.phase==="aim")s.phase="power";else if(s.phase==="power"){const rad=(s.angle*Math.PI)/180,spd=5+s.power*0.10;s.vel={x:Math.cos(rad)*spd,y:-Math.sin(rad)*spd};s.phase="flying";}};
  const reset=()=>{state.current={phase:"aim",angle:90,angleDir:1,power:0,powerDir:1,ball:{...BALL_START},vel:{x:0,y:0},score:0,attempts:5,result:null,resultTimer:0,celebrating:false,confetti:null};running.current=true;fu(n=>n+1);};
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
    <div style={{position:"relative",borderRadius:14,overflow:"hidden",border:"2px solid rgba(255,255,255,.1)",cursor:"pointer"}} onClick={handleClick}>
      <canvas ref={cvs} width={W} height={H}/>
      {state.current.phase==="done"&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.85)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:14}}>
        <div style={{fontSize:36,fontWeight:900,color:"#fff",marginBottom:8}}>🏈 Game Over!</div>
        <div style={{fontSize:18,fontWeight:800,color:"#fbbf24",marginBottom:24}}>Goals: {state.current.score} / 5</div>
        <button onClick={e=>{e.stopPropagation();reset();}} style={{padding:"12px 28px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#3b82f6,#14b8a6)",color:"#fff",fontFamily:"Nunito,sans-serif",fontSize:14,fontWeight:900,cursor:"pointer"}}>Play Again</button>
      </div>}
    </div>
    <div style={{fontSize:11,color:"#64748b",fontWeight:600}}>Click to lock angle → Click to set power → GOAL!</div>
  </div>);

function ArrowGame({onBack}){
  const W=480,H=340;const cvs=useRef(null);
  const state=useRef({targets:[],arrows:[],score:0,misses:0,maxMisses:3,charging:false,charge:0,aimY:H/2,done:false});
  const[,fu]=useState(0);const running=useRef(true);const frameRef=useRef(0);
  const spawnTarget=()=>{const s=state.current;if(s.targets.length<3)s.targets.push({x:W+20,y:40+Math.random()*(H-80),r:20+Math.random()*14,spd:1.5+Math.random()*2,hit:false,hitTimer:0});};
  const draw=useCallback(()=>{
    const c=cvs.current;if(!c)return;const ctx=c.getContext("2d");const s=state.current;
    ctx.fillStyle="#1e3a5f";ctx.fillRect(0,0,W,H);ctx.fillStyle="#166534";
    for(let i=0;i<8;i++){const tx=(i*67)%W;ctx.beginPath();ctx.moveTo(tx,H);ctx.lineTo(tx+20,H-60);ctx.lineTo(tx+40,H);ctx.fill();}
    s.targets.forEach(t=>{if(t.hit){ctx.globalAlpha=t.hitTimer/20;ctx.fillStyle="#fbbf24";ctx.font="bold 22px Nunito";ctx.textAlign="center";ctx.fillText("💥",t.x,t.y);ctx.globalAlpha=1;return;}
      [t.r,t.r*.7,t.r*.4].forEach((r,i)=>{ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.fillStyle=["#ef4444","#fbbf24","#22c55e"][i];ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=1;ctx.stroke();});});
    s.arrows.forEach(a=>{ctx.save();ctx.translate(a.x,a.y);ctx.rotate(Math.atan2(a.vy,a.vx));ctx.fillStyle="#92400e";ctx.fillRect(-15,-2,30,4);ctx.fillStyle="#fbbf24";ctx.beginPath();ctx.moveTo(15,-4);ctx.lineTo(22,0);ctx.lineTo(15,4);ctx.fill();ctx.fillStyle="#fff";ctx.fillRect(-16,-3,6,6);ctx.restore();});
    const ay=s.aimY;ctx.strokeStyle="#92400e";ctx.lineWidth=4;ctx.lineCap="round";ctx.beginPath();ctx.arc(20,ay,40,-Math.PI/2.5,Math.PI/2.5);ctx.stroke();ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(20,ay-28);ctx.lineTo(20,ay+28);ctx.stroke();
    if(s.charging){ctx.fillStyle="#3b82f6";ctx.fillRect(10,ay+45,60,10);ctx.fillStyle=s.charge>66?"#22c55e":"#3b82f6";ctx.fillRect(10,ay+45,s.charge*.6,10);ctx.strokeStyle="#fff";ctx.lineWidth=1;ctx.strokeRect(10,ay+45,60,10);}
    ctx.strokeStyle="rgba(255,255,255,.15)";ctx.lineWidth=1;ctx.setLineDash([4,6]);ctx.beginPath();ctx.moveTo(40,ay);ctx.lineTo(W,ay);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle="#fff";ctx.font="bold 13px Nunito";ctx.textAlign="left";ctx.fillText("Score: "+s.score,12,22);ctx.fillStyle="#ef4444";ctx.fillText("❤️".repeat(s.maxMisses-s.misses),12,40);
    ctx.fillStyle="#94a3b8";ctx.font="12px Nunito";ctx.textAlign="center";ctx.fillText("Move mouse to aim · Hold click to charge · Release to fire",W/2,H-8);
  },[]);
  useAnimFrame(useCallback(()=>{
    const s=state.current;if(s.done)return;frameRef.current++;if(frameRef.current%90===0)spawnTarget();
    s.targets.forEach(t=>{if(!t.hit)t.x-=t.spd;});
    s.targets=s.targets.filter(t=>{if(!t.hit&&t.x<-t.r){s.misses++;if(s.misses>=s.maxMisses)s.done=true;return false;}if(t.hit){t.hitTimer--;return t.hitTimer>0;}return true;});
    s.arrows.forEach(a=>{a.x+=a.vx;a.y+=a.vy;a.vy+=0.05;});
    s.arrows=s.arrows.filter(a=>{if(a.x>W||a.y>H||a.y<0)return false;let hit=false;s.targets.forEach(t=>{if(!t.hit&&Math.hypot(a.x-t.x,a.y-t.y)<t.r){t.hit=true;t.hitTimer=20;s.score++;hit=true;}});return !hit;});
    if(s.charging)s.charge=Math.min(100,s.charge+2);
    draw();fu(n=>n+1);
  },[draw]),running.current&&!state.current.done);
  useEffect(()=>{draw();spawnTarget();return()=>{running.current=false;};},[draw]);
  const handleMouseMove=e=>{const r=cvs.current.getBoundingClientRect();state.current.aimY=Math.max(20,Math.min(H-20,e.clientY-r.top));};
  const handleMouseDown=()=>{state.current.charging=true;state.current.charge=0;};
  const handleMouseUp=()=>{const s=state.current;if(!s.charging)return;s.charging=false;const spd=4+s.charge*0.08;s.arrows.push({x:40,y:s.aimY,vx:spd,vy:-0.3});s.charge=0;};
  const reset=()=>{state.current={targets:[],arrows:[],score:0,misses:0,maxMisses:3,charging:false,charge:0,aimY:H/2,done:false};frameRef.current=0;running.current=true;spawnTarget();fu(n=>n+1);};
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
    <div style={{position:"relative",borderRadius:14,overflow:"hidden",border:"2px solid rgba(255,255,255,.1)"}} onMouseMove={handleMouseMove} onMouseDown={handleMouseDown} onMouseUp={handleMouseUp}>
      <canvas ref={cvs} width={W} height={H}/>
      {state.current.done&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.85)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:14}}>
        <div style={{fontSize:36,fontWeight:900,color:"#fff",marginBottom:8}}>🏹 Game Over!</div>

function RocketGame({onBack}){
  const W=480,H=340;const cvs=useRef(null);
  const state=useRef({rocket:{x:80,y:H/2},asteroids:[],score:0,alive:true,frame:0,speed:2});
  const[,fu]=useState(0);const running=useRef(true);const keys=useRef({ArrowUp:false,ArrowDown:false});
  const draw=useCallback(()=>{
    const c=cvs.current;if(!c)return;const ctx=c.getContext("2d");const s=state.current;
    ctx.fillStyle="#020617";ctx.fillRect(0,0,W,H);ctx.fillStyle="rgba(255,255,255,.5)";
    for(let i=0;i<40;i++){const sx=((i*127+s.frame*(i%3+1)*.5)%W),sy=(i*83)%H;ctx.beginPath();ctx.arc(sx,sy,1,0,Math.PI*2);ctx.fill();}
    s.asteroids.forEach(a=>{ctx.fillStyle="#57534e";ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);ctx.fill();ctx.fillStyle="#78716c";ctx.beginPath();ctx.arc(a.x-a.r*.3,a.y-a.r*.3,a.r*.3,0,Math.PI*2);ctx.fill();});
    const rx=s.rocket.x,ry=s.rocket.y;
    ctx.fillStyle="#f97316";ctx.beginPath();ctx.moveTo(rx-18,ry-5);ctx.lineTo(rx-30-Math.random()*10,ry);ctx.lineTo(rx-18,ry+5);ctx.fill();
    ctx.fillStyle="#fbbf24";ctx.beginPath();ctx.moveTo(rx-18,ry-2);ctx.lineTo(rx-24,ry);ctx.lineTo(rx-18,ry+2);ctx.fill();
    ctx.fillStyle="#e2e8f0";ctx.beginPath();ctx.ellipse(rx,ry,22,10,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#3b82f6";ctx.beginPath();ctx.ellipse(rx+10,ry,12,9,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#bae6fd";ctx.beginPath();ctx.arc(rx+8,ry,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="bold 14px Nunito";ctx.textAlign="left";ctx.fillText("Score: "+s.score,12,22);
    ctx.fillStyle="#94a3b8";ctx.font="12px Nunito";ctx.textAlign="center";ctx.fillText("↑↓ Arrow keys or move mouse to dodge!",W/2,H-8);
  },[]);
  useAnimFrame(useCallback(()=>{
    const s=state.current;if(!s.alive)return;s.frame++;s.score=Math.floor(s.frame/30);s.speed=2+s.score*0.02;
    if(keys.current.ArrowUp)s.rocket.y=Math.max(20,s.rocket.y-4);if(keys.current.ArrowDown)s.rocket.y=Math.min(H-20,s.rocket.y+4);
    if(s.frame%50===0)s.asteroids.push({x:W+20,y:20+Math.random()*(H-40),r:12+Math.random()*18,spd:s.speed+Math.random()});
    s.asteroids.forEach(a=>a.x-=a.spd);s.asteroids=s.asteroids.filter(a=>a.x>-40);
    s.asteroids.forEach(a=>{if(Math.hypot(s.rocket.x-a.x,s.rocket.y-a.y)<a.r+8)s.alive=false;});
    draw();fu(n=>n+1);
  },[draw]),running.current&&state.current.alive);
  useEffect(()=>{
    draw();
    const kd=e=>keys.current[e.key]=true,ku=e=>keys.current[e.key]=false;
    window.addEventListener("keydown",kd);window.addEventListener("keyup",ku);
    return()=>{running.current=false;window.removeEventListener("keydown",kd);window.removeEventListener("keyup",ku);};
  },[draw]);
  const handleMouseMove=e=>{const r=cvs.current.getBoundingClientRect();state.current.rocket.y=Math.max(20,Math.min(H-20,e.clientY-r.top));};
  const reset=()=>{state.current={rocket:{x:80,y:H/2},asteroids:[],score:0,alive:true,frame:0,speed:2};running.current=true;fu(n=>n+1);};
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
    <div style={{position:"relative",borderRadius:14,overflow:"hidden",border:"2px solid rgba(255,255,255,.1)"}} onMouseMove={handleMouseMove}>
      <canvas ref={cvs} width={W} height={H}/>
      {!state.current.alive&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.85)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:14}}>
        <div style={{fontSize:36,fontWeight:900,color:"#fff",marginBottom:8}}>🚀 Crashed!</div>
        <div style={{fontSize:18,fontWeight:800,color:"#fbbf24",marginBottom:24}}>Survived: {state.current.score}s</div>
        <button onClick={e=>{e.stopPropagation();reset();}} style={{padding:"12px 28px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#3b82f6,#14b8a6)",color:"#fff",fontFamily:"Nunito,sans-serif",fontSize:14,fontWeight:900,cursor:"pointer"}}>Play Again</button>
      </div>}
    </div>
    <div style={{fontSize:11,color:"#64748b",fontWeight:600}}>Move mouse or ↑↓ arrow keys to dodge asteroids!</div>
  </div>);

function FrogGame({onBack}){
  const W=480,H=340,ROWS=5,CELL=H/(ROWS+2);
  const cvs=useRef(null);const[,fu]=useState(0);const running=useRef(true);
  const initState=()=>({frog:{col:4,row:ROWS+1},cars:Array.from({length:ROWS},(_,i)=>({x:i%2===0?-50:W+50,dir:i%2===0?1:-1,spd:1.2+i*0.4,w:50+Math.floor(Math.random()*30),color:["#ef4444","#f97316","#3b82f6","#8b5cf6","#22c55e"][i]})),score:0,lives:3,done:false,crossings:0,jumpAnim:0});
  const state=useRef(initState());
  const draw=useCallback(()=>{
    const c=cvs.current;if(!c)return;const ctx=c.getContext("2d");const s=state.current;
    ctx.fillStyle="#166534";ctx.fillRect(0,0,W,CELL);
    for(let r=1;r<=ROWS;r++){ctx.fillStyle=r%2===0?"#374151":"#1f2937";ctx.fillRect(0,r*CELL,W,CELL);if(r%2===0){ctx.fillStyle="#fbbf24";for(let x=0;x<W;x+=60)ctx.fillRect(x,r*CELL+CELL/2-2,30,4);}}
    ctx.fillStyle="#166534";ctx.fillRect(0,(ROWS+1)*CELL,W,CELL);
    s.cars.forEach((car,i)=>{const row=i+1;ctx.fillStyle=car.color;ctx.beginPath();ctx.roundRect(car.x-car.w/2,row*CELL+4,car.w,CELL-8,6);ctx.fill();ctx.fillStyle="#bae6fd";ctx.fillRect(car.x-car.w/2+6,row*CELL+8,car.w/3,CELL/3);ctx.fillRect(car.x+car.w/6,row*CELL+8,car.w/3,CELL/3);ctx.fillStyle="#fbbf24";ctx.beginPath();ctx.arc(car.dir>0?car.x+car.w/2:car.x-car.w/2,row*CELL+CELL-8,4,0,Math.PI*2);ctx.fill();});
    const fx=s.frog.col*(W/9)+(W/18),fy=s.frog.row*CELL+CELL/2,bounce=Math.sin(s.jumpAnim)*4;
    ctx.fillStyle="#22c55e";ctx.beginPath();ctx.ellipse(fx,fy-bounce,14,12,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#166534";ctx.beginPath();ctx.ellipse(fx-5,fy-10-bounce,5,4,-0.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(fx+5,fy-10-bounce,5,4,0.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fbbf24";ctx.beginPath();ctx.arc(fx-5,fy-10-bounce,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(fx+5,fy-10-bounce,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="bold 13px Nunito";ctx.textAlign="left";ctx.fillText("Score: "+s.score,12,22);ctx.fillStyle="#22c55e";ctx.fillText("🐸".repeat(s.lives),12,40);
    ctx.fillStyle="#94a3b8";ctx.font="12px Nunito";ctx.textAlign="center";ctx.fillText("Arrow keys or WASD to move",W/2,H-4);
  },[]);
  useAnimFrame(useCallback(()=>{
    const s=state.current;if(s.done)return;
    s.cars.forEach(car=>{car.x+=car.dir*car.spd;if(car.dir>0&&car.x>W+car.w)car.x=-car.w;if(car.dir<0&&car.x<-car.w)car.x=W+car.w;});
    if(s.jumpAnim>0)s.jumpAnim=Math.max(0,s.jumpAnim-0.3);
    if(s.frog.row>=1&&s.frog.row<=ROWS){const car=s.cars[s.frog.row-1];const fx=s.frog.col*(W/9)+(W/18);if(Math.abs(fx-car.x)<car.w/2+10){s.lives--;if(s.lives<=0)s.done=true;else s.frog={col:4,row:ROWS+1};}}
    if(s.frog.row===0){s.score+=10;s.crossings++;s.frog={col:4,row:ROWS+1};s.cars.forEach(c=>c.spd*=1.05);}
    draw();fu(n=>n+1);
  },[draw]),running.current&&!state.current.done);
  useEffect(()=>{
    draw();
    const kd=e=>{const s=state.current;if(!s||s.done)return;if(e.key==="ArrowUp"||e.key==="w"){s.frog.row=Math.max(0,s.frog.row-1);s.jumpAnim=Math.PI;}if(e.key==="ArrowDown"||e.key==="s"){s.frog.row=Math.min(ROWS+1,s.frog.row+1);s.jumpAnim=Math.PI;}if(e.key==="ArrowLeft"||e.key==="a")s.frog.col=Math.max(0,s.frog.col-1);if(e.key==="ArrowRight"||e.key==="d")s.frog.col=Math.min(8,s.frog.col+1);e.preventDefault();};
    window.addEventListener("keydown",kd);return()=>{running.current=false;window.removeEventListener("keydown",kd);};
  },[draw]);
  const reset=()=>{state.current=initState();running.current=true;fu(n=>n+1);};
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
    <div style={{position:"relative",borderRadius:14,overflow:"hidden",border:"2px solid rgba(255,255,255,.1)"}}>
      <canvas ref={cvs} width={W} height={H}/>
      {state.current.done&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.85)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:14}}>
        <div style={{fontSize:36,fontWeight:900,color:"#fff",marginBottom:8}}>🐸 Splat!</div>
        <div style={{fontSize:18,fontWeight:800,color:"#fbbf24",marginBottom:24}}>Score: {state.current.score} · Crossings: {state.current.crossings}</div>
        <button onClick={e=>{e.stopPropagation();reset();}} style={{padding:"12px 28px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#3b82f6,#14b8a6)",color:"#fff",fontFamily:"Nunito,sans-serif",fontSize:14,fontWeight:900,cursor:"pointer"}}>Play Again</button>
      </div>}
    </div>
    <div style={{fontSize:11,color:"#64748b",fontWeight:600}}>Arrow keys or WASD to move the frog!</div>
  </div>);
}

function GameBreakScreen({onReturn}){
  const[activeGame,setActiveGame]=useState(null);
  const[timeLeft,setTimeLeft]=useState(120);
  const timerRef=useRef(null);
  useEffect(()=>{
    if(!activeGame)return;

    timerRef.current=setInterval(()=>{setTimeLeft(t=>{if(t<=1){clearInterval(timerRef.current);onReturn();return 0;}return t-1;});},1000);
    return()=>clearInterval(timerRef.current);
  },[activeGame,onReturn]);
  const pct=(timeLeft/120)*100;
  const timerColor=pct>50?"#22c55e":pct>25?"#fbbf24":"#ef4444";
  const GAME_COMPS={football:FootballGame,arrow:ArrowGame,rocket:RocketGame,frog:FrogGame};

/* ── Writing Curriculum (Common Core W.3-5, aligned to grades 3-5) ── */
const WRITING_TYPES=[
  {
    id:"essay",icon:"✍️",name:"Essay Writing",color:"#7c3aed",bg:"#f5f3ff",
    desc:"Opinion, informational, and argument essays with clear structure",
    skills:["Hook & Intro","Thesis Statement","Body Paragraphs","Topic Sentences","Evidence & Details","Transitions","Conclusion","Revision"],
    standard:"CCSS W.3-5.1 / W.3-5.2",
    lessons:[
      {id:"e1",name:"What Is an Essay?",skill:"Hook & Intro",icon:"📄",concept:"An essay is a piece of writing where you share your ideas about one topic. Every essay has three parts: an introduction, body paragraphs, and a conclusion. Think of it like a sandwich — the bread is the intro and conclusion, and the filling is your body paragraphs!",example:"Topic: 'My favorite season is summer because the days are long, the weather is warm, and school is out.'",prompt:"Write 2-3 sentences introducing YOUR favorite season. Start with 'My favorite season is...' and give two reasons why.",skillFocus:"Introduction",ccss:"W.3.1a"},
      {id:"e2",name:"The Hook — Grab the Reader!",skill:"Hook & Intro",icon:"🪝",concept:"A hook is the very first sentence of your essay. Its job is to make the reader WANT to keep reading. Great hooks can be a question, a surprising fact, a bold statement, or a vivid description.",example:"Hook: 'Have you ever wondered why some kids love summer while others prefer cozy winter days?' — This question makes YOU want to read on!",prompt:"Write a hook sentence for an essay about your favorite food. Try starting with a question like 'Have you ever...' or a surprising statement.",skillFocus:"Hook",ccss:"W.3.1a"},
      {id:"e3",name:"The Thesis Statement",skill:"Thesis Statement",icon:"🎯",concept:"The thesis statement is the MOST important sentence in your essay. It tells the reader exactly what your essay is about and what you think. A strong thesis has a topic + your opinion + your three reasons.",example:"Weak: 'Pizza is good.' ✗\nStrong: 'Pizza is the best food because it is delicious, easy to share, and you can put any topping on it.' ✓",prompt:"Write a thesis statement for an essay about why your school should have more recess time. Use the formula: [Topic] is [opinion] because [reason 1], [reason 2], and [reason 3].",skillFocus:"Thesis",ccss:"W.3.1"},
      {id:"e4",name:"Topic Sentences",skill:"Topic Sentences",icon:"📌",concept:"Every body paragraph starts with a topic sentence. It tells the reader what ONE idea that paragraph is about. Think of it as a mini-thesis for just that paragraph.",example:"Thesis: 'Pizza is the best food because it is delicious, easy to share, and you can put any topping on it.'\nBody 1 topic sentence: 'First, pizza has the most delicious combination of flavors of any food.'",prompt:"You are writing an essay about why kids should learn to cook. Write topic sentences for your THREE body paragraphs. Start each with a transition word: First..., Second..., Finally...",skillFocus:"Topic Sentences",ccss:"W.3.2a"},
      {id:"e5",name:"Supporting Details & Evidence",skill:"Evidence & Details",icon:"🔍",concept:"After your topic sentence, you need PROOF! Add 2-3 supporting details, examples, or facts. Think of TEEA: Topic sentence → Explain → Example → Analysis (how does this prove your point?).",example:"Topic: 'Pizza is delicious.'\nExplain: When you take a bite, the cheese stretches and the sauce is perfectly tangy.\nExample: A study found that pizza is America's #1 favorite food.\nAnalysis: This proves that millions of people agree pizza tastes amazing.",prompt:"Write a full body paragraph about one reason kids should go outside every day. Include: a topic sentence, one explanation, one real example from your life, and one sentence connecting it back to your point.",skillFocus:"Evidence",ccss:"W.3.2b"},
      {id:"e6",name:"Transition Words",skill:"Transitions",icon:"🌉",concept:"Transition words are bridges between your ideas. They help your writing flow smoothly. Use them at the START of paragraphs and between sentences.",example:"Between paragraphs: First, Second, Third, In addition, Furthermore, Moreover, Finally, In conclusion...\nWithin paragraphs: because, therefore, however, for example, as a result, in fact...",prompt:"Rewrite these choppy sentences using transition words to make them flow better:\n'I like dogs. They are loyal. They protect you. They are fun to play with. I want a dog.'",skillFocus:"Transitions",ccss:"W.3.2c"},
      {id:"e7",name:"The Conclusion",skill:"Conclusion",icon:"🏁",concept:"The conclusion wraps up your essay. It should: (1) Restate your thesis in NEW words, (2) Summarize your 3 main points briefly, (3) End with a powerful final thought or call to action.",example:"'In conclusion, pizza truly is the greatest food because of its incredible taste, its ability to bring people together, and its endless variety. The next time you are hungry, reach for a slice — you will not be disappointed!'",prompt:"Write a conclusion for an essay about why summer is the best season. Remember: restate your thesis differently, briefly mention your 3 reasons, and end with a memorable final sentence.",skillFocus:"Conclusion",ccss:"W.3.1d"},
      {id:"e8",name:"Full 5-Paragraph Essay",skill:"Revision",icon:"📝",concept:"Now you are ready to write a complete 5-paragraph essay! The structure is: Introduction (hook + thesis) → Body 1 → Body 2 → Body 3 → Conclusion. Each body paragraph follows TEEA. Take it one paragraph at a time.",example:"Introduction: Hook + background + thesis\nBody 1: First reason + details\nBody 2: Second reason + details\nBody 3: Third reason + details\nConclusion: Restate + summary + powerful close",prompt:"Write a complete 5-paragraph essay on this prompt: 'What is one change you would make to improve your school, and why?' Take your time — write each section step by step.",skillFocus:"Full Essay",ccss:"W.3.1 / W.4.1 / W.5.1"},
    ]
  },
  {
    id:"creative",icon:"🌟",name:"Creative Writing",color:"#0ea5e9",bg:"#f0f9ff",
    desc:"Stories, personal narratives, and imaginative writing",
    skills:["Story Structure","Characters","Setting","Plot","Dialogue","Sensory Details","Voice","Ending"],
    standard:"CCSS W.3-5.3",
    lessons:[
      {id:"c1",name:"Story Structure — The Arc",skill:"Story Structure",icon:"🌈",concept:"Every great story has a shape called a story arc: Beginning (introduce characters + setting + problem) → Rising Action (things get complicated) → Climax (the biggest moment) → Falling Action → Resolution (how it ends). Without structure, stories feel lost.",example:"Beginning: Maya found a mysterious key in her grandmother's attic.\nRising Action: The key opened a hidden door no one had seen before.\nClimax: Inside was a time machine — and it was already running.\nResolution: Maya decided to step inside.",prompt:"Plan a short story using the arc structure. Write 1-2 sentences for each part: Beginning, Rising Action, Climax, and Resolution. Your story can be about anything — be creative!",skillFocus:"Story Arc",ccss:"W.3.3"},
      {id:"c2",name:"Characters — Bring Them to Life",skill:"Characters",icon:"🧑‍🎨",concept:"Great characters feel REAL. Readers need to know: What do they LOOK like? What do they WANT? What are they AFRAID of? What makes them special? Show character through actions and dialogue, not just descriptions.",example:"Weak: 'Sam was a funny kid.' ✗\nStrong: 'Sam slid into his seat two seconds before the bell, grinning like he'd just won a race. He always had a joke ready — even in the middle of a pop quiz.' ✓",prompt:"Create a character for a story. Write a short paragraph (4-6 sentences) describing them WITHOUT using the words 'nice,' 'funny,' or 'good.' Show us who they are through what they do, say, and think.",skillFocus:"Characterization",ccss:"W.3.3a"},
      {id:"c3",name:"Setting — Paint the Scene",skill:"Setting",icon:"🏞️",concept:"Setting is WHERE and WHEN your story takes place. A great setting uses all five senses: what you see, hear, smell, touch, and taste. The setting should FEEL like a real place.",example:"Weak: 'They were at the beach.' ✗\nStrong: 'The salt air stung Mia's nose as waves crashed against the shore. Sand, hot from the afternoon sun, burned the soles of her feet. Somewhere far out, a ship's horn bellowed.' ✓",prompt:"Pick one of these settings and describe it in 4-5 sentences using at least THREE of the five senses: a) A haunted library at midnight, b) A bustling farmers' market, c) A treehouse in a thunderstorm.",skillFocus:"Setting & Sensory Detail",ccss:"W.3.3d"},
      {id:"c4",name:"Dialogue — Characters Talking",skill:"Dialogue",icon:"💬",concept:"Dialogue makes stories come alive! Rules: (1) New speaker = new paragraph, (2) Use quotation marks around what is spoken, (3) Use dialogue to reveal character — not just to share information.",example:"'Did you eat my sandwich?' Jake demanded, slamming his locker.\n'What sandwich?' Emma asked, crumbs on her chin.\n'THAT sandwich.' He pointed at her face.",prompt:"Write a short scene (6-8 lines of dialogue) between two characters who have just found something strange in their backyard. Show their personalities through HOW they speak, not just WHAT they say.",skillFocus:"Dialogue",ccss:"W.3.3b"},
      {id:"c5",name:"Sensory Details & Vivid Language",skill:"Sensory Details",icon:"🎨",concept:"Strong writing SHOWS rather than TELLS. Instead of 'he was scared,' show it: 'his hands shook as he reached for the door.' Use strong verbs, specific nouns, and sensory details to make writing come alive.",example:"TELLS: 'The pizza was good.' ✗\nSHOWS: 'Cheese stretched a foot long when she lifted the slice, and the garlic-butter crust crunched with every bite.' ✓",prompt:"Take these 'telling' sentences and rewrite them as 'showing' sentences:\n1. 'She was nervous before the test.'\n2. 'The storm was scary.'\n3. 'He was happy when he scored the goal.'",skillFocus:"Show Don't Tell",ccss:"W.5.3d"},
      {id:"c6",name:"Personal Narrative",skill:"Voice",icon:"📔",concept:"A personal narrative is a true story from YOUR life. It uses first-person 'I' and shares your thoughts and feelings. The best personal narratives zoom in on ONE small moment and explore it deeply.",example:"'The day I scored my first goal, everything seemed to move in slow motion. I remember the squeak of my cleats, the roar that came from my dad in the stands, and the way my teammates piled on top of me. I had never felt so alive.'",prompt:"Write a personal narrative about a time you felt proud of yourself. Start in the MIDDLE of the action (not 'One day...'). Include what you saw, heard, thought, and felt. Aim for 8-10 sentences.",skillFocus:"Personal Narrative",ccss:"W.3.3 / W.4.3 / W.5.3"},

    lessons:[
      {id:"p1",name:"Opinion vs. Fact",skill:"Opinion vs Fact",icon:"⚖️",concept:"The foundation of persuasive writing is knowing the difference between FACTS (can be proven true) and OPINIONS (what someone believes). Strong persuasive writing uses FACTS to support OPINIONS.",example:"Fact: 'Studies show students who read 20 minutes daily score higher on tests.' ✓\nOpinion: 'Reading is better than video games.' (This is what someone believes, not a fact)\nFact supporting opinion: 'Students who read 20 min/day know 1.8 million more words by 6th grade.'",prompt:"Read these 5 statements and label each as FACT or OPINION. Then pick one OPINION and write 2 facts that could support it:\n1. Summer is the best season. 2. The Earth orbits the Sun. 3. Dogs make better pets than cats. 4. Exercise improves mood. 5. Chocolate ice cream is delicious.",skillFocus:"Fact vs Opinion",ccss:"W.3.1"},
      {id:"p2",name:"Building Your Argument",skill:"Claim & Reasons",icon:"🏗️",concept:"Every persuasive essay starts with a CLAIM (your opinion) supported by REASONS (why you think so). Each reason needs EVIDENCE (proof). Think: Claim → Reason → Evidence → So what?",example:"Claim: 'Schools should start later in the morning.'\nReason 1: Teenagers need more sleep for their brains to work well.\nEvidence: The CDC says teens need 8-10 hours of sleep, but most only get 7.\nSo what?: Starting school at 8:30am instead of 7:30am could improve grades and reduce depression.",prompt:"Choose a topic you feel strongly about (school lunches, screen time rules, a pet policy, etc.). Write your CLAIM and then list THREE reasons with at least one piece of evidence for each reason.",skillFocus:"Argument Structure",ccss:"W.3.1 / W.4.1"},

function parseBlocks(text){
  const blocks=[];const lines=text.split("\n");let i=0,cb=null,cl="";
  while(i<lines.length){const line=lines[i];
    if(line.startsWith("```")){if(cb!==null){blocks.push({type:"code",lang:cl,content:cb.join("\n")});cb=null;cl="";}else{cb=[];cl=line.slice(3).trim()||"code";}i++;continue;}
    if(cb!==null){cb.push(line);i++;continue;}
    if(line.includes("🤔")||line.toLowerCase().includes("think about this")){let c=line;while(i+1<lines.length&&lines[i+1].trim()&&!lines[i+1].startsWith("⭐")&&!lines[i+1].startsWith("📚")&&!lines[i+1].startsWith("```")){i++;c+="\n"+lines[i];}blocks.push({type:"challenge",content:c});i++;continue;}
    if(line.includes("⭐")||line.toLowerCase().includes("fun fact")){let c=line;while(i+1<lines.length&&lines[i+1].trim()&&!lines[i+1].startsWith("🤔")&&!lines[i+1].startsWith("📚")&&!lines[i+1].startsWith("```")){i++;c+="\n"+lines[i];}blocks.push({type:"funfact",content:c});i++;continue;}
    if(line.includes("📚")||line.toLowerCase().includes("practice this")||line.toLowerCase().includes("khan academy")||line.toLowerCase().includes("try this on")){let c=line;while(i+1<lines.length&&lines[i+1].trim()&&!lines[i+1].startsWith("🤔")&&!lines[i+1].startsWith("⭐")&&!lines[i+1].startsWith("```")){i++;c+="\n"+lines[i];}blocks.push({type:"resource",content:c});i++;continue;}
    if(line.trim()){if(blocks.length&&blocks[blocks.length-1].type==="text")blocks[blocks.length-1].content+="\n"+line;else blocks.push({type:"text",content:line});}i++;
  }
  return blocks;
}
