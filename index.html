<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nova STEM Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a2744;--navy2:#243258;--blue:#3b82f6;--teal:#14b8a6;--yellow:#fbbf24;--orange:#f97316;--green:#22c55e;--purple:#8b5cf6;--red:#ef4444;--pink:#ec4899;--white:#fff;--border:#e2e8f0;--muted:#64748b;--text:#1e293b;--font:'Nunito',sans-serif;--mono:'Fira Code',monospace}
html,body,#root{height:100%;margin:0}
body{font-family:var(--font);background:linear-gradient(160deg,#e0f2fe 0%,#f0fdf4 50%,#fef9c3 100%);color:var(--text)}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDownToast{from{opacity:0;transform:translateX(-50%) translateY(-14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.2)}50%{box-shadow:0 0 0 6px rgba(249,115,22,0)}}
.fade-in{animation:fadeIn .35s ease forwards}
.slide-up{animation:slideUp .4s cubic-bezier(.34,1.56,.64,1) forwards}
.pop{animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.spin{animation:spin 1s linear infinite;display:inline-block}

/* API Key */
.apikey-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#0f172a,#1a2744,#1e3a5f)}
.apikey-card{background:#fff;border-radius:24px;padding:40px;max-width:480px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,.3);text-align:center}
.apikey-owl{font-size:64px;display:block;margin-bottom:14px;animation:float 3s ease-in-out infinite}
.apikey-title{font-size:26px;font-weight:900;color:var(--navy);margin-bottom:8px}
.apikey-title span{background:linear-gradient(90deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.apikey-sub{font-size:13px;color:var(--muted);font-weight:600;line-height:1.7;margin-bottom:24px}
.apikey-steps{background:#f8fafc;border-radius:12px;padding:16px;margin-bottom:20px;text-align:left}
.apikey-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--text);line-height:1.5}
.apikey-step:last-child{margin-bottom:0}
.apikey-step-num{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.apikey-inp{width:100%;padding:13px 15px;border:2px solid var(--border);border-radius:11px;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:14px;letter-spacing:.5px}
.apikey-inp:focus{border-color:var(--blue)}
.apikey-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(59,130,246,.4)}
.apikey-btn:hover{transform:translateY(-2px)} .apikey-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.apikey-note{font-size:11px;color:var(--muted);font-weight:600;margin-top:12px;line-height:1.6}
.apikey-link{color:var(--blue);text-decoration:none;font-weight:800}
.err-box{color:var(--red);font-size:12px;font-weight:700;margin-bottom:10px;padding:8px 12px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca}
.ok-box{color:#166534;font-size:12px;font-weight:700;margin-bottom:10px;padding:8px 12px;background:#f0fdf4;border-radius:8px;border:1px solid var(--green)}

/* Auth */
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#0f172a,#1a2744,#1e3a5f)}
.auth-card{background:#fff;border-radius:24px;padding:40px;max-width:440px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,.3);text-align:center}
.auth-owl{font-size:56px;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite}
.auth-title{font-size:24px;font-weight:900;color:var(--navy);margin-bottom:6px}
.auth-title span{background:linear-gradient(90deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-sub{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:20px;line-height:1.6}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:#f1f5f9;border-radius:10px;padding:3px}
.auth-tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s}
.auth-tab.active{background:#fff;color:var(--navy);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.auth-type-row{display:flex;gap:10px;margin-bottom:16px}
.auth-type-btn{flex:1;padding:12px;border-radius:12px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:5px}
.auth-type-btn.active{border-color:var(--blue);background:#eff6ff;color:var(--blue)}
.auth-type-icon{font-size:24px}
.auth-inp{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:10px}
.auth-inp:focus{border-color:var(--blue)}
.auth-btn{width:100%;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(59,130,246,.4);margin-top:4px}
.auth-btn:hover{transform:translateY(-2px)} .auth-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.sync-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:#f0fdf4;border:1px solid var(--green);color:#166534;font-size:10px;font-weight:800}
.sync-warn{background:#fff7ed;border-color:var(--orange);color:#92400e}

/* Header */
.header{background:var(--navy);padding:0 20px;height:64px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(26,39,68,.3);flex-shrink:0}
.mascot{font-size:32px;animation:float 3s ease-in-out infinite}
.header-title{font-size:20px;font-weight:900;color:#fff}
.header-title span{background:linear-gradient(90deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-sub{font-size:10px;color:#94a3b8;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tab-btn{padding:6px 14px;border-radius:20px;border:2px solid rgba(255,255,255,.2);background:transparent;color:#94a3b8;font-family:var(--font);font-size:12px;font-weight:800;cursor:pointer;transition:all .15s}
.tab-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.tab-btn:hover:not(.active){border-color:rgba(255,255,255,.4);color:#fff}
.xp-chip{display:flex;align-items:center;gap:5px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);border-radius:20px;padding:5px 11px;color:var(--yellow);font-size:12px;font-weight:800}
.level-chip{display:flex;align-items:center;gap:5px;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);border-radius:20px;padding:5px 11px;color:#a78bfa;font-size:12px;font-weight:800}
.signout-btn{padding:5px 11px;border-radius:20px;border:2px solid rgba(255,255,255,.15);background:transparent;color:#94a3b8;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;transition:all .15s}
.signout-btn:hover{border-color:var(--red);color:var(--red)}

/* Main */
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:196px;flex-shrink:0;background:rgba(255,255,255,.75);backdrop-filter:blur(8px);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:12px 10px;gap:11px}
.sidebar-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.mastery-row{margin-bottom:7px}
.mastery-row-top{display:flex;justify-content:space-between;font-size:11px;font-weight:800;margin-bottom:3px}
.mastery-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden}
.mastery-fill{height:100%;border-radius:6px;transition:width .5s}
.subject-btn{width:100%;padding:8px 10px;border-radius:9px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;color:var(--text);margin-bottom:4px}
.subject-btn:hover,.subject-btn.active{transform:translateX(3px)}
.subject-btn.math{color:var(--blue)} .subject-btn.math.active,.subject-btn.math:hover{background:#eff6ff;border-color:var(--blue)}
.subject-btn.science{color:var(--purple)} .subject-btn.science.active,.subject-btn.science:hover{background:#f5f3ff;border-color:var(--purple)}
.subject-btn.coding{color:var(--teal)} .subject-btn.coding.active,.subject-btn.coding:hover{background:#f0fdfa;border-color:var(--teal)}
.mode-btn{width:100%;padding:7px 10px;border-radius:9px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;color:var(--muted);margin-bottom:4px}
.mode-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.gap-pill{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;background:#fff7ed;border:1px solid var(--orange);color:#92400e;font-size:10px;font-weight:700;margin-bottom:4px;cursor:pointer;transition:all .15s}
.gap-pill:hover{background:#fed7aa}
.strength-pill{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;background:#f0fdf4;border:1px solid var(--green);color:#166534;font-size:10px;font-weight:700;margin-bottom:4px}
.struggle-indicator{padding:8px 10px;border-radius:10px;background:linear-gradient(135deg,#fff7ed,#fef3c7);border:2px solid var(--orange);font-size:10px;font-weight:800;color:#92400e;display:flex;align-items:center;gap:6px;animation:pulseGlow 2s ease-in-out infinite}
.struggle-bar{height:4px;background:rgba(249,115,22,.2);border-radius:4px;margin-top:5px;overflow:hidden}
.struggle-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--yellow),var(--orange));transition:width .4s}

/* Chat */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:5px} .chat-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.welcome{margin:auto;text-align:center;padding:16px;max-width:500px;animation:fadeIn .4s ease}
.welcome-emoji{font-size:56px;display:block;animation:float 3s ease-in-out infinite;margin-bottom:10px}
.welcome-title{font-size:26px;font-weight:900;color:var(--navy);margin-bottom:7px}
.welcome-title em{font-style:normal;background:linear-gradient(90deg,var(--blue),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome-sub{font-size:13px;color:var(--muted);font-weight:600;line-height:1.7;margin-bottom:6px}
.welcome-interests{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.welcome-interest-tag{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;background:#eff6ff;color:var(--blue);border:1px solid #bfdbfe}
.qs-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qs-btn{padding:10px 12px;border-radius:11px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;text-align:left;line-height:1.4;transition:all .15s;color:var(--text);display:flex;gap:7px;align-items:flex-start;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.qs-btn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.1);border-color:var(--blue)}
.qs-emoji{font-size:16px;flex-shrink:0}
.msg{display:flex;gap:9px;animation:popIn .25s cubic-bezier(.34,1.56,.64,1);max-width:660px;width:100%}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 2px 7px rgba(0,0,0,.12)}
.av-nova{background:linear-gradient(135deg,var(--navy),var(--blue))} .av-user{background:linear-gradient(135deg,var(--orange),var(--pink))}
.bubble{padding:11px 15px;border-radius:15px;font-size:13px;line-height:1.75;max-width:calc(100% - 42px);font-weight:600}
.bubble-nova{background:#fff;border:2px solid var(--border);border-top-left-radius:4px;box-shadow:0 2px 9px rgba(0,0,0,.07)}
.bubble-user{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-top-right-radius:4px}
.bubble-remediation{background:linear-gradient(135deg,#fff7ed,#fef3c7);border:2px solid var(--orange);border-top-left-radius:4px}
.remediation-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:6px;background:var(--orange);color:#fff;font-size:9px;font-weight:800;margin-bottom:7px}
.block-challenge{margin:9px 0;padding:11px 13px;background:linear-gradient(135deg,#fef9c3,#fef3c7);border:2px solid var(--yellow);border-radius:11px;font-size:12px;color:#78350f}
.block-challenge-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);margin-bottom:4px}
.block-fact{margin:9px 0;padding:11px 13px;background:linear-gradient(135deg,#eff6ff,#e0f2fe);border:2px solid var(--blue);border-radius:11px;font-size:12px;color:#1e40af}
.block-fact-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);margin-bottom:4px}
.block-resource{margin:9px 0;padding:11px 13px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid var(--green);border-radius:11px;font-size:12px;color:#166534}
.block-resource-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.resource-link{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;background:#fff;border:1px solid var(--green);color:#166534;font-size:11px;font-weight:800;text-decoration:none;margin:3px 3px 0 0;cursor:pointer;transition:all .15s}
.resource-link:hover{background:var(--green);color:#fff}
.block-code{margin:9px 0;background:var(--navy);border-radius:9px;overflow:hidden}
.block-code-hdr{padding:5px 11px;background:var(--navy2);font-size:9px;font-weight:700;letter-spacing:1px;color:#94a3b8;text-transform:uppercase;font-family:var(--mono)}
.block-code-body{padding:9px 11px;font-family:var(--mono);font-size:11px;color:#e2e8f0;line-height:1.7;white-space:pre-wrap;overflow-x:auto}
.typing{background:#fff;border:2px solid var(--border);border-radius:15px;border-top-left-radius:4px;padding:11px 15px;display:flex;gap:5px;align-items:center}
.tdot{width:7px;height:7px;border-radius:50%;animation:bounce 1.2s ease infinite}
.tdot:nth-child(1){background:var(--blue);animation-delay:0s} .tdot:nth-child(2){background:var(--teal);animation-delay:.2s} .tdot:nth-child(3){background:var(--purple);animation-delay:.4s}
.topic-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:800;margin:2px}
.topic-tag.math{background:#eff6ff;color:var(--blue);border:1px solid #bfdbfe}
.topic-tag.science{background:#f5f3ff;color:var(--purple);border:1px solid #ddd6fe}
.topic-tag.coding{background:#f0fdfa;color:var(--teal);border:1px solid #99f6e4}
.xp-toast{position:fixed;bottom:80px;right:20px;background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;padding:8px 15px;border-radius:18px;font-size:12px;font-weight:800;box-shadow:0 4px 18px rgba(0,0,0,.2);animation:toastIn .3s ease;z-index:100}
.level-toast{position:fixed;bottom:80px;right:20px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;padding:12px 20px;border-radius:18px;font-size:13px;font-weight:800;box-shadow:0 4px 24px rgba(139,92,246,.5);animation:toastIn .3s ease;z-index:100}
.mastered-toast{position:fixed;top:74px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--yellow),var(--orange));color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;font-weight:800;box-shadow:0 4px 18px rgba(0,0,0,.2);animation:slideDownToast .3s ease;z-index:200}
.gap-toast{position:fixed;top:74px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#fff7ed,#fed7aa);border:2px solid var(--orange);color:#92400e;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:800;animation:slideDownToast .3s ease;z-index:200}
.input-area{padding:10px 20px 14px;background:rgba(255,255,255,.6);backdrop-filter:blur(8px);border-top:1px solid var(--border)}
.input-box{display:flex;gap:9px;align-items:flex-end;background:#fff;border:2px solid var(--border);border-radius:13px;padding:9px 13px;box-shadow:0 2px 9px rgba(0,0,0,.07);transition:border-color .15s}
.input-box:focus-within{border-color:var(--blue)} .input-box.struggling{border-color:var(--orange)}
.chat-input{flex:1;border:none;outline:none;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text);background:none;resize:none;min-height:20px;max-height:90px;line-height:1.5}
.chat-input::placeholder{color:#cbd5e1}
.send-btn{width:36px;height:36px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:hover:not(:disabled){transform:scale(1.08)} .send-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Structured Learning Flow ── */
.learn-wrap{flex:1;display:flex;overflow:hidden}
.learn-sidebar{width:220px;flex-shrink:0;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:14px 12px;gap:10px}
.learn-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(160deg,#f8faff,#f0fdf4)}
/* Subject picker */
.subj-pick-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:20px}
.subj-pick-title{font-size:22px;font-weight:900;color:var(--navy);text-align:center}
.subj-pick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:600px;width:100%}
.subj-pick-btn{padding:22px 14px;border-radius:18px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.subj-pick-btn:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.subj-pick-btn.math:hover,.subj-pick-btn.math.sel{border-color:var(--blue);background:#eff6ff;}
.subj-pick-btn.science:hover,.subj-pick-btn.science.sel{border-color:var(--purple);background:#f5f3ff;}
.subj-pick-btn.chemistry:hover,.subj-pick-btn.chemistry.sel{border-color:var(--orange);background:#fff7ed;}
.subj-pick-btn.biology:hover,.subj-pick-btn.biology.sel{border-color:var(--green);background:#f0fdf4;}
.subj-pick-btn.coding:hover,.subj-pick-btn.coding.sel{border-color:var(--teal);background:#f0fdfa;}
.subj-pick-btn.critical:hover,.subj-pick-btn.critical.sel{border-color:var(--pink);background:#fdf2f8;}
.subj-pick-icon{font-size:36px;margin-bottom:8px}
.subj-pick-label{font-size:13px;font-weight:900;color:var(--navy)}
.subj-pick-pct{font-size:11px;font-weight:700;margin-top:3px}
/* Topic picker */
.topic-pick-wrap{flex:1;overflow-y:auto;padding:24px}
.topic-pick-title{font-size:18px;font-weight:900;color:var(--navy);margin-bottom:4px}
.topic-pick-sub{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:18px}
.topic-unit-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:16px}
.topic-pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.topic-pick-btn{padding:12px 14px;border-radius:13px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;text-align:left;box-shadow:0 2px 6px rgba(0,0,0,.05);display:flex;align-items:flex-start;gap:10px}
.topic-pick-btn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.1)}
.topic-pick-btn.locked{opacity:.4;cursor:not-allowed;transform:none}
.topic-pick-btn.mastered{border-color:var(--green);background:#f0fdf4}
.topic-pick-icon{font-size:20px;flex-shrink:0}
.topic-pick-name{font-size:11px;font-weight:800;color:var(--text);line-height:1.3}
.topic-pick-sub2{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}
.topic-pct-bar{height:3px;background:var(--border);border-radius:3px;margin-top:5px;overflow:hidden}
.topic-pct-fill{height:100%;border-radius:3px;transition:width .5s}
/* Teaching screen */
.teaching-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.teaching-header{padding:14px 20px 10px;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;gap:12px;flex-shrink:0}
.teaching-back{padding:6px 12px;border-radius:20px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s}
.teaching-back:hover{border-color:var(--navy);color:var(--navy)}
.teaching-topic{font-size:14px;font-weight:900;color:var(--navy)}
.teaching-phase{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:800;margin-left:auto}
.phase-learn{background:#eff6ff;color:var(--blue)}
.phase-quiz{background:#f0fdf4;color:var(--green)}
.teaching-chat{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.teaching-chat::-webkit-scrollbar{width:5px}.teaching-chat::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.ready-btn{margin:16px auto 0;padding:13px 32px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(34,197,94,.3);display:block}
.ready-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(34,197,94,.4)}
/* Quiz */
.quiz-wrap{padding:20px;display:flex;flex-direction:column;gap:14px}
.quiz-q-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.quiz-q-num{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.quiz-q-text{font-size:15px;font-weight:800;color:var(--navy);line-height:1.5;margin-bottom:16px}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quiz-opt{padding:12px 14px;border-radius:11px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;color:var(--text);line-height:1.4}
.quiz-opt:hover:not(:disabled){border-color:var(--blue);background:#eff6ff;transform:translateY(-1px)}
.quiz-opt.correct{border-color:var(--green)!important;background:#f0fdf4!important;color:#166534!important}
.quiz-opt.wrong{border-color:var(--red)!important;background:#fef2f2!important;color:#991b1b!important}
.quiz-opt:disabled{cursor:not-allowed}
.quiz-explain{padding:12px 14px;border-radius:11px;font-size:12px;font-weight:700;line-height:1.6;margin-top:4px}
.quiz-explain.ok{background:#f0fdf4;border:2px solid var(--green);color:#166534}
.quiz-explain.no{background:#fef2f2;border:2px solid var(--red);color:#991b1b}
.quiz-next-btn{width:100%;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-family:var(--font);font-size:13px;font-weight:900;cursor:pointer;transition:all .15s;margin-top:8px}
.quiz-next-btn:hover{transform:translateY(-1px)}
.quiz-progress{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.quiz-prog-bar{flex:1;height:7px;background:var(--border);border-radius:6px;overflow:hidden}
.quiz-prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width .4s}
.quiz-score-card{background:#fff;border-radius:20px;padding:32px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08);max-width:480px;margin:0 auto}
/* Sidebar mastery mini */
.sidebar-mastery-mini{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:3px}
.sidebar-xp{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:10px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2)}
.sidebar-xp-val{font-size:14px;font-weight:900;color:var(--yellow)}
.sidebar-xp-lbl{font-size:10px;font-weight:700;color:#92400e}
.mic-btn{width:36px;height:36px;border-radius:9px;border:none;background:linear-gradient(135deg,#64748b,#475569);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.mic-btn:hover{transform:scale(1.08)} .mic-btn.listening{background:linear-gradient(135deg,var(--red),#dc2626);animation:pulseGlow 1s infinite}
.voice-bar{display:flex;align-items:center;gap:8px;padding:7px 20px 0;flex-wrap:wrap}
.voice-toggle{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:var(--font);font-size:10px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s;user-select:none}
.voice-toggle.on{border-color:var(--teal);background:#f0fdfa;color:var(--teal)}
.voice-toggle-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .15s}
.voice-toggle.on .voice-toggle-dot{background:var(--teal)}
.speaking-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:linear-gradient(135deg,#f0fdfa,#e0f7f4);border:1px solid var(--teal);color:var(--teal);font-size:10px;font-weight:800}
@keyframes speakPulse{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.6)}}
.speak-wave{display:flex;gap:2px;align-items:center;height:12px}
.speak-bar{width:3px;border-radius:2px;background:var(--teal)}
.speak-bar:nth-child(1){animation:speakPulse .6s ease infinite .0s;height:6px}
.speak-bar:nth-child(2){animation:speakPulse .6s ease infinite .1s;height:10px}
.speak-bar:nth-child(3){animation:speakPulse .6s ease infinite .2s;height:7px}
.speak-bar:nth-child(4){animation:speakPulse .6s ease infinite .15s;height:10px}
.speak-bar:nth-child(5){animation:speakPulse .6s ease infinite .05s;height:5px}
.voice-speed-btn{padding:3px 8px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:var(--font);font-size:9px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s}
.voice-speed-btn.active{border-color:var(--purple);background:#f5f3ff;color:var(--purple)}
.status-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.status-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:800}
.chip-subject{background:var(--navy);color:#fff} .chip-mode{background:#f1f5f9;color:var(--muted)} .chip-struggling{background:#fff7ed;color:var(--orange);border:1px solid var(--orange)}

/* Tree */
.tree-panel{width:252px;flex-shrink:0;background:rgba(255,255,255,.8);backdrop-filter:blur(8px);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.tree-header{padding:12px 12px 9px;border-bottom:1px solid var(--border)}
.tree-title{font-size:13px;font-weight:900;color:var(--navy);margin-bottom:7px}
.tree-tabs{display:flex;gap:4px}
.tree-tab{flex:1;padding:5px;border-radius:7px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:10px;font-weight:800;cursor:pointer;transition:all .15s;color:var(--muted);text-align:center}
.tree-tab.math.active{background:#eff6ff;border-color:var(--blue);color:var(--blue)}
.tree-tab.science.active{background:#f5f3ff;border-color:var(--purple);color:var(--purple)}
.tree-tab.coding.active{background:#f0fdfa;border-color:var(--teal);color:var(--teal)}
.tree-body{flex:1;overflow-y:auto;padding:9px 11px}
.tree-body::-webkit-scrollbar{width:4px} .tree-body::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
.tree-unit{margin-bottom:13px}
.tree-unit-label{font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;padding-left:2px}
.tree-node{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;border-radius:9px;border:2px solid var(--border);background:#fff;margin-bottom:4px;cursor:pointer;transition:all .15s}
.tree-node:hover:not(.locked){transform:translateX(2px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.tree-node.locked{opacity:.4;cursor:default}
.tree-node.mastered{border-color:var(--green);background:#f0fdf4}
.tree-node.gap{border-color:var(--orange);background:#fff7ed}
.tree-node.current{border-color:#bfdbfe;background:#eff6ff}
.tree-node.struggling-node{border-color:var(--red);background:#fef2f2;animation:pulseGlow 2s infinite}
.tree-node-icon{font-size:15px;flex-shrink:0;margin-top:1px} .tree-node-text{flex:1;min-width:0}
.tree-node-name{font-size:10px;font-weight:800;color:var(--text);line-height:1.3}
.tree-node-sub{font-size:9px;font-weight:600;color:var(--muted)}
.tree-node-bar{height:3px;background:var(--border);border-radius:3px;margin-top:3px;overflow:hidden}
.tree-node-fill{height:100%;border-radius:3px;transition:width .5s}
.tree-node-resources{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.tree-resource-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:5px;font-size:8px;font-weight:800;text-decoration:none;transition:all .15s}
.tree-resource-badge:hover{opacity:.8;transform:scale(1.05)}
.tree-node-pct{font-size:9px;font-weight:800;flex-shrink:0;margin-top:2px}
.tree-legend{padding:8px 11px;border-top:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:3px;font-size:9px;font-weight:700;color:var(--muted)}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Wizard */
.wizard-wrap{flex:1;display:flex;overflow:hidden}
.wizard-sidebar{width:220px;flex-shrink:0;background:var(--navy);padding:28px 20px;display:flex;flex-direction:column}
.wizard-logo{display:flex;align-items:center;gap:10px;margin-bottom:36px}
.wizard-logo-owl{font-size:28px}
.wizard-logo-text{font-size:16px;font-weight:900;color:#fff}
.wizard-logo-text span{background:linear-gradient(90deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wizard-step-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;margin-bottom:4px;transition:all .2s}
.wizard-step-item.active{background:rgba(59,130,246,.2)}
.wizard-step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;border:2px solid rgba(255,255,255,.15);color:#94a3b8;transition:all .2s}
.wizard-step-item.active .wizard-step-num{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 0 4px rgba(59,130,246,.3)}
.wizard-step-item.done .wizard-step-num{background:var(--green);border-color:var(--green);color:#fff}
.wizard-step-lbl{font-size:12px;font-weight:800;color:#475569;transition:color .2s}
.wizard-step-item.active .wizard-step-lbl{color:#fff}
.wizard-step-item.done .wizard-step-lbl{color:#64748b}
.wizard-connector{width:2px;height:20px;background:rgba(255,255,255,.08);margin:0 0 0 22px}
.wizard-connector.done{background:var(--green);opacity:.4}
.wizard-main{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:40px 48px;align-items:center;justify-content:center}
.wizard-card{background:#fff;border-radius:24px;padding:40px;max-width:520px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.1)}
.wizard-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:#eff6ff;color:var(--blue);font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.wizard-title{font-size:26px;font-weight:900;color:var(--navy);line-height:1.2;margin-bottom:8px}
.wizard-sub{font-size:13px;color:var(--muted);font-weight:600;line-height:1.7;margin-bottom:28px}
.field-lbl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field-inp{width:100%;padding:13px 15px;border:2px solid var(--border);border-radius:11px;font-family:var(--font);font-size:15px;font-weight:700;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:18px}
.field-inp:focus{border-color:var(--blue)}
.grade-row{display:flex;gap:7px;margin-bottom:22px;flex-wrap:wrap}
.grade-pill{padding:8px 14px;border-radius:9px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;transition:all .15s;color:var(--muted)}
.grade-pill.active{border-color:var(--blue);background:#eff6ff;color:var(--blue)}
.interest-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:22px}
.interest-btn{padding:13px 14px;border-radius:12px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--text);display:flex;align-items:center;gap:9px}
.interest-btn:hover,.interest-btn.active{border-color:var(--blue);background:#eff6ff;color:var(--blue)}
.interest-icon{font-size:22px}
.wizard-nav{display:flex;gap:10px;margin-top:4px}
.btn-primary{flex:1;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(59,130,246,.35)}
.btn-primary:hover{transform:translateY(-2px)} .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{padding:14px 20px;border-radius:12px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s}
.btn-secondary:hover{border-color:var(--navy);color:var(--navy)}
.diag-card{background:#fff;border-radius:22px;padding:36px;max-width:540px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.diag-prog-lbl{display:flex;justify-content:space-between;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px}
.diag-bar{height:7px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:20px}
.diag-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width .4s}
.subj-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;margin-bottom:14px}
.badge-math{background:#eff6ff;color:var(--blue)} .badge-science{background:#f5f3ff;color:var(--purple)} .badge-coding{background:#f0fdfa;color:var(--teal)}
.diag-q{font-size:17px;font-weight:800;color:var(--navy);line-height:1.4;margin-bottom:6px}
.diag-hint{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:18px}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.ans-btn{padding:12px 13px;border-radius:11px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--text);text-align:left}
.ans-btn:hover:not(:disabled){border-color:var(--blue);background:#eff6ff;transform:translateY(-1px)}
.ans-btn.correct{border-color:var(--green);background:#f0fdf4;color:#166534}
.ans-btn.wrong{border-color:var(--red);background:#fef2f2;color:#991b1b}
.ans-btn:disabled{cursor:not-allowed}
.feedback{padding:12px 14px;border-radius:11px;font-size:12px;font-weight:700;margin-bottom:16px;line-height:1.6}
.fb-ok{background:#f0fdf4;border:2px solid var(--green);color:#166534}
.fb-no{background:#fef2f2;border:2px solid var(--red);color:#991b1b}
.next-btn{width:100%;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-family:var(--font);font-size:13px;font-weight:900;cursor:pointer;transition:all .15s}
.next-btn:hover{transform:translateY(-2px)}
.results-card{background:#fff;border-radius:22px;padding:36px;max-width:540px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.12);text-align:center}
.mastery-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px}
.m-card{padding:16px 12px;border-radius:13px;border:2px solid var(--border);text-align:center}
.m-icon{font-size:26px;margin-bottom:6px} .m-lbl{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.m-score{font-size:28px;font-weight:900;line-height:1} .m-bar{margin-top:6px;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.m-bar-fill{height:100%;border-radius:4px;transition:width .6s}
.box-gap{background:#fff7ed;border:2px solid var(--orange);border-radius:11px;padding:12px;margin-bottom:12px;text-align:left}
.box-gap-title{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--orange);margin-bottom:6px}
.box-gap-item{font-size:11px;font-weight:700;color:#92400e;margin-bottom:3px}
.box-str{background:#f0fdf4;border:2px solid var(--green);border-radius:11px;padding:12px;margin-bottom:18px;text-align:left}
.box-str-title{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.box-str-item{font-size:11px;font-weight:700;color:#166534;margin-bottom:3px}
.big-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(59,130,246,.4)}
.big-btn:hover{transform:translateY(-2px)}
.pin-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.pin-card{background:#fff;border-radius:22px;padding:36px;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:22px}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);background:#fff;transition:all .15s}
.pin-dot.filled{background:var(--navy);border-color:var(--navy)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;max-width:210px;margin:0 auto 14px}
.pin-key{padding:13px;border-radius:11px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:17px;font-weight:800;cursor:pointer;transition:all .15s;color:var(--text)}
.pin-key:hover{border-color:var(--blue);background:#eff6ff}
.pin-key.del{font-size:13px;color:var(--red);border-color:transparent}
.pin-err{color:var(--red);font-size:11px;font-weight:700;margin-top:6px}

/* ── Parent Hub ── */
.parent-hub{flex:1;display:flex;overflow:hidden}

function useAnimFrame(cb,running){

function FrogGame({onBack}){
  const W=480,H=340,ROWS=5,CELL=H/(ROWS+2);
  const cvs=useRef(null);const[,fu]=useState(0);const running=useRef(true);
  const initState=()=>({frog:{col:4,row:ROWS+1},cars:Array.from({length:ROWS},(_,i)=>({x:i%2===0?-50:W+50,dir:i%2===0?1:-1,spd:1.2+i*0.4,w:50+Math.floor(Math.random()*30),color:["#ef4444","#f97316","#3b82f6","#8b5cf6","#22c55e"][i]})),score:0,lives:3,done:false,crossings:0,jumpAnim:0});
  const state=useRef(initState());
  const draw=useCallback(()=>{
    const c=cvs.current;if(!c)return;const ctx=c.getContext("2d");const s=state.current;
    ctx.fillStyle="#166534";ctx.fillRect(0,0,W,CELL);
    for(let r=1;r<=ROWS;r++){ctx.fillStyle=r%2===0?"#374151":"#1f2937";ctx.fillRect(0,r*CELL,W,CELL);if(r%2===0){ctx.fillStyle="#fbbf24";for(let x=0;x<W;x+=60)ctx.fillRect(x,r*CELL+CELL/2-2,30,4);}}
    ctx.fillStyle="#166534";ctx.fillRect(0,(ROWS+1)*CELL,W,CELL);
    s.cars.forEach((car,i)=>{const row=i+1;ctx.fillStyle=car.color;ctx.beginPath();ctx.roundRect(car.x-car.w/2,row*CELL+4,car.w,CELL-8,6);ctx.fill();ctx.fillStyle="#bae6fd";ctx.fillRect(car.x-car.w/2+6,row*CELL+8,car.w/3,CELL/3);ctx.fillRect(car.x+car.w/6,row*CELL+8,car.w/3,CELL/3);ctx.fillStyle="#fbbf24";ctx.beginPath();ctx.arc(car.dir>0?car.x+car.w/2:car.x-car.w/2,row*CELL+CELL-8,4,0,Math.PI*2);ctx.fill();});
    const fx=s.frog.col*(W/9)+(W/18),fy=s.frog.row*CELL+CELL/2,bounce=Math.sin(s.jumpAnim)*4;
    ctx.fillStyle="#22c55e";ctx.beginPath();ctx.ellipse(fx,fy-bounce,14,12,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#166534";ctx.beginPath();ctx.ellipse(fx-5,fy-10-bounce,5,4,-0.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(fx+5,fy-10-bounce,5,4,0.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fbbf24";ctx.beginPath();ctx.arc(fx-5,fy-10-bounce,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(fx+5,fy-10-bounce,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="bold 13px Nunito";ctx.textAlign="left";ctx.fillText("Score: "+s.score,12,22);ctx.fillStyle="#22c55e";ctx.fillText("🐸".repeat(s.lives),12,40);
    ctx.fillStyle="#94a3b8";ctx.font="12px Nunito";ctx.textAlign="center";ctx.fillText("Arrow keys or WASD to move",W/2,H-4);
  },[]);
  useAnimFrame(useCallback(()=>{
    const s=state.current;if(s.done)return;
    s.cars.forEach(car=>{car.x+=car.dir*car.spd;if(car.dir>0&&car.x>W+car.w)car.x=-car.w;if(car.dir<0&&car.x<-car.w)car.x=W+car.w;});
    if(s.jumpAnim>0)s.jumpAnim=Math.max(0,s.jumpAnim-0.3);
    if(s.frog.row>=1&&s.frog.row<=ROWS){const car=s.cars[s.frog.row-1];const fx=s.frog.col*(W/9)+(W/18);if(Math.abs(fx-car.x)<car.w/2+10){s.lives--;if(s.lives<=0)s.done=true;else s.frog={col:4,row:ROWS+1};}}
    if(s.frog.row===0){s.score+=10;s.crossings++;s.frog={col:4,row:ROWS+1};s.cars.forEach(c=>c.spd*=1.05);}
    draw();fu(n=>n+1);
  },[draw]),running.current&&!state.current.done);
  useEffect(()=>{
    draw();
    const kd=e=>{const s=state.current;if(!s||s.done)return;if(e.key==="ArrowUp"||e.key==="w"){s.frog.row=Math.max(0,s.frog.row-1);s.jumpAnim=Math.PI;}if(e.key==="ArrowDown"||e.key==="s"){s.frog.row=Math.min(ROWS+1,s.frog.row+1);s.jumpAnim=Math.PI;}if(e.key==="ArrowLeft"||e.key==="a")s.frog.col=Math.max(0,s.frog.col-1);if(e.key==="ArrowRight"||e.key==="d")s.frog.col=Math.min(8,s.frog.col+1);e.preventDefault();};

  },[draw]);

        <div style={{fontSize:36,fontWeight:900,color:"#fff",marginBottom:8}}>🐸 Splat!</div>
        <div style={{fontSize:18,fontWeight:800,color:"#fbbf24",marginBottom:24}}>Score: {state.current.score} · Crossings: {state.current.crossings}</div>
        <button onClick={e=>{e.stopPropagation();reset();}} style={{padding:"12px 28px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#3b82f6,#14b8a6)",color:"#fff",fontFamily:"Nunito,sans-serif",fontSize:14,fontWeight:900,cursor:"pointer"}}>Play Again</button>

function parseBlocks(text){

  while(i<lines.length){const line=lines[i];
    if(line.startsWith("```")){if(cb!==null){blocks.push({type:"code",lang:cl,content:cb.join("\n")});cb=null;cl="";}else{cb=[];cl=line.slice(3).trim()||"code";}i++;continue;}

    if(line.trim()){if(blocks.length&&blocks[blocks.length-1].type==="text")blocks[blocks.length-1].content+="\n"+line;else blocks.push({type:"text",content:line});}i++;

  // Speak text — strip emojis/markdown for cleaner audio

    const clean=text
      .replace(/[🤔⭐📚💻🎯🏆⚠️🦉✅❌🎉🌟🎊➕➖✖️➗🔢📐📏🍕⚖️🔄🔀📦🧩📋1️⃣🔸💯📖🔣🏛️🔷🏎️🟰🔡🎲🌍💪🛞⚙️💧🧲🔥🌌🌦️🌿🔬🌱🦴❤️🪨🌐🌡️⚡🌊🧲🔮🌐🧮]/gu,"")

  const updateTM=(ids,struggling,p)=>{const tm={...(p.topicMastery||{})};const nm=[];ids.forEach(id=>{const prev=tm[id]||0;const d=struggling?-8:12+Math.floor(Math.random()*6);tm[id]=Math.min(100,Math.max(0,prev+d));if(prev<80&&tm[id]>=80){const n=gN(id);if(n)nm.push(n.name);}});return{tm,newlyMastered:nm};};

  const updateGaps=useCallback((tm,gaps,strengths)=>{const MAP={"Fractions & Division":["m3","m4","m5","m13","m16"],"Decimals":["m14","m15"],"Place Value":["m11","m12"],"Ratios & Percents":["m17","m18","m19"],"Pre-Algebra":["m20","m21","m22","m27"],"Geometry":["m6","m7","m8","m23","m24"],"Data & Probability":["m25","m26"],"Forces & Motion":["s1","s2","s3","s4"],"Energy & Waves":["s18","s19","s20"],"States of Matter":["s5","s6","s7"],"Life Science":["s11","s12","s13","s14"],"Earth Science":["s15","s16","s17"],"Space Science":["s8"],"Ecosystems":["s10","s9"],"Chemistry Basics":["ch1","ch2","ch3"],"Chemical Reactions":["ch4","ch5","ch6","ch7"],"Cell Biology":["b1","b2"],"Human Body":["b3","b5","b6"],"Ecology & Evolution":["b4"],"Logic & Loops":["c3","c4"],"Variables & Functions":["c5","c6","c9","c10"],"Web & Advanced CS":["c11","c12","c13","c14"],"Critical Thinking":["ct1","ct2","ct3","ct4","ct5"]};const ng=[...gaps],ns=[...strengths];Object.entries(MAP).forEach(([name,ids])=>{const covered=ids.filter(id=>tm[id]!==undefined);if(!covered.length)return;const avg=covered.reduce((s,id)=>s+(tm[id]||0),0)/covered.length;if(avg<45&&!ng.includes(name)){ng.push(name);ns.splice(ns.indexOf(name),1);}if(avg>=70&&ng.includes(name)){ng.splice(ng.indexOf(name),1);if(!ns.includes(name))ns.push(name);}});return{gaps:ng,strengths:ns};},[]);

  const sendMessage=async(text,forceRem,remTopic)=>{

    else{setConsecutiveStruggle(0);if(!forceRem)setIsStruggling(false);}

Structure your response EXACTLY like this:

  const startQuiz=async()=>{

Return ONLY valid JSON array, no markdown, no explanation. Format:
[{"q":"question text","opts":["A","B","C","D"],"correct":0,"explain":"Why the correct answer is right, and briefly why the wrong ones are wrong. 1-2 sentences."}]
- correct is the 0-based index of the right answer
- Make questions progressively harder (first 3 easy, next 3 medium, last 2 hard)
- Use fun, age-appropriate language
- Make wrong answers plausible but clearly incorrect`;
    try{
      const key=localStorage.getItem("nova_api_key");
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1200,messages:[{role:"user",content:prompt}]})});
      const data=await r.json();

      const clean=raw.replace(/```json|```/g,"").trim();

  const handleQuizNext=()=>{

      setQuizExplain("");

      setLearnPhase("results");
