<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nova STEM Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a2744;--navy2:#243258;--blue:#3b82f6;--teal:#14b8a6;--yellow:#fbbf24;--orange:#f97316;--green:#22c55e;--purple:#8b5cf6;--red:#ef4444;--pink:#ec4899;--white:#fff;--border:#e2e8f0;--muted:#64748b;--text:#1e293b;--font:'Nunito',sans-serif;--mono:'Fira Code',monospace}
html,body,#root{height:100%;margin:0}
body{font-family:var(--font);background:linear-gradient(160deg,#e0f2fe 0%,#f0fdf4 50%,#fef9c3 100%);color:var(--text)}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDownToast{from{opacity:0;transform:translateX(-50%) translateY(-14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.2)}50%{box-shadow:0 0 0 6px rgba(249,115,22,0)}}
.fade-in{animation:fadeIn .35s ease forwards}
.slide-up{animation:slideUp .4s cubic-bezier(.34,1.56,.64,1) forwards}
.pop{animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.spin{animation:spin 1s linear infinite;display:inline-block}

/* API Key */
.apikey-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#0f172a,#1a2744,#1e3a5f)}
.apikey-card{background:#fff;border-radius:24px;padding:40px;max-width:480px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,.3);text-align:center}
.apikey-owl{font-size:64px;display:block;margin-bottom:14px;animation:float 3s ease-in-out infinite}
.apikey-title{font-size:26px;font-weight:900;color:var(--navy);margin-bottom:8px}
.apikey-title span{background:linear-gradient(90deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.apikey-sub{font-size:13px;color:var(--muted);font-weight:600;line-height:1.7;margin-bottom:24px}
.apikey-steps{background:#f8fafc;border-radius:12px;padding:16px;margin-bottom:20px;text-align:left}
.apikey-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--text);line-height:1.5}
.apikey-step:last-child{margin-bottom:0}
.apikey-step-num{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.apikey-inp{width:100%;padding:13px 15px;border:2px solid var(--border);border-radius:11px;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:14px;letter-spacing:.5px}
.apikey-inp:focus{border-color:var(--blue)}
.apikey-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(59,130,246,.4)}
.apikey-btn:hover{transform:translateY(-2px)} .apikey-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.apikey-note{font-size:11px;color:var(--muted);font-weight:600;margin-top:12px;line-height:1.6}
.apikey-link{color:var(--blue);text-decoration:none;font-weight:800}
.err-box{color:var(--red);font-size:12px;font-weight:700;margin-bottom:10px;padding:8px 12px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca}
.ok-box{color:#166534;font-size:12px;font-weight:700;margin-bottom:10px;padding:8px 12px;background:#f0fdf4;border-radius:8px;border:1px solid var(--green)}

/* Auth */
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#0f172a,#1a2744,#1e3a5f)}
.auth-card{background:#fff;border-radius:24px;padding:40px;max-width:440px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,.3);text-align:center}
.auth-owl{font-size:56px;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite}
.auth-title{font-size:24px;font-weight:900;color:var(--navy);margin-bottom:6px}
.auth-title span{background:linear-gradient(90deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-sub{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:20px;line-height:1.6}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:#f1f5f9;border-radius:10px;padding:3px}
.auth-tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;color:var(--muted);transition:all .15s}
.auth-tab.active{background:#fff;color:var(--navy);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.auth-type-row{display:flex;gap:10px;margin-bottom:16px}
.auth-type-btn{flex:1;padding:12px;border-radius:12px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:5px}
.auth-type-btn.active{border-color:var(--blue);background:#eff6ff;color:var(--blue)}
.auth-type-icon{font-size:24px}
.auth-inp{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:10px}
.auth-inp:focus{border-color:var(--blue)}
.auth-btn{width:100%;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(59,130,246,.4);margin-top:4px}
.auth-btn:hover{transform:translateY(-2px)} .auth-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.sync-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:#f0fdf4;border:1px solid var(--green);color:#166534;font-size:10px;font-weight:800}
.sync-warn{background:#fff7ed;border-color:var(--orange);color:#92400e}

/* Header */
.header{background:var(--navy);padding:0 20px;height:64px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(26,39,68,.3);flex-shrink:0}
.mascot{font-size:32px;animation:float 3s ease-in-out infinite}
.header-title{font-size:20px;font-weight:900;color:#fff}
.header-title span{background:linear-gradient(90deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-sub{font-size:10px;color:#94a3b8;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tab-btn{padding:6px 14px;border-radius:20px;border:2px solid rgba(255,255,255,.2);background:transparent;color:#94a3b8;font-family:var(--font);font-size:12px;font-weight:800;cursor:pointer;transition:all .15s}
.tab-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.tab-btn:hover:not(.active){border-color:rgba(255,255,255,.4);color:#fff}
.xp-chip{display:flex;align-items:center;gap:5px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);border-radius:20px;padding:5px 11px;color:var(--yellow);font-size:12px;font-weight:800}
.level-chip{display:flex;align-items:center;gap:5px;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);border-radius:20px;padding:5px 11px;color:#a78bfa;font-size:12px;font-weight:800}
.signout-btn{padding:5px 11px;border-radius:20px;border:2px solid rgba(255,255,255,.15);background:transparent;color:#94a3b8;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;transition:all .15s}
.signout-btn:hover{border-color:var(--red);color:var(--red)}

/* Main */
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:196px;flex-shrink:0;background:rgba(255,255,255,.75);backdrop-filter:blur(8px);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:12px 10px;gap:11px}
.sidebar-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.mastery-row{margin-bottom:7px}
.mastery-row-top{display:flex;justify-content:space-between;font-size:11px;font-weight:800;margin-bottom:3px}
.mastery-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden}
.mastery-fill{height:100%;border-radius:6px;transition:width .5s}
.subject-btn{width:100%;padding:8px 10px;border-radius:9px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;color:var(--text);margin-bottom:4px}
.subject-btn:hover,.subject-btn.active{transform:translateX(3px)}
.subject-btn.math{color:var(--blue)} .subject-btn.math.active,.subject-btn.math:hover{background:#eff6ff;border-color:var(--blue)}
.subject-btn.science{color:var(--purple)} .subject-btn.science.active,.subject-btn.science:hover{background:#f5f3ff;border-color:var(--purple)}
.subject-btn.coding{color:var(--teal)} .subject-btn.coding.active,.subject-btn.coding:hover{background:#f0fdfa;border-color:var(--teal)}
.mode-btn{width:100%;padding:7px 10px;border-radius:9px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;color:var(--muted);margin-bottom:4px}
.mode-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.gap-pill{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;background:#fff7ed;border:1px solid var(--orange);color:#92400e;font-size:10px;font-weight:700;margin-bottom:4px;cursor:pointer;transition:all .15s}
.gap-pill:hover{background:#fed7aa}
.strength-pill{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;background:#f0fdf4;border:1px solid var(--green);color:#166534;font-size:10px;font-weight:700;margin-bottom:4px}
.struggle-indicator{padding:8px 10px;border-radius:10px;background:linear-gradient(135deg,#fff7ed,#fef3c7);border:2px solid var(--orange);font-size:10px;font-weight:800;color:#92400e;display:flex;align-items:center;gap:6px;animation:pulseGlow 2s ease-in-out infinite}
.struggle-bar{height:4px;background:rgba(249,115,22,.2);border-radius:4px;margin-top:5px;overflow:hidden}
.struggle-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--yellow),var(--orange));transition:width .4s}

/* Chat */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:5px} .chat-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.welcome{margin:auto;text-align:center;padding:16px;max-width:500px;animation:fadeIn .4s ease}
.welcome-emoji{font-size:56px;display:block;animation:float 3s ease-in-out infinite;margin-bottom:10px}
.welcome-title{font-size:26px;font-weight:900;color:var(--navy);margin-bottom:7px}
.welcome-title em{font-style:normal;background:linear-gradient(90deg,var(--blue),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome-sub{font-size:13px;color:var(--muted);font-weight:600;line-height:1.7;margin-bottom:6px}
.welcome-interests{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.welcome-interest-tag{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;background:#eff6ff;color:var(--blue);border:1px solid #bfdbfe}
.qs-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qs-btn{padding:10px 12px;border-radius:11px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;text-align:left;line-height:1.4;transition:all .15s;color:var(--text);display:flex;gap:7px;align-items:flex-start;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.qs-btn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.1);border-color:var(--blue)}
.qs-emoji{font-size:16px;flex-shrink:0}
.msg{display:flex;gap:9px;animation:popIn .25s cubic-bezier(.34,1.56,.64,1);max-width:660px;width:100%}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 2px 7px rgba(0,0,0,.12)}
.av-nova{background:linear-gradient(135deg,var(--navy),var(--blue))} .av-user{background:linear-gradient(135deg,var(--orange),var(--pink))}
.bubble{padding:11px 15px;border-radius:15px;font-size:13px;line-height:1.75;max-width:calc(100% - 42px);font-weight:600}
.bubble-nova{background:#fff;border:2px solid var(--border);border-top-left-radius:4px;box-shadow:0 2px 9px rgba(0,0,0,.07)}
.bubble-user{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-top-right-radius:4px}
.bubble-remediation{background:linear-gradient(135deg,#fff7ed,#fef3c7);border:2px solid var(--orange);border-top-left-radius:4px}
.remediation-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:6px;background:var(--orange);color:#fff;font-size:9px;font-weight:800;margin-bottom:7px}
.block-challenge{margin:9px 0;padding:11px 13px;background:linear-gradient(135deg,#fef9c3,#fef3c7);border:2px solid var(--yellow);border-radius:11px;font-size:12px;color:#78350f}
.block-challenge-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);margin-bottom:4px}
.block-fact{margin:9px 0;padding:11px 13px;background:linear-gradient(135deg,#eff6ff,#e0f2fe);border:2px solid var(--blue);border-radius:11px;font-size:12px;color:#1e40af}
.block-fact-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);margin-bottom:4px}
.block-resource{margin:9px 0;padding:11px 13px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid var(--green);border-radius:11px;font-size:12px;color:#166534}
.block-resource-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.resource-link{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;background:#fff;border:1px solid var(--green);color:#166534;font-size:11px;font-weight:800;text-decoration:none;margin:3px 3px 0 0;cursor:pointer;transition:all .15s}
.resource-link:hover{background:var(--green);color:#fff}
.block-code{margin:9px 0;background:var(--navy);border-radius:9px;overflow:hidden}
.block-code-hdr{padding:5px 11px;background:var(--navy2);font-size:9px;font-weight:700;letter-spacing:1px;color:#94a3b8;text-transform:uppercase;font-family:var(--mono)}
.block-code-body{padding:9px 11px;font-family:var(--mono);font-size:11px;color:#e2e8f0;line-height:1.7;white-space:pre-wrap;overflow-x:auto}
.typing{background:#fff;border:2px solid var(--border);border-radius:15px;border-top-left-radius:4px;padding:11px 15px;display:flex;gap:5px;align-items:center}
.tdot{width:7px;height:7px;border-radius:50%;animation:bounce 1.2s ease infinite}
.tdot:nth-child(1){background:var(--blue);animation-delay:0s} .tdot:nth-child(2){background:var(--teal);animation-delay:.2s} .tdot:nth-child(3){background:var(--purple);animation-delay:.4s}
.topic-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:800;margin:2px}
.topic-tag.math{background:#eff6ff;color:var(--blue);border:1px solid #bfdbfe}
.topic-tag.science{background:#f5f3ff;color:var(--purple);border:1px solid #ddd6fe}
.topic-tag.coding{background:#f0fdfa;color:var(--teal);border:1px solid #99f6e4}
.xp-toast{position:fixed;bottom:80px;right:20px;background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;padding:8px 15px;border-radius:18px;font-size:12px;font-weight:800;box-shadow:0 4px 18px rgba(0,0,0,.2);animation:toastIn .3s ease;z-index:100}
.level-toast{position:fixed;bottom:80px;right:20px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;padding:12px 20px;border-radius:18px;font-size:13px;font-weight:800;box-shadow:0 4px 24px rgba(139,92,246,.5);animation:toastIn .3s ease;z-index:100}
.mastered-toast{position:fixed;top:74px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--yellow),var(--orange));color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;font-weight:800;box-shadow:0 4px 18px rgba(0,0,0,.2);animation:slideDownToast .3s ease;z-index:200}
.gap-toast{position:fixed;top:74px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#fff7ed,#fed7aa);border:2px solid var(--orange);color:#92400e;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:800;animation:slideDownToast .3s ease;z-index:200}
.input-area{padding:10px 20px 14px;background:rgba(255,255,255,.6);backdrop-filter:blur(8px);border-top:1px solid var(--border)}
.input-box{display:flex;gap:9px;align-items:flex-end;background:#fff;border:2px solid var(--border);border-radius:13px;padding:9px 13px;box-shadow:0 2px 9px rgba(0,0,0,.07);transition:border-color .15s}
.input-box:focus-within{border-color:var(--blue)} .input-box.struggling{border-color:var(--orange)}
.chat-input{flex:1;border:none;outline:none;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text);background:none;resize:none;min-height:20px;max-height:90px;line-height:1.5}
.chat-input::placeholder{color:#cbd5e1}
.send-btn{width:36px;height:36px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:hover:not(:disabled){transform:scale(1.08)} .send-btn:disabled{opacity:.4;cursor:not-allowed}
.status-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.status-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:800}
.chip-subject{background:var(--navy);color:#fff} .chip-mode{background:#f1f5f9;color:var(--muted)} .chip-struggling{background:#fff7ed;color:var(--orange);border:1px solid var(--orange)}

/* Tree */
.tree-panel{width:252px;flex-shrink:0;background:rgba(255,255,255,.8);backdrop-filter:blur(8px);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.tree-header{padding:12px 12px 9px;border-bottom:1px solid var(--border)}
.tree-title{font-size:13px;font-weight:900;color:var(--navy);margin-bottom:7px}
.tree-tabs{display:flex;gap:4px}
.tree-tab{flex:1;padding:5px;border-radius:7px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:10px;font-weight:800;cursor:pointer;transition:all .15s;color:var(--muted);text-align:center}
.tree-tab.math.active{background:#eff6ff;border-color:var(--blue);color:var(--blue)}
.tree-tab.science.active{background:#f5f3ff;border-color:var(--purple);color:var(--purple)}
.tree-tab.coding.active{background:#f0fdfa;border-color:var(--teal);color:var(--teal)}
.tree-body{flex:1;overflow-y:auto;padding:9px 11px}
.tree-body::-webkit-scrollbar{width:4px} .tree-body::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
.tree-unit{margin-bottom:13px}

/* Wizard */

  return "You are Nova, an enthusiastic STEM tutor for "+name+", a "+grade+" grade student (~10 years old).\nMASTERY: Math "+mastery.math+"% · Science "+mastery.science+"% · Coding "+mastery.coding+"%\nGAPS: "+(gaps.join(", ")||"None")+" | STRENGTHS: "+(strengths.join(", ")||"Discovering")+"\nTOPIC PROGRESS: "+(tc||"None yet")+"\n"+ic+"\nTEACHING MODE: "+(modeMap[mode]||modeMap.mixed)+"\n"+(subject?"FOCUS: "+SUBJ.find(s=>s.key===subject)?.label:"")+rn+sn+"\nRULES: Use "+name+"'s name. Connect to his interests. 4-8 sentences per idea. Guide discovery — never just give answers. Use 🤔 Think About This!: and ⭐ Fun Fact: blocks.\nRESOURCES: After teaching a topic, naturally mention that they can practice on Khan Academy, Mathnasium, Code.org, or Scratch as relevant. Start that block with 📚 Practice Resources: and briefly mention what to search for or try.";
}

        }

  const saveProfile=useCallback((p)=>{

    },1500);

  /* API Key */
  const validateKey=async()=>{

          localStorage.setItem("nova_user",u);localStorage.setItem("nova_account_type","parent");
          setAccountType("parent");setParentData(row);setAuthLoading(false);setScreen("parent-hub");
        }
      }else{
        if(authMode==="signup"){
          const existing=await sb.getProfile(u);
          if(existing){setAuthErr("Username taken.");setAuthLoading(false);return;}
          const ok=await sb.upsertProfile(u,hash,{});
          if(!ok){setAuthErr("Could not create account.");setAuthLoading(false);return;}
          localStorage.setItem("nova_user",u);localStorage.setItem("nova_account_type","student");
          setAccountType("student");setAuthLoading(false);setScreen("onboard");
        }else{
          const row=await sb.getProfile(u);
          if(!row){setAuthErr("Username not found.");setAuthLoading(false);return;}
          if(row.password_hash!==hash){setAuthErr("Incorrect password.");setAuthLoading(false);return;}
          localStorage.setItem("nova_user",u);localStorage.setItem("nova_account_type","student");
          setAccountType("student");
          if(row.profile_data&&row.profile_data.setupComplete){setProfile(row.profile_data);ls.set("nova_profile",JSON.stringify(row.profile_data));setAuthLoading(false);setScreen("tutor");}
          else{setAuthLoading(false);setScreen("onboard");}
        }
      }
    }catch(e){setAuthErr("Error: "+e.message);setAuthLoading(false);}
  };

  const handleLogout=()=>{
    localStorage.removeItem("nova_user");localStorage.removeItem("nova_account_type");
    setProfile(null);setMessages([]);setApiHistory([]);setParentData(null);setSelectedChild(null);setChildProfiles({});
    setAccountType(null);setAuthUser("");setAuthPass("");setAuthFullName("");setAuthErr("");setAuthMode("login");setAuthType("student");
    setScreen("auth");
  };

  /* Add child to parent account */
  const handleAddChild=async()=>{
    const childUser=addChildUsername.trim().toLowerCase();
    if(!childUser){setAddChildErr("Enter a username.");return;}
    setAddChildLoading(true);setAddChildErr("");
    const row=await sb.getProfile(childUser);
    if(!row){setAddChildErr("No student account found with that username.");setAddChildLoading(false);return;}
    if(parentData.children&&parentData.children.includes(childUser)){setAddChildErr("This child is already linked.");setAddChildLoading(false);return;}
    const newChildren=[...(parentData.children||[]),childUser];
    await sb.updateParent(localStorage.getItem("nova_user"),{children:newChildren});
    const updatedParent={...parentData,children:newChildren};
    setParentData(updatedParent);
    if(row.profile_data)setChildProfiles(prev=>({...prev,[childUser]:row.profile_data}));
    setSelectedChild(childUser);
    setAddChildUsername("");setAddChildLoading(false);setShowAddChild(false);
  };

  const handleRemoveChild=async(childUser)=>{
    const newChildren=(parentData.children||[]).filter(c=>c!==childUser);
    await sb.updateParent(localStorage.getItem("nova_user"),{children:newChildren});
    setParentData({...parentData,children:newChildren});
    const cp={...childProfiles};delete cp[childUser];setChildProfiles(cp);
    if(selectedChild===childUser)setSelectedChild(newChildren[0]||null);
  };

  /* Toasts */
  const showXP=(amt,xp)=>{const pl=getLevel(xp-amt);const nl=getLevel(xp);if(nl.lvl>pl.lvl){setLevelToast("🎉 Level Up! "+nl.name);setTimeout(()=>setLevelToast(null),4000);}else{setXpToast("+"+amt+" XP! ⭐");setTimeout(()=>setXpToast(null),2000);}};
  const showMastered=n=>{setMasteredToast("🏆 Mastered: "+n+"!");setTimeout(()=>setMasteredToast(null),3000);};
  const showGap=t=>{setGapToast("🎯 Remediating: "+t);setTimeout(()=>setGapToast(null),3000);};

  const updateTM=(ids,struggling,p)=>{const tm={...(p.topicMastery||{})};const nm=[];ids.forEach(id=>{const prev=tm[id]||0;const d=struggling?-8:12+Math.floor(Math.random()*6);tm[id]=Math.min(100,Math.max(0,prev+d));if(prev<80&&tm[id]>=80){const n=gN(id);if(n)nm.push(n.name);}});return{tm,newlyMastered:nm};};
  const recompute=tm=>{const c=s=>{const nodes=CURRICULUM[s].flatMap(u=>u.nodes);const sc=nodes.filter(n=>tm[n.id]!==undefined);if(!sc.length)return null;return Math.round(sc.reduce((a,n)=>a+(tm[n.id]||0),0)/sc.length);};return{math:c("math"),science:c("science"),coding:c("coding")};};
  const updateGaps=useCallback((tm,gaps,strengths)=>{const MAP={"Fractions & Division":["m3","m4","m5"],"Forces & Matter":["s1","s2","s3"],"Logic & Loops":["c3","c4"],"Multiplication":["m1","m2"],"Geometry":["m6","m7"],"States of Matter":["s5","s6","s7"]};const ng=[...gaps],ns=[...strengths];Object.entries(MAP).forEach(([name,ids])=>{const covered=ids.filter(id=>tm[id]!==undefined);if(!covered.length)return;const avg=covered.reduce((s,id)=>s+(tm[id]||0),0)/covered.length;if(avg<45&&!ng.includes(name)){ng.push(name);ns.splice(ns.indexOf(name),1);}if(avg>=70&&ng.includes(name)){ng.splice(ng.indexOf(name),1);if(!ns.includes(name))ns.push(name);}});return{gaps:ng,strengths:ns};},[]);

  const sendMessage=async(text,forceRem,remTopic)=>{
    const userText=(text||input).trim();if(!userText||isLoading)return;
    setInput("");if(taRef.current)taRef.current.style.height="20px";
    const struggling=dS(userText)||forceRem;const detT=dT(userText);
    if(struggling){setConsecutiveStruggle(c=>c+1);setIsStruggling(true);if(detT.length>0){setStruggleTopics(detT);const n=gN(detT[0]);if(n)showGap(n.name);}}
    else{setConsecutiveStruggle(0);if(!forceRem)setIsStruggling(false);}
    const um={role:"user",content:userText};const nh=[...apiHistory,um];setApiHistory(nh);
    setMessages(prev=>[...prev,{type:"user",content:userText,struggling,topics:detT}]);
    const aid=Date.now();setIsLoading(true);
    setMessages(prev=>[...prev,{type:"nova",id:aid,blocks:[],loading:true,isRem:struggling,topics:[]}]);
    const rl=remTopic||(detT.length>0?(gN(detT[0])?.name||null):null);
    try{
      const key=localStorage.getItem("nova_api_key");
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1000,system:buildPrompt(profile,subject,mode,struggling,rl),messages:nh})});
      const data=await r.json();if(data.error)throw new Error(data.error.message);
      const raw=data.content?.[0]?.text||"";const blocks=parseBlocks(raw);
      const nt=dT(raw);const allT=[...new Set([...detT,...nt])];
      setApiHistory(prev=>[...prev,{role:"assistant",content:raw}]);
      setMessages(prev=>prev.map(m=>m.id===aid?{...m,blocks,loading:false,isRem:struggling,topics:allT}:m));
      let up={...profile};
      if(allT.length>0){const{tm,newlyMastered}=updateTM(allT,struggling,up);up.topicMastery=tm;const rc=recompute(tm);if(rc.math!==null)up.mastery.math=rc.math;if(rc.science!==null)up.mastery.science=rc.science;if(rc.coding!==null)up.mastery.coding=rc.coding;const{gaps,strengths}=updateGaps(tm,up.gaps,up.strengths);up.gaps=gaps;up.strengths=strengths;if(newlyMastered.length>0)showMastered(newlyMastered[0]);}
      const xg=struggling?5:10+Math.floor(Math.random()*8);
      up.struggleCount=(up.struggleCount||0)+(struggling?1:0);up.xp=(up.xp||0)+xg;up.sessions=(up.sessions||0)+1;up.lastSession=new Date().toISOString();
      if((up.sessions||0)%5===0){const log=up.sessionLog||[];up.sessionLog=[{id:Date.now(),date:new Date().toISOString(),topics:allT.map(id=>gN(id)?.name).filter(Boolean),xpGained:xg,hadStruggle:struggling,mastery:{...up.mastery}},...log].slice(0,30);}
      saveProfile(up);if(!struggling)showXP(xg,up.xp);
    }catch(err){setMessages(prev=>prev.map(m=>m.id===aid?{...m,blocks:[{type:"text",content:"Oops! "+err.message}],loading:false}:m));}
    setIsLoading(false);
  };
  const handleKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}};

  /* Diagnostic */
  const handleAnswer=idx=>{if(answered)return;setSelected(idx);setAnswered(true);const q=QS[qIndex];setDiagScores(prev=>({...prev,[q.subject]:[...prev[q.subject],idx===q.correct?1:0]}));};
  const handleNext=()=>{
    if(qIndex<QS.length-1){setQIndex(i=>i+1);setSelected(null);setAnswered(false);return;}
    const final={...diagScores};const q=QS[qIndex];final[q.subject]=[...final[q.subject],selected===q.correct?1:0];
    const math=s2m(final.math.filter(Boolean).length,2),science=s2m(final.science.filter(Boolean).length,2),coding=s2m(final.coding.filter(Boolean).length,2);
    const gaps=[],strengths=[];
    if(math<60)gaps.push("Fractions & Division");else strengths.push("Math Operations");
    if(science<60)gaps.push("Forces & Matter");else strengths.push("Science Concepts");
    if(coding<60)gaps.push("Logic & Loops");else strengths.push("Coding Thinking");
    const tm={};
    if(math>=50){tm["m1"]=math;tm["m2"]=Math.max(0,math-10);}
    if(science>=50){tm["s1"]=science;tm["s5"]=Math.max(0,science-10);}
    if(coding>=50){tm["c1"]=coding;tm["c2"]=Math.max(0,coding-10);}
    const il=selInterests.map(k=>INTERESTS.find(i=>i.key===k)?.label).filter(Boolean);
    const p={name:nameVal,grade:gradeVal,setupComplete:true,mastery:{math,science,coding},gaps,strengths,xp:50,streak:1,sessions:0,struggleCount:0,lastSession:new Date().toISOString(),topicMastery:tm,sessionLog:[],interests:il};
    saveProfile(p);setWizardStep(3);
  };

  /* Export / Import */
  const exportProfile=()=>{const blob=new Blob([JSON.stringify({...profile,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="nova-profile-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url);};
  const handleImportFile=e=>{const file=e.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const parsed=JSON.parse(ev.target.result);if(!parsed.name||!parsed.mastery)throw new Error("Invalid");setImportData(parsed);setImportStatus("confirm");}catch{setImportStatus("error");}};reader.readAsText(file);e.target.value="";};
  const confirmImport=()=>{if(!importData)return;saveProfile(importData);setImportStatus("success");setImportData(null);setTimeout(()=>setImportStatus(null),4000);};
  const saveNewPin=()=>{if(newPin.length!==4||newPin!==confirmPin)return;localStorage.setItem("nova_pin",newPin);setStoredPin(newPin);setNewPin("");setConfirmPin("");setPinSaved(true);setTimeout(()=>setPinSaved(false),3000);};
  const changeApiKey=()=>{localStorage.removeItem("nova_api_key");setApiKeyInput("");setScreen("apikey");};

  /* Quick starts */
  const getQS=()=>{const base=[{emoji:"🔢",text:"Teach me about fractions using pizza!"},{emoji:"⚛️",text:"Explain gravity with a fun example!"},{emoji:"💻",text:"What is a loop in coding?"},{emoji:"🧠",text:"Give me a tricky math challenge!"},{emoji:"🔬",text:"Why do things float in water?"},{emoji:"🚀",text:"How do rockets escape Earth's gravity?"}];if(!profile?.interests?.length)return base;const extra=[];if(profile.interests.some(i=>i.includes("Space")))extra.push({emoji:"🌌",text:"What makes a black hole so powerful?"});if(profile.interests.some(i=>i.includes("Game")))extra.push({emoji:"🎮",text:"How do video games use math and code?"});if(profile.interests.some(i=>i.includes("Lego")||i.includes("Build")))extra.push({emoji:"🧱",text:"How do engineers design strong buildings?"});if(profile.interests.some(i=>i.includes("Animal")))extra.push({emoji:"🐬",text:"How do dolphins use echolocation?"});if(profile.interests.some(i=>i.includes("Robot")))extra.push({emoji:"🤖",text:"How do robots know what to do?"});return[...extra.slice(0,2),...base].slice(0,6);};

  /* Tree Panel */
  function TreePanel(){
    const tm=profile?.topicMastery||{};const units=CURRICULUM[treeSubject];const sc={math:"#3b82f6",science:"#8b5cf6",coding:"#14b8a6"};
    const getStatus=node=>{if(!isUL(node,tm))return"locked";const pct=tm[node.id];if(pct===undefined)return"current";if(pct>=80)return"mastered";if(struggleTopics.includes(node.id))return"struggling-node";if((profile?.gaps||[]).some(g=>({"Fractions & Division":["m3","m4","m5"],"Forces & Matter":["s1","s2","s3"],"Logic & Loops":["c3","c4"]}[g]||[]).includes(node.id)))return"gap";return"current";};
    return(
      <div className="tree-panel">
        <div className="tree-header">
          <div className="tree-title">📚 Curriculum Tree</div>
          <div className="tree-tabs">{SUBJ.map(s=><button key={s.key} className={"tree-tab "+s.key+(treeSubject===s.key?" active":"")} onClick={()=>setTreeSubject(s.key)}>{s.icon}</button>)}</div>
        </div>
        <div className="tree-body">
          {units.map((unit,ui)=>(
            <div key={ui} className="tree-unit">
              <div className="tree-unit-label">{unit.unit}</div>
              {unit.nodes.map(node=>{const status=getStatus(node);const pct=tm[node.id]||0;const color=sc[treeSubject];const nodeRes=RESOURCES[node.id]||[];return(
                <div key={node.id} className={"tree-node "+status} onClick={()=>isUL(node,tm)&&sendMessage("Let's learn about: "+node.name+". "+node.sub)}>

                    {nodeRes.length>0&&<div className="tree-node-resources">{nodeRes.map((r,ri)=><a key={ri} className="tree-resource-badge" href={r.url} target="_blank" rel="noreferrer" style={{background:r.bg,color:r.color,border:"1px solid "+r.color}} onClick={e=>e.stopPropagation()}>{r.label}</a>)}</div>}
                  </div>
                  {status==="locked"?<span style={{fontSize:11}}>🔒</span>:status==="struggling-node"?<span style={{fontSize:11}}>⚠️</span>:pct>0?<div className="tree-node-pct" style={{color:mc(pct)}}>{pct}%</div>:null}
                </div>
              );})}
            </div>
          ))}
        </div>
        <div className="tree-legend">
          <div className="legend-item"><div className="legend-dot" style={{background:"#22c55e"}}/>Mastered</div>
          <div className="legend-item"><div className="legend-dot" style={{background:"#fbbf24"}}/>Progress</div>
          <div className="legend-item"><div className="legend-dot" style={{background:"#f97316"}}/>Gap</div>
          <div className="legend-item"><div className="legend-dot" style={{background:"#ef4444"}}/>Struggling</div>
          <div className="legend-item"><div className="legend-dot" style={{background:"#e2e8f0"}}/>Locked</div>
        </div>
      </div>
    );
  }

  /* Parent Hub Dashboard Pages */
  function ParentChildDashboard({childUser}){
    const cp=childProfiles[childUser];

    // Not loaded yet
    if(!cp)return(
      <div className="empty-state">
        <div className="empty-icon">⏳</div>
        <div className="empty-text">Loading {childUser}'s profile...</div>
      </div>
    );

    // Account exists but onboarding not completed
    if(!cp.setupComplete||!cp.mastery)return(
      <div className="empty-state">
        <div className="empty-icon">🎓</div>
        <div className="empty-text">
          <strong>{childUser}</strong> hasn't completed their setup yet.<br/>
          <span style={{fontSize:12,color:"var(--muted)",fontWeight:600}}>
            Ask them to open the app, log in as a Student, and complete the quick diagnostic quiz.
            Their progress will appear here once they're done.
          </span>
        </div>
      </div>
    );

    const mastery=cp.mastery||{math:0,science:0,coding:0};
    const gaps=cp.gaps||[];
    const strengths=cp.strengths||[];
    const xp=cp.xp||0;
    const sessions=cp.sessions||0;
    const topicMastery=cp.topicMastery||{};
    const struggleCount=cp.struggleCount||0;
    const name=cp.name||childUser;
    const grade=cp.grade||"";
    const sessionLog=cp.sessionLog||[];
    const interests=cp.interests||[];
    const masteredCount=Object.values(topicMastery).filter(v=>v>=80).length;const tot=allN().length;
    const lvl=getLevel(xp||0);const nxt=getNextLevel(xp||0);
    if(parentDashPage==="overview")return(<>
      <div className="dash-page-title">{name}'s Overview</div>
      <div className="dash-page-sub">{grade} grade · Last session: {cp.lastSession?new Date(cp.lastSession).toLocaleDateString():"Not yet"}</div>
      <div className="stat-grid">
        <div className="stat-card"><div className="stat-icon">📅</div><div className="stat-val">{sessions||0}</div><div className="stat-lbl">Messages</div></div>
        <div className="stat-card"><div className="stat-icon">🏆</div><div className="stat-val">{masteredCount}/{tot}</div><div className="stat-lbl">Mastered</div></div>
        <div className="stat-card"><div className="stat-icon">⭐</div><div className="stat-val">{xp||50}</div><div className="stat-lbl">XP · Lvl {lvl.lvl}</div></div>
        <div className="stat-card"><div className="stat-icon">⚠️</div><div className="stat-val">{struggleCount||0}</div><div className="stat-lbl">Struggles</div></div>
      </div>
      {nxt&&<div className="dash-card" style={{marginBottom:16,background:"linear-gradient(135deg,#f5f3ff,#ede9fe)"}}>
        <div style={{fontSize:11,fontWeight:800,color:"var(--purple)",marginBottom:6}}>🎮 LEVEL — {lvl.name}</div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{flex:1,height:10,background:"rgba(139,92,246,.15)",borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",borderRadius:6,background:"linear-gradient(90deg,var(--purple),var(--pink))",width:Math.min(100,((xp-lvl.min)/(nxt.min-lvl.min))*100)+"%"}}/></div>
          <div style={{fontSize:11,fontWeight:800,color:"var(--purple)"}}>{xp}/{nxt.min} → {nxt.name}</div>
        </div>
      </div>}
      <div className="sec-title">Subject Mastery</div>
      <div className="dash-card">{[{label:"Math",key:"math",color:"#3b82f6"},{label:"Science",key:"science",color:"#8b5cf6"},{label:"Coding",key:"coding",color:"#14b8a6"}].map(s=>(
        <div key={s.key} className="dash-mastery-row"><div className="dash-mastery-lbl">{s.label}</div><div className="dash-mastery-bar"><div className="dash-mastery-fill" style={{width:(mastery[s.key]||0)+"%",background:s.color}}/></div><div className="dash-mastery-pct" style={{color:mc(mastery[s.key]||0)}}>{mastery[s.key]||0}%</div></div>
      ))}</div>
      {interests.length>0&&<><div className="sec-title">Interests</div><div className="dash-card"><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{interests.map((int,i)=><span key={i} style={{padding:"4px 12px",borderRadius:"20px",background:"#eff6ff",color:"var(--blue)",fontSize:12,fontWeight:700,border:"1px solid #bfdbfe"}}>{int}</span>)}</div></div></>}
      <div className="sec-title">Focus Areas & Strengths</div>
      <div className="dash-card">
        {gaps.map((g,i)=><div key={i} className="gap-row"><span className="badge-needs">Gap</span>{g}</div>)}
        {strengths.map((s,i)=><div key={i} className="gap-row"><span className="badge-ok">Strong</span>{s}</div>)}
      </div>
    </>);
    if(parentDashPage==="heatmap"){const h=v=>{if(v>=80)return 4;if(v>=60)return 3;if(v>=40)return 2;if(v>0)return 1;return 0;};return(<>
      <div className="dash-page-title">🗺️ {name}'s Mastery Heatmap</div>
      <div className="dash-page-sub">Topic-level mastery across the full curriculum</div>
      {Object.entries({math:CURRICULUM.math,science:CURRICULUM.science,coding:CURRICULUM.coding}).map(([subj,units])=>(
        <div key={subj} style={{marginBottom:20}}>
          <div className="sec-title">{SUBJ.find(s=>s.key===subj)?.icon} {SUBJ.find(s=>s.key===subj)?.label}</div>
          <div className="heatmap-grid">{units.flatMap(u=>u.nodes).map(node=>{const pct=topicMastery[node.id]||0;return(<div key={node.id} className={"heat-cell heat-"+h(pct)} title={node.name+": "+pct+"%"}><div className="heat-icon">{node.icon}</div><div className="heat-name">{node.name}</div><div className="heat-pct" style={{color:pct>0?mc(pct):"var(--muted)"}}>{pct>0?pct+"%":"—"}</div></div>);})}</div>
        </div>
      ))}
    </>);}
    if(parentDashPage==="log"){return(<>
      <div className="dash-page-title">📋 {name}'s Session Log</div>
      <div className="dash-page-sub">Recent learning activity</div>
      {sessionLog.length===0?<div className="empty-state"><div className="empty-icon">📭</div><div className="empty-text">No sessions yet.</div></div>
        :sessionLog.map((s,i)=>{const{month,day,time}=fD(s.date);return(<div key={i} className="session-card"><div className="session-date-col"><div className="session-month">{month}</div><div className="session-day">{day}</div></div><div className="session-body"><div className="session-title">Session at {time}</div><div className="session-meta">Math {s.mastery?.math}% · Science {s.mastery?.science}% · Coding {s.mastery?.coding}%{s.hadStruggle?" · ⚠️ Struggled":""}</div><div className="session-topics">{(s.topics||[]).map((t,j)=><span key={j} className="session-topic-tag">{t}</span>)}{s.hadStruggle&&<span className="session-topic-tag gap-tag">Remediation</span>}</div></div><div className="session-xp">+{s.xpGained} XP</div></div>);})}
    </>);}
    if(parentDashPage==="settings")return(<>
      <div className="dash-page-title">⚙️ Settings</div>
      <div className="dash-page-sub">Manage children and account</div>
      <div className="dash-card">
        <div className="settings-title">👶 Linked Children</div>
        <div className="settings-sub">Remove a child from your dashboard (their account and progress are not deleted).</div>
        {(parentData?.children||[]).map((cu,i)=>{const cp2=childProfiles[cu];return(<div key={i} className="gap-row"><span className="badge-ok">{cp2?.name||cu}</span>{cp2?.grade||""}<button onClick={()=>handleRemoveChild(cu)} style={{marginLeft:"auto",padding:"4px 10px",borderRadius:7,border:"2px solid var(--red)",background:"#fff",fontFamily:"var(--font)",fontSize:10,fontWeight:800,cursor:"pointer",color:"var(--red)"}}>Remove</button></div>);})}
        <button onClick={()=>setShowAddChild(true)} style={{marginTop:12,padding:"9px 18px",borderRadius:9,border:"2px solid var(--blue)",background:"#fff",fontFamily:"var(--font)",fontSize:12,fontWeight:800,cursor:"pointer",color:"var(--blue)"}}>+ Add Another Child</button>
      </div>
      <div className="dash-card">
        <div className="settings-title">🔑 API Key</div>
        <div className="settings-sub">Change the Anthropic API key.</div>
        <button onClick={changeApiKey} style={{padding:"9px 18px",borderRadius:9,border:"2px solid var(--border)",background:"#fff",fontFamily:"var(--font)",fontSize:12,fontWeight:800,cursor:"pointer",color:"var(--muted)"}}>Change API Key</button>
      </div>
    </>);
    return null;
  }

  /* Header */
  function Header(){
    const lvl=profile?getLevel(profile.xp||0):null;
    const isParent=accountType==="parent";
    return(
      <header className="header">
        <div className="mascot">🦉</div>
        <div><div className="header-title">Nova <span>STEM Tutor</span></div><div className="header-sub">{isParent?(parentData?.full_name||"Parent")+" · Parent Account":"Ibraheem's Personal Tutor"}</div></div>
        <div className="header-right">
          {!isParent&&profile&&<>
            {lvl&&<div className="level-chip">Lvl {lvl.lvl} · {lvl.name}</div>}
            <div className="xp-chip">⭐ {profile.xp||0}</div>
            {syncStatus==="saving"&&<div className={"sync-badge sync-warn"}>⏳ Saving...</div>}
            {syncStatus==="saved"&&<div className="sync-badge">☁️ Saved</div>}
            {syncStatus==="error"&&<div className={"sync-badge sync-warn"}>⚠️ Offline</div>}
          </>}
          <button className="signout-btn" onClick={handleLogout}>Sign Out</button>
        </div>
      </header>
    );
  }

  /* ── Screens ── */
  if(screen==="loading")return<div className="app" style={{alignItems:"center",justifyContent:"center"}}><span style={{fontSize:44,animation:"float 1s ease-in-out infinite"}}>🦉</span></div>;

  if(screen==="apikey")return(
    <div className="app">
      <div className="apikey-wrap fade-in">
        <div className="apikey-card">
          <span className="apikey-owl">🦉</span>
          <div className="apikey-title">Nova <span>STEM Tutor</span></div>
          <div className="apikey-sub">One-time setup: paste your Anthropic API key below.</div>
          <div className="apikey-steps">
            <div className="apikey-step"><div className="apikey-step-num">1</div><div>Go to <a className="apikey-link" href="https://console.anthropic.com" target="_blank" rel="noreferrer">console.anthropic.com</a> and sign up (free)</div></div>
            <div className="apikey-step"><div className="apikey-step-num">2</div><div>Click <strong>API Keys</strong> then <strong>Create Key</strong></div></div>
            <div className="apikey-step"><div className="apikey-step-num">3</div><div>Copy the key starting with <code style={{background:"#f1f5f9",padding:"1px 5px",borderRadius:4}}>sk-ant-</code> and paste below</div></div>
          </div>
          {apiKeyError&&<div className="err-box">{apiKeyError}</div>}
          <input className="apikey-inp" type="password" placeholder="sk-ant-api03-..." value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&validateKey()}/>
          <button className="apikey-btn" onClick={validateKey} disabled={!apiKeyInput.trim()||apiKeyLoading}>{apiKeyLoading?<span className="spin">◌</span>:"Save & Continue 🚀"}</button>
          <div className="apikey-note">🔒 Stored only in your browser. Free tier gets hundreds of lessons.</div>
        </div>
      </div>
    </div>
  );

  if(screen==="auth")return(
    <div className="app">
      <div className="auth-wrap fade-in">
        <div className="auth-card">
          <span className="auth-owl">🦉</span>
          <div className="auth-title">Nova <span>STEM Tutor</span></div>
          <div className="auth-sub">Who is signing in?</div>
          <div className="auth-tabs">
            <button className={"auth-tab"+(authMode==="login"?" active":"")} onClick={()=>{setAuthMode("login");setAuthErr("");}}>Log In</button>
            <button className={"auth-tab"+(authMode==="signup"?" active":"")} onClick={()=>{setAuthMode("signup");setAuthErr("");}}>Sign Up</button>
          </div>
          <div className="auth-type-row">
            <button className={"auth-type-btn"+(authType==="student"?" active":"")} onClick={()=>setAuthType("student")}><span className="auth-type-icon">🎓</span><span>I'm a Student</span></button>
            <button className={"auth-type-btn"+(authType==="parent"?" active":"")} onClick={()=>setAuthType("parent")}><span className="auth-type-icon">👨‍👩‍👧</span><span>I'm a Parent</span></button>
          </div>
          {authErr&&<div className="err-box">{authErr}</div>}
          {authMode==="signup"&&authType==="parent"&&<input className="auth-inp" type="text" placeholder="Your full name (e.g. Haleem Masood)" value={authFullName} onChange={e=>setAuthFullName(e.target.value)}/>}
          <input className="auth-inp" type="text" placeholder={authType==="parent"?"Parent username (e.g. haleem)":"Student username (e.g. ibraheem)"} value={authUser} onChange={e=>setAuthUser(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAuth()}/>
          <input className="auth-inp" type="password" placeholder="Password (min 4 characters)" value={authPass} onChange={e=>setAuthPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAuth()}/>
          <button className="auth-btn" onClick={handleAuth} disabled={authLoading||!authUser.trim()||!authPass.trim()}>
            {authLoading?<span className="spin">◌</span>:authMode==="login"?"Log In →":"Create Account →"}
          </button>
          <div style={{fontSize:11,color:"var(--muted)",fontWeight:600,marginTop:14,lineHeight:1.6}}>
            {authType==="parent"?"👨‍👩‍👧 Parent accounts can monitor all children from one dashboard.":"🎓 Student accounts get a personalized Nova tutor experience."}
          </div>
        </div>
      </div>
    </div>
  );

  /* Parent Hub */
  if(screen==="parent-hub")return(
    <div className="app">
      <Header/>
      {showAddChild&&(
        <div className="modal-overlay">
          <div className="modal-card pop">
            <div className="modal-title">➕ Add a Child</div>
            <div className="modal-sub">Enter the student username your child used when they signed up. Their profile will appear in your dashboard immediately.</div>
            {addChildErr&&<div className="err-box">{addChildErr}</div>}
            <div className="field-lbl">Student username</div>
            <input className="field-inp" style={{marginBottom:0}} placeholder="e.g. ibraheem" value={addChildUsername} onChange={e=>setAddChildUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAddChild()}/>
            <div className="modal-actions">
              <button className="btn-secondary" onClick={()=>{setShowAddChild(false);setAddChildErr("");setAddChildUsername("");}}>Cancel</button>
              <button className="btn-primary" onClick={handleAddChild} disabled={addChildLoading||!addChildUsername.trim()}>{addChildLoading?<span className="spin">◌</span>:"Add Child"}</button>
            </div>
          </div>
        </div>
      )}
      <div className="parent-hub">
        <div className="parent-hub-sidebar">
          <div className="parent-hub-header">
            <div className="parent-hub-name">{parentData?.full_name||"Parent"}</div>
            <div className="parent-hub-role">Parent Account</div>
          </div>
          <div className="children-list">
            <div className="children-list-lbl">My Children</div>
            {(parentData?.children||[]).length===0&&<div style={{fontSize:11,color:"#475569",fontWeight:600,lineHeight:1.6,marginBottom:8}}>No children linked yet. Add a child below.</div>}
            {(parentData?.children||[]).map((childUser,i)=>{
              const cp=childProfiles[childUser];
              return(<button key={i} className={"child-btn"+(selectedChild===childUser?" active":"")} onClick={()=>setSelectedChild(childUser)}>
                <div className="child-avatar" style={{background:CHILD_COLORS[i%CHILD_COLORS.length]}}>{CHILD_EMOJIS[i%CHILD_EMOJIS.length]}</div>
                <div className="child-info"><div className="child-name">{cp?.name||childUser}</div><div className="child-grade">{cp?.grade||""} · {cp?.xp||0} XP</div></div>
              </button>);
            })}
            <button className="add-child-btn" onClick={()=>setShowAddChild(true)}>+ Add Child</button>
          </div>
          <div className="parent-hub-nav">
            <div className="parent-nav-lbl">Dashboard</div>
            {[{key:"overview",icon:"📊",label:"Overview"},{key:"heatmap",icon:"🗺️",label:"Heatmap"},{key:"log",icon:"📋",label:"Session Log"},{key:"settings",icon:"⚙️",label:"Settings"}].map(p=>(
              <button key={p.key} className={"parent-nav-btn"+(parentDashPage===p.key?" active":"")} onClick={()=>setParentDashPage(p.key)}>{p.icon} {p.label}</button>
            ))}
          </div>
          <div className="parent-hub-bottom">
            <button className="parent-nav-btn" style={{width:"100%",border:"2px solid rgba(255,255,255,.1)",borderRadius:9}} onClick={handleLogout}>🔒 Sign Out</button>
          </div>
        </div>
        <div className="parent-hub-content fade-in">
          {!selectedChild||!(parentData?.children||[]).length?(
            <div className="no-child-state">
              <div className="no-child-card">
                <div style={{fontSize:48,marginBottom:12}}>👶</div>
                <div style={{fontSize:20,fontWeight:900,color:"var(--navy)",marginBottom:8}}>No children linked yet</div>
                <div style={{fontSize:13,color:"var(--muted)",fontWeight:600,lineHeight:1.7,marginBottom:20}}>Click <strong>"Add Child"</strong> in the sidebar and enter your child's student username to link their account to your dashboard.</div>
                <button className="big-btn" onClick={()=>setShowAddChild(true)}>+ Add My First Child</button>
              </div>
            </div>
          ):<ParentChildDashboard childUser={selectedChild}/>}
        </div>
      </div>
    </div>
  );

  if(screen==="onboard"){
    const steps=["About You","Interests","Quick Quiz","Results"];
    const q=wizardStep===2?QS[qIndex]:null;
    return(
      <div className="app">
        <div className="wizard-wrap fade-in">
          <div className="wizard-sidebar">
            <div className="wizard-logo"><div className="wizard-logo-owl">🦉</div><div className="wizard-logo-text">Nova <span>Tutor</span></div></div>
            {steps.map((label,i)=>(<div key={i}><div className={"wizard-step-item"+(wizardStep===i?" active":"")+(wizardStep>i?" done":"")}><div className="wizard-step-num">{wizardStep>i?"✓":i+1}</div><div className="wizard-step-lbl">{label}</div></div>{i<steps.length-1&&<div className={"wizard-connector"+(wizardStep>i?" done":"")}/>}</div>))}
          </div>
          <div className="wizard-main">
            {wizardStep===0&&(<div className="wizard-card slide-up">
              <div className="wizard-badge">Step 1 of 4 · About You</div>
              <div className="wizard-title">Let's set up your profile! 👋</div>
              <div className="wizard-sub">Nova uses this to personalize every lesson.</div>
              <div className="field-lbl">Your name</div>
              <input className="field-inp" value={nameVal} onChange={e=>setNameVal(e.target.value)} placeholder="Enter name..."/>
              <div className="field-lbl">Current grade</div>
              <div className="grade-row">{GRADES.map(g=><button key={g} className={"grade-pill"+(gradeVal===g?" active":"")} onClick={()=>setGradeVal(g)}>{g}</button>)}</div>
              <div className="wizard-nav"><button className="btn-primary" onClick={()=>setWizardStep(1)} disabled={!nameVal.trim()}>Next: Choose Interests →</button></div>
            </div>)}
            {wizardStep===1&&(<div className="wizard-card slide-up">
              <div className="wizard-badge">Step 2 of 4 · Interests</div>
              <div className="wizard-title">What do you love? ❤️</div>
              <div className="wizard-sub">Nova weaves these into examples to make learning fun.</div>
              <div className="interest-grid">{INTERESTS.map(int=>(<button key={int.key} className={"interest-btn"+(selInterests.includes(int.key)?" active":"")} onClick={()=>setSelInterests(prev=>prev.includes(int.key)?prev.filter(k=>k!==int.key):[...prev,int.key])}><span className="interest-icon">{int.icon}</span>{int.label}{selInterests.includes(int.key)&&<span style={{marginLeft:"auto",fontSize:14}}>✓</span>}</button>))}</div>
              <div className="wizard-nav"><button className="btn-secondary" onClick={()=>setWizardStep(0)}>← Back</button><button className="btn-primary" onClick={()=>setWizardStep(2)}>Next: Quick Quiz →</button></div>
            </div>)}
            {wizardStep===2&&q&&(<div className="diag-card slide-up" style={{maxWidth:520,width:"100%"}}>
              <div className="diag-prog-lbl"><span>Question {qIndex+1} of {QS.length}</span><span style={{color:"var(--blue)"}}>{Math.round(qIndex/QS.length*100)}%</span></div>
              <div className="diag-bar"><div className="diag-bar-fill" style={{width:(qIndex/QS.length*100)+"%"}}/></div>
              <div className={"subj-badge "+q.badge}>{q.icon} {q.subjectLabel}</div>
              <div className="diag-q">{q.q}</div><div className="diag-hint">💡 {q.hint}</div>
              <div className="ans-grid">{q.options.map((opt,i)=>{let cls="ans-btn";if(answered){if(i===q.correct)cls+=" correct";else if(i===selected)cls+=" wrong";}return<button key={i} className={cls} onClick={()=>handleAnswer(i)} disabled={answered}><span style={{fontWeight:900,marginRight:5,color:"var(--muted)"}}>{["A","B","C","D"][i]}.</span>{opt}</button>;})}</div>
              {answered&&<div className={"feedback pop "+(selected===q.correct?"fb-ok":"fb-no")}>{selected===q.correct?"✅ Correct! "+q.explanation:"❌ Not quite. "+q.explanation}</div>}
              {answered&&<button className="next-btn pop" onClick={handleNext}>{qIndex<QS.length-1?"Next →":"See Results! 🎉"}</button>}
            </div>)}
            {wizardStep===3&&profile&&(<div className="results-card slide-up" style={{maxWidth:500,width:"100%"}}>
              <div style={{fontSize:36,textAlign:"center",marginBottom:10}}>🎉🌟🎊</div>
              <div style={{fontSize:24,fontWeight:900,color:"var(--navy)",textAlign:"center",marginBottom:6}}>All set, {profile.name}!</div>
              <div style={{fontSize:13,color:"var(--muted)",fontWeight:600,textAlign:"center",marginBottom:20,lineHeight:1.6}}>Nova knows your starting point:</div>
              <div className="mastery-grid">{[{label:"Math",key:"math",icon:"🔢",color:"#3b82f6"},{label:"Science",key:"science",icon:"⚛️",color:"#8b5cf6"},{label:"Coding",key:"coding",icon:"💻",color:"#14b8a6"}].map(s=>(<div key={s.key} className="m-card"><div className="m-icon">{s.icon}</div><div className="m-lbl">{s.label}</div><div className="m-score" style={{color:mc(profile.mastery[s.key])}}>{profile.mastery[s.key]}%</div><div style={{fontSize:9,fontWeight:700,color:mc(profile.mastery[s.key]),marginTop:2}}>{ml(profile.mastery[s.key])}</div><div className="m-bar"><div className="m-bar-fill" style={{width:profile.mastery[s.key]+"%",background:s.color}}/></div></div>))}</div>
              {profile.gaps.length>0&&<div className="box-gap"><div className="box-gap-title">🎯 Nova will focus on</div>{profile.gaps.map((g,i)=><div key={i} className="box-gap-item">→ {g}</div>)}</div>}
              {profile.strengths.length>0&&<div className="box-str"><div className="box-str-title">💪 Strengths</div>{profile.strengths.map((s,i)=><div key={i} className="box-str-item">✓ {s}</div>)}</div>}
              <button className="big-btn" onClick={()=>setScreen("tutor")}>Start Learning with Nova! 🚀</button>
            </div>)}
          </div>
        </div>
      </div>
    );
  }

  /* Tutor */
  return(
    <div className="app">
      <Header/>
      {xpToast&&<div className="xp-toast">{xpToast}</div>}
      {levelToast&&<div className="level-toast">{levelToast}</div>}
      {masteredToast&&<div className="mastered-toast">{masteredToast}</div>}
      {gapToast&&<div className="gap-toast">{gapToast}</div>}
      <div className="main">
        <div className="sidebar">
          <div>
            <div className="sidebar-label">Mastery</div>
            {SUBJ.map(s=>(<div key={s.key} className="mastery-row"><div className="mastery-row-top"><span>{s.icon} {s.label}</span><span style={{color:mc(profile?.mastery?.[s.key]||0)}}>{profile?.mastery?.[s.key]||0}%</span></div><div className="mastery-bar"><div className="mastery-fill" style={{width:(profile?.mastery?.[s.key]||0)+"%",background:s.color}}/></div></div>))}
          </div>
          {isStruggling&&<div className="struggle-indicator"><span>⚠️</span><div><div>Remediating</div><div className="struggle-bar"><div className="struggle-fill" style={{width:Math.min(consecutiveStruggle*33,100)+"%"}}/></div></div></div>}
          <div>
            <div className="sidebar-label">Focus Subject</div>
            {SUBJ.map(s=><button key={s.key} className={"subject-btn "+s.key+(subject===s.key?" active":"")} onClick={()=>setSubject(prev=>prev===s.key?null:s.key)}><span>{s.icon}</span>{s.label}</button>)}
          </div>
          <div>
            <div className="sidebar-label">Teaching Mode</div>
            {MODES.map(m=><button key={m.key} className={"mode-btn"+(mode===m.key?" active":"")} onClick={()=>setMode(m.key)}>{m.label}</button>)}
          </div>
          {(profile?.gaps||[]).length>0&&<div><div className="sidebar-label">🎯 Gaps (click to fix)</div>{profile.gaps.map((g,i)=><div key={i} className="gap-pill" onClick={()=>sendMessage("I need help with: "+g,true,g)}>→ {g} 🎯</div>)}</div>}
          {(profile?.strengths||[]).length>0&&<div><div className="sidebar-label">💪 Strengths</div>{profile.strengths.map((s,i)=><div key={i} className="strength-pill">✓ {s}</div>)}</div>}
        </div>
        <div className="chat-wrap">
          <div className="chat-area" ref={chatRef}>
            {messages.length===0?(
              <div className="welcome">
                <span className="welcome-emoji">🦉</span>
                <div className="welcome-title">Hey <em>{profile?.name}</em>! 👋</div>
                <div className="welcome-sub">Math {profile?.mastery?.math}% · Science {profile?.mastery?.science}% · Coding {profile?.mastery?.coding}%<br/>{(profile?.gaps||[]).length>0&&"Focusing on: "+profile.gaps.join(", ")}</div>
                {profile?.interests?.length>0&&<div className="welcome-interests">{profile.interests.slice(0,4).map((int,i)=><span key={i} className="welcome-interest-tag">{int}</span>)}</div>}
                <div style={{fontSize:12,color:"var(--muted)",fontWeight:600,marginBottom:14}}>Pick something to explore, or type anything below 👇</div>
                <div className="qs-grid">{getQS().map((q,i)=><button key={i} className="qs-btn" onClick={()=>sendMessage(q.text)}><span className="qs-emoji">{q.emoji}</span><span>{q.text}</span></button>)}</div>
              </div>
            ):messages.map((msg,i)=>{
              if(msg.type==="user")return(<div key={i} className="msg user"><div className="avatar av-user">😊</div><div><div className="bubble bubble-user">{msg.content}</div>{msg.topics&&msg.topics.length>0&&<div style={{marginTop:4,display:"flex",justifyContent:"flex-end",flexWrap:"wrap"}}>{msg.topics.slice(0,3).map(tid=>{const node=gN(tid);return node?<span key={tid} className={"topic-tag "+sOI(tid)}>{node.icon}{node.name}</span>:null;})}</div>}</div></div>);
              return(<div key={i} className="msg"><div className="avatar av-nova">🦉</div>{msg.loading?<div className="typing"><div className="tdot"/><div className="tdot"/><div className="tdot"/></div>:<div className={"bubble "+(msg.isRem?"bubble-remediation":"bubble-nova")}>{msg.isRem&&<div className="remediation-badge">🎯 REMEDIATION MODE</div>}<Blocks blocks={msg.blocks} topicIds={msg.topics||[]}/></div>}</div>);
            })}
          </div>
          <div className="input-area">
            <div className="status-row">
              {subject&&<span className="status-chip chip-subject">{SUBJ.find(s=>s.key===subject)?.icon} {SUBJ.find(s=>s.key===subject)?.label}</span>}
              {mode!=="mixed"&&<span className="status-chip chip-mode">{MODES.find(m=>m.key===mode)?.label}</span>}
              {isStruggling&&<span className="status-chip chip-struggling">⚠️ Remediation Active</span>}
            </div>
            <div className={"input-box"+(isStruggling?" struggling":"")}>
              <textarea ref={taRef} className="chat-input" placeholder={"Ask Nova anything, "+(profile?.name||"")+"! 🌟"} value={input} onChange={e=>{setInput(e.target.value);e.target.style.height="20px";e.target.style.height=Math.min(e.target.scrollHeight,90)+"px";}} onKeyDown={handleKey} rows={1} disabled={isLoading}/>
              <button className="send-btn" onClick={()=>sendMessage()} disabled={isLoading||!input.trim()}>{isLoading?<span className="spin" style={{fontSize:13}}>◌</span>:"✈️"}</button>
            </div>
          </div>
        </div>
        <TreePanel/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
